<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Retro Ping Pong - Classic Paddle Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-2xl bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      
      <!-- Top HUD Header -->
      <header class="w-full flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-white/5 pb-4 mb-6 gap-3">
        <div>
          <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 uppercase drop-shadow-md">
            Ping Pong
          </h1>
          <p class="text-slate-400 text-xs mt-1">Deflect the ball and score 10 points to win</p>
        </div>
        
        <!-- Game mode control -->
        <div class="flex items-center gap-2 bg-slate-950/40 p-1 border border-white/5 rounded-xl">
          <button id="mode-ai" class="px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-sm transition-all cursor-pointer">
            VS AI
          </button>
          <button id="mode-2p" class="px-3 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer">
            2 Player
          </button>
        </div>
      </header>

      <!-- Live Score HUD -->
      <div class="flex items-center justify-center gap-12 mb-6 w-full max-w-sm">
        <div class="text-center">
          <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest block mb-1">Player 1 (Left)</span>
          <span id="score-left" class="text-4xl font-black text-indigo-400">0</span>
        </div>
        <div class="text-2xl font-bold text-slate-700">VS</div>
        <div class="text-center">
          <span id="label-right" class="text-[10px] text-slate-500 font-bold uppercase tracking-widest block mb-1">AI (Right)</span>
          <span id="score-right" class="text-4xl font-black text-purple-400">0</span>
        </div>
      </div>

      <!-- Canvas Box Wrapper -->
      <div class="relative w-full flex justify-center bg-slate-950 p-2 rounded-2xl border border-slate-800 shadow-inner">
        <canvas id="canvas" width="600" height="400" class="block w-full bg-slate-950 rounded-xl"></canvas>
      </div>

      <!-- Buttons Controls -->
      <div class="flex flex-wrap items-center justify-center gap-3 mt-6">
        <button id="start-btn" class="py-2.5 px-6 bg-emerald-600 hover:bg-emerald-500 active:scale-95 text-white font-bold rounded-xl shadow-lg transition-all cursor-pointer text-sm">
          Start Game
        </button>
        <button id="pause-btn" class="py-2.5 px-6 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 font-bold rounded-xl border border-white/5 transition-all cursor-pointer text-sm">
          Pause
        </button>
        <button id="restart-btn" class="py-2.5 px-6 bg-rose-600/20 hover:bg-rose-600/30 text-rose-400 active:scale-95 border border-rose-500/20 font-bold rounded-xl transition-all cursor-pointer text-sm">
          Reset Score
        </button>
      </div>

      <!-- Controls Hint -->
      <div class="text-center text-xs text-slate-500 mt-6 select-none leading-relaxed">
        <p id="hint-1">Left Controls: <kbd class="px-1 py-0.5 bg-slate-800 rounded">W</kbd> (Up) / <kbd class="px-1 py-0.5 bg-slate-800 rounded">S</kbd> (Down)</p>
        <p id="hint-2" class="mt-1 hidden">Right Controls: <kbd class="px-1 py-0.5 bg-slate-800 rounded">▲</kbd> (Up) / <kbd class="px-1 py-0.5 bg-slate-800 rounded">▼</kbd> (Down)</p>
      </div>
    </div>

    <!-- Win Modal dialog -->
    <div id="win-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
      <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
        <h2 id="win-title" class="text-3xl font-black text-emerald-400 mb-2 uppercase tracking-wide">Winner!</h2>
        <p id="win-message" class="text-slate-400 text-sm mb-6"></p>
        
        <button id="modal-restart" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
          Play Again
        </button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const startBtn = document.getElementById("start-btn");
      const pauseBtn = document.getElementById("pause-btn");
      const restartBtn = document.getElementById("restart-btn");
      
      const scoreLeftEl = document.getElementById("score-left");
      const scoreRightEl = document.getElementById("score-right");
      const labelRightEl = document.getElementById("label-right");
      
      const modeAiBtn = document.getElementById("mode-ai");
      const mode2pBtn = document.getElementById("mode-2p");
      
      const hint2 = document.getElementById("hint-2");
      
      const winModal = document.getElementById("win-modal");
      const winTitle = document.getElementById("win-title");
      const winMessage = document.getElementById("win-message");
      const modalRestartBtn = document.getElementById("modal-restart");

      let animationId = null;
      let gameRunning = false;
      let vsAI = true; // Default Mode: Vs AI

      // Colors
      const ballColor = "#f43f5e";      // rose-500
      const paddleLeftColor = "#818cf8"; // indigo-400
      const paddleRightColor = "#c084fc"; // purple-400

      // Ball properties
      const ballRadius = 9;
      let ballX = canvas.width / 2;
      let ballY = canvas.height / 2;
      let ballSpeedX = 4.5;
      let ballSpeedY = 4.5;

      // Paddle properties
      const paddleHeight = 75;
      const paddleWidth = 10;
      let leftPaddleY = canvas.height / 2 - paddleHeight / 2;
      let rightPaddleY = canvas.height / 2 - paddleHeight / 2;
      const paddleSpeed = 8;

      // Score properties
      let leftPlayerScore = 0;
      let rightPlayerScore = 0;
      const maxScore = 10;

      // Keys triggers
      let upPressed = false;
      let downPressed = false;
      let wPressed = false;
      let sPressed = false;

      // Set Up Mode Toggles
      modeAiBtn.addEventListener("click", () => {
        if (gameRunning) return; // Prevent changing mode mid-game
        vsAI = true;
        modeAiBtn.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-sm transition-all cursor-pointer";
        mode2pBtn.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
        labelRightEl.textContent = "AI (Right)";
        hint2.classList.add("hidden");
        resetGame();
      });

      mode2pBtn.addEventListener("click", () => {
        if (gameRunning) return;
        vsAI = false;
        mode2pBtn.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-sm transition-all cursor-pointer";
        modeAiBtn.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
        labelRightEl.textContent = "Player 2 (Right)";
        hint2.classList.remove("hidden");
        resetGame();
      });

      startBtn.addEventListener("click", function () {
        if (!gameRunning) {
          gameRunning = true;
          startBtn.textContent = "Resume";
          loop();
        }
      });

      pauseBtn.addEventListener("click", function () {
        gameRunning = false;
        cancelAnimationFrame(animationId);
      });

      restartBtn.addEventListener("click", resetGame);
      modalRestartBtn.addEventListener("click", () => {
        winModal.classList.add("hidden");
        winModal.classList.remove("flex");
        resetGame();
      });

      function resetGame() {
        leftPlayerScore = 0;
        rightPlayerScore = 0;
        scoreLeftEl.textContent = "0";
        scoreRightEl.textContent = "0";
        gameRunning = false;
        cancelAnimationFrame(animationId);
        startBtn.textContent = "Start Game";
        resetBall();
        leftPaddleY = canvas.height / 2 - paddleHeight / 2;
        rightPaddleY = canvas.height / 2 - paddleHeight / 2;
        draw();
      }

      // Keyboard events listeners
      document.addEventListener("keydown", keyDownHandler);
      document.addEventListener("keyup", keyUpHandler);

      // Mobile Touch controls on the canvas (split screen)
      function handleCanvasTouch(e) {
        if (!gameRunning && e.type === "touchstart") {
          gameRunning = true;
          startBtn.textContent = "Resume";
          loop();
        }
        if (!gameRunning) return;
        e.preventDefault(); // prevent scrolling
        const rect = canvas.getBoundingClientRect();
        
        for (let i = 0; i < e.touches.length; i++) {
          const touch = e.touches[i];
          const touchX = ((touch.clientX - rect.left) / rect.width) * canvas.width;
          const touchY = ((touch.clientY - rect.top) / rect.height) * canvas.height;
          
          if (touchX < canvas.width / 2) {
            leftPaddleY = touchY - paddleHeight / 2;
            if (leftPaddleY < 0) leftPaddleY = 0;
            if (leftPaddleY + paddleHeight > canvas.height) leftPaddleY = canvas.height - paddleHeight;
          } else if (!vsAI) {
            rightPaddleY = touchY - paddleHeight / 2;
            if (rightPaddleY < 0) rightPaddleY = 0;
            if (rightPaddleY + paddleHeight > canvas.height) rightPaddleY = canvas.height - paddleHeight;
          }
        }
      }

      canvas.addEventListener("touchstart", handleCanvasTouch, { passive: false });
      canvas.addEventListener("touchmove", handleCanvasTouch, { passive: false });

      function keyDownHandler(e) {
        if (e.key === "ArrowUp") {
          upPressed = true;
        } else if (e.key === "ArrowDown") {
          downPressed = true;
        } else if (e.key === "w" || e.key === "W") {
          wPressed = true;
        } else if (e.key === "s" || e.key === "S") {
          sPressed = true;
        }
      }

      function keyUpHandler(e) {
        if (e.key === "ArrowUp") {
          upPressed = false;
        } else if (e.key === "ArrowDown") {
          downPressed = false;
        } else if (e.key === "w" || e.key === "W") {
          wPressed = false;
        } else if (e.key === "s" || e.key === "S") {
          sPressed = false;
        }
      }

      function update() {
        // Move left paddle (Player 1)
        if (wPressed && leftPaddleY > 0) {
          leftPaddleY -= paddleSpeed;
        } else if (sPressed && leftPaddleY + paddleHeight < canvas.height) {
          leftPaddleY += paddleSpeed;
        }

        // Move right paddle (Player 2 or AI)
        if (vsAI) {
          // AI Logic: follow the ball vertical offset
          let targetY = ballY - paddleHeight / 2;
          // Add a tiny random lag to make AI beatable
          if (ballSpeedX > 0) {
            if (rightPaddleY < targetY) {
              rightPaddleY += Math.min(paddleSpeed - 1.5, targetY - rightPaddleY);
            } else if (rightPaddleY > targetY) {
              rightPaddleY -= Math.min(paddleSpeed - 1.5, rightPaddleY - targetY);
            }
          }
        } else {
          // Manual player 2 control
          if (upPressed && rightPaddleY > 0) {
            rightPaddleY -= paddleSpeed;
          } else if (downPressed && rightPaddleY + paddleHeight < canvas.height) {
            rightPaddleY += paddleSpeed;
          }
        }

        // Move ball
        ballX += ballSpeedX;
        ballY += ballSpeedY;

        // Collision with top and bottom boundary
        if (ballY - ballRadius < 0 || ballY + ballRadius > canvas.height) {
          ballSpeedY = -ballSpeedY;
        }

        // Collision with Left Paddle
        if (
          ballX - ballRadius < paddleWidth &&
          ballY > leftPaddleY &&
          ballY < leftPaddleY + paddleHeight
        ) {
          // Deflect and speed up slightly
          ballSpeedX = -ballSpeedX;
          ballX = paddleWidth + ballRadius; // prevent sticking
        }

        // Collision with Right Paddle
        if (
          ballX + ballRadius > canvas.width - paddleWidth &&
          ballY > rightPaddleY &&
          ballY < rightPaddleY + paddleHeight
        ) {
          ballSpeedX = -ballSpeedX;
          ballX = canvas.width - paddleWidth - ballRadius;
        }

        // Score Check bounds
        if (ballX < 0) {
          rightPlayerScore++;
          scoreRightEl.textContent = rightPlayerScore;
          resetBall();
        } else if (ballX > canvas.width) {
          leftPlayerScore++;
          scoreLeftEl.textContent = leftPlayerScore;
          resetBall();
        }

        // Win conditions check
        if (leftPlayerScore === maxScore) {
          showWinner("Player 1");
        } else if (rightPlayerScore === maxScore) {
          showWinner(vsAI ? "AI Bot" : "Player 2");
        }
      }

      function showWinner(player) {
        gameRunning = false;
        cancelAnimationFrame(animationId);
        
        winMessage.innerHTML = `Congratulations! <strong>${player}</strong> has won the match by reaching ${maxScore} points!`;
        
        winModal.classList.remove("hidden");
        winModal.classList.add("flex");
      }

      function resetBall() {
        ballX = canvas.width / 2;
        ballY = canvas.height / 2;
        // Reverse direction on serve
        ballSpeedX = -ballSpeedX;
        // Ramdomize vertical angle slightly
        ballSpeedY = (Math.random() * 6 - 3) * 1.5;
      }

      function draw() {
        // Clear canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Center line
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 4;
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(canvas.width / 2, 0);
        ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke();
        ctx.setLineDash([]); // Reset to solid lines

        // Draw ball
        ctx.fillStyle = ballColor;
        ctx.beginPath();
        ctx.arc(ballX, ballY, ballRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.closePath();

        // Draw left paddle
        ctx.fillStyle = paddleLeftColor;
        ctx.fillRect(0, leftPaddleY, paddleWidth, paddleHeight);

        // Draw right paddle
        ctx.fillStyle = paddleRightColor;
        ctx.fillRect(
          canvas.width - paddleWidth,
          rightPaddleY,
          paddleWidth,
          paddleHeight
        );
      }

      function loop() {
        if (!gameRunning) return;
        update();
        draw();
        animationId = requestAnimationFrame(loop);
      }

      // Initial paint of the board
      draw();
    </script>
  </body>
</html>
