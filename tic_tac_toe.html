<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Tic Tac Toe</title>
  <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg">
  
  <!-- Google Font & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    .win-cell {
      animation: pulse-glow 1.5s infinite alternate;
    }
    @keyframes pulse-glow {
      from {
        background-color: rgba(16, 185, 129, 0.15);
        border-color: rgba(52, 211, 153, 0.5);
        box-shadow: 0 0 4px rgba(52, 211, 153, 0.3);
      }
      to {
        background-color: rgba(16, 185, 129, 0.35);
        border-color: rgba(52, 211, 153, 1);
        box-shadow: 0 0 16px rgba(52, 211, 153, 0.8);
      }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30 selection:text-indigo-200">

  <!-- Glow background bubbles -->
  <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-rose-500/10 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-cyan-500/10 rounded-full blur-2xl"></div>
    
    <header class="text-center mb-6">
      <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-indigo-400 uppercase drop-shadow-md">
        Tic Tac Toe
      </h1>
      <p class="text-slate-400 text-xs mt-1">Get three in a row to conquer the board</p>
    </header>

    <!-- Turn/Result Status Box -->
    <div id="status" class="status w-full text-center py-3 px-6 rounded-2xl font-bold text-sm bg-slate-950/40 border border-white/5 text-slate-300 mb-8 tracking-wide transition-all duration-300">
      Now "X" Turn
    </div>

    <!-- The 3x3 Grid Board -->
    <div class="grid grid-cols-3 gap-3 mb-8 w-full max-w-[320px]">
      <div data-index="0" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="1" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="2" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="3" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="4" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="5" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="6" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="7" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
      <div data-index="8" class="box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150"></div>
    </div>

    <!-- Restart / Reset Action -->
    <button class="restartBtn w-full py-4 bg-gradient-to-r from-cyan-600 to-indigo-600 hover:from-cyan-500 hover:to-indigo-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
      Restart 🔁
    </button>
  </div>

  <script>
    const boxEls = document.querySelectorAll('.box');
    const statusEl = document.getElementById('status');
    const restartBtnEl = document.querySelector('.restartBtn');

    // High fidelity neon inline SVG symbols instead of local X/O images
    const xSVG = `<svg class="w-12 h-12 sm:w-14 sm:h-14 text-cyan-400 stroke-cyan-400 stroke-[5] drop-shadow-[0_0_6px_rgba(34,211,238,0.5)]" viewBox="0 0 24 24" fill="none" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;
    const oSVG = `<svg class="w-12 h-12 sm:w-14 sm:h-14 text-rose-400 stroke-rose-400 stroke-[5] drop-shadow-[0_0_6px_rgba(251,113,133,0.5)]" viewBox="0 0 24 24" fill="none" stroke-linecap="round"><circle cx="12" cy="12" r="9"></circle></svg>`;

    // Win Combinations
    const win = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
      [0, 4, 8], [2, 4, 6]             // Diagonals
    ];

    let options = ["", "", "", "", "", "", "", "", ""];
    let currentPlayer = xSVG;
    let player = "X";
    let running = false;

    function init() {
      // Use currentTarget inside listener for robust pointer handling on child elements
      boxEls.forEach(box => box.addEventListener('click', boxClick));
      restartBtnEl.addEventListener('click', restartGame);
      statusEl.innerHTML = `Player <span class="text-cyan-400 font-extrabold text-base">X</span>'s Turn`;
      running = true;
    }

    function boxClick(e) {
      // Using currentTarget refers strictly to the box, even if user clicks on child elements (SVG)
      const box = e.currentTarget;
      const index = box.dataset.index;

      if (options[index] !== "" || !running) {
        return;
      }
      
      updateBox(box, index);
      checkWinner();
    }

    function updateBox(box, index) {
      options[index] = player;
      box.innerHTML = currentPlayer;
      box.classList.remove('hover:bg-slate-800/30');
    }

    function changePlayer() {
      player = (player === 'X') ? "O" : "X";
      currentPlayer = (currentPlayer === xSVG) ? oSVG : xSVG;
      
      if (player === 'X') {
        statusEl.innerHTML = `Player <span class="text-cyan-400 font-extrabold text-base">X</span>'s Turn`;
      } else {
        statusEl.innerHTML = `Player <span class="text-rose-400 font-extrabold text-base">O</span>'s Turn`;
      }
    }

    function restartGame() {
      options = ["", "", "", "", "", "", "", "", ""];
      currentPlayer = xSVG;
      player = "X";
      running = true;
      statusEl.innerHTML = `Player <span class="text-cyan-400 font-extrabold text-base">X</span>'s Turn`;
      restartBtnEl.textContent = "Restart 🔁";
      
      // Reset color classes on status
      statusEl.className = "status w-full text-center py-3 px-6 rounded-2xl font-bold text-sm bg-slate-950/40 border border-white/5 text-slate-300 mb-8 tracking-wide transition-all duration-300";

      boxEls.forEach(box => {
        box.innerHTML = "";
        box.className = "box w-24 h-24 sm:w-28 sm:h-28 bg-slate-950/40 border border-slate-800/80 rounded-2xl flex items-center justify-center cursor-pointer hover:bg-slate-800/30 active:scale-95 transition-all select-none duration-150";
      });
    }

    function checkWinner() {
      let isWon = false;
      
      for (let i = 0; i < win.length; i++) {
        const condition = win[i];
        const box1 = options[condition[0]];
        const box2 = options[condition[1]];
        const box3 = options[condition[2]];
        
        if (box1 === "" || box2 === "" || box3 === "") {
          continue;
        }
        
        if (box1 === box2 && box2 === box3) {
          isWon = true;
          // Apply neon win pulsing styles
          boxEls[condition[0]].classList.add('win-cell');
          boxEls[condition[1]].classList.add('win-cell');
          boxEls[condition[2]].classList.add('win-cell');
        }
      }

      if (isWon) {
        statusEl.innerHTML = `🎉 Player <span class="${player === 'X' ? 'text-cyan-400' : 'text-rose-400'} font-extrabold text-base">${player}</span> Won the Match!`;
        statusEl.className = "status w-full text-center py-3 px-6 rounded-2xl font-bold text-sm bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 mb-8 tracking-wide transition-all duration-300";
        restartBtnEl.textContent = "Play Again 😉";
        running = false;
      } else if (!options.includes("")) {
        statusEl.innerHTML = `🤝 Match Draw! Try Again.`;
        statusEl.className = "status w-full text-center py-3 px-6 rounded-2xl font-bold text-sm bg-amber-500/10 border border-amber-500/30 text-amber-400 mb-8 tracking-wide transition-all duration-300";
        restartBtnEl.textContent = "Play Again 😉";
        running = false;
      } else {
        changePlayer();
      }
    }

    init();
  </script>
</body>
</html>
