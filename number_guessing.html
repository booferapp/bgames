<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Guess - Number Guessing Game</title>
  <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
  
  <!-- Google Font & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">

  <!-- Glowing background blobs -->
  <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-pink-500/5 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

    <header class="text-center mb-6">
      <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400 uppercase drop-shadow-md">
        Neon Guess
      </h1>
      <p class="text-slate-400 text-xs mt-1">Can you crack the code in 10 attempts?</p>
    </header>

    <!-- Main Game Board Container -->
    <div class="w-full text-center flex flex-col items-center gap-4">
      <h2 class="text-sm font-bold uppercase tracking-widest text-slate-400">Guess a number between 1 to 100</h2>
      
      <!-- Input guessing slot -->
      <input 
        type="number" 
        id="guess-input"
        placeholder="?" 
        min="1"
        max="100"
        class="bg-slate-950/40 border-2 border-slate-800 focus:border-indigo-500 text-white rounded-2xl p-4 text-center font-black text-3xl w-40 h-20 focus:outline-none transition-all duration-300 shadow-inner focus:shadow-indigo-500/10 [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none" 
      />

      <!-- Message Banner -->
      <div id="feedback" class="w-full py-3 px-4 rounded-xl font-semibold text-sm text-slate-400 bg-slate-950/20 border border-white/5 min-h-[44px] flex items-center justify-center transition-all duration-300">
        Ready to take your first guess...
      </div>

      <button id="check-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-pink-600 hover:from-indigo-500 hover:to-pink-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
        Check Guess
      </button>

      <!-- Attempts Left -->
      <p id="chances-text" class="text-xs text-slate-500 mt-2 font-medium tracking-wide">
        Remaining Attempts: <span id="chances-count" class="text-indigo-400 font-extrabold text-sm">10</span>
      </p>
    </div>
  </div>

  <script>
    const inputEl = document.getElementById("guess-input");
    const feedbackEl = document.getElementById("feedback");
    const checkBtnEl = document.getElementById("check-btn");
    const chancesTextEl = document.getElementById("chances-text");
    const chancesCountEl = document.getElementById("chances-count");

    let randomNumber;
    let totalChances;
    let gameOver = false;

    // Reset initialization
    function initGame() {
      // Generate standard numbers between 1 and 100
      randomNumber = Math.floor(Math.random() * 100) + 1;
      totalChances = 10;
      gameOver = false;

      inputEl.value = "";
      inputEl.disabled = false;
      inputEl.focus();

      feedbackEl.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-slate-400 bg-slate-950/20 border border-white/5 min-h-[44px] flex items-center justify-center transition-all duration-300";
      feedbackEl.textContent = "Ready to take your first guess...";
      
      checkBtnEl.textContent = "Check Guess";
      checkBtnEl.className = "w-full py-4 bg-gradient-to-r from-indigo-600 to-pink-600 hover:from-indigo-500 hover:to-pink-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer";

      chancesTextEl.innerHTML = `Remaining Attempts: <span id="chances-count" class="text-indigo-400 font-extrabold text-sm">${totalChances}</span>`;
    }

    // Keyboard Enter trigger support
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        checkBtnEl.click();
      }
    });

    checkBtnEl.addEventListener("click", () => {
      // If game is over, restart on button press
      if (gameOver) {
        initGame();
        return;
      }

      const inputValue = parseInt(inputEl.value);

      if (isNaN(inputValue) || inputValue < 1 || inputValue > 100) {
        feedbackEl.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-rose-400 bg-rose-500/10 border border-rose-500/20 min-h-[44px] flex items-center justify-center transition-all duration-300";
        feedbackEl.textContent = "Enter a valid number between 1 and 100.";
        return;
      }

      totalChances--;

      if (inputValue === randomNumber) {
        gameOver = true;
        inputEl.disabled = true;
        
        feedbackEl.className = "w-full py-3 px-4 rounded-xl font-extrabold text-sm text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 min-h-[44px] flex items-center justify-center transition-all duration-300 shadow-[0_0_12px_rgba(52,211,153,0.15)]";
        feedbackEl.textContent = `🎯 Victory! The code was indeed ${randomNumber}.`;
        
        checkBtnEl.textContent = "Play Again 😉";
        checkBtnEl.className = "w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer";
        
        chancesTextEl.innerHTML = `<span class="text-emerald-400 font-bold">Successfully unlocked!</span>`;
      } 
      else if (totalChances === 0) {
        gameOver = true;
        inputEl.disabled = true;
        
        feedbackEl.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-rose-400 bg-rose-500/10 border border-rose-500/20 min-h-[44px] flex items-center justify-center transition-all duration-300";
        feedbackEl.textContent = `💀 Game Over! The hidden code was ${randomNumber}.`;
        
        checkBtnEl.textContent = "Play Again 😉";
        checkBtnEl.className = "w-full py-4 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer";
        
        chancesTextEl.innerHTML = `<span class="text-rose-500 font-bold">Better luck next time.</span>`;
      } 
      else {
        // Evaluate high or low
        const chancesCountSpan = document.getElementById("chances-count");
        if (chancesCountSpan) chancesCountSpan.textContent = totalChances;

        feedbackEl.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-slate-300 bg-slate-950/40 border border-white/5 min-h-[44px] flex items-center justify-center transition-all duration-300";
        
        if (inputValue > randomNumber) {
          feedbackEl.textContent = `📈 Your guess of ${inputValue} is Too High!`;
        } else {
          feedbackEl.textContent = `📉 Your guess of ${inputValue} is Too Low!`;
        }
      }
    });

    // Start initialization
    initGame();
  </script>
</body>
</html>
