    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    <!-- Slide Synth & Logic -->
    <script>
      // Sound Synthesizer via Web Audio API
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playSound(type) {
        try {
          initAudio();
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          const now = audioCtx.currentTime;

          if (type === 'slide') {
            // Snappy wood-block/thud click
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(250, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.08);
            osc.start(now);
            osc.stop(now + 0.08);
          } else if (type === 'win') {
            // Melodic triplet fanfare
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            notes.forEach((freq, idx) => {
              const oscN = audioCtx.createOscillator();
              const gainN = audioCtx.createGain();
              oscN.connect(gainN);
              gainN.connect(audioCtx.destination);
              
              oscN.type = 'sine';
              oscN.frequency.setValueAtTime(freq, now + idx * 0.12);
              gainN.gain.setValueAtTime(0.2, now + idx * 0.12);
              gainN.gain.linearRampToValueAtTime(0.01, now + idx * 0.12 + 0.25);
              oscN.start(now + idx * 0.12);
              oscN.stop(now + idx * 0.12 + 0.25);
            });
          }
        } catch (e) {
          console.warn("Audio Context failed: ", e);
        }
      }

      // State Manager
      let state = {
        level: 'easy', // 'easy', 'medium', 'hard'
        size: 3,
        grid: [],
        emptyIndex: 8,
        moves: 0,
        seconds: 0,
        timerInterval: null,
        activeTheme: 'tile-gradient-indigo'
      };

      const LEVELS = { easy: 3, medium: 4, hard: 5 };

      // DOM Elements
      const setupPanel = document.getElementById("setup-panel");
      const playPanel = document.getElementById("play-panel");
      const boardElement = document.getElementById("board");

      const badgeLevel = document.getElementById("badge-level");
      const movesVal = document.getElementById("moves-val");
      const timeVal = document.getElementById("time-val");
      const bestVal = document.getElementById("best-val");

      const resetBtn = document.getElementById("reset-btn");
      const exitBtn = document.getElementById("exit-btn");

      const winOverlay = document.getElementById("win-overlay");
      const winMoves = document.getElementById("win-moves");
      const winTime = document.getElementById("win-time");
      const winAgain = document.getElementById("win-again");
      const winLevel = document.getElementById("win-level");

      // Theme Buttons
      const themeIndigo = document.getElementById("theme-indigo");
      const themeEmerald = document.getElementById("theme-emerald");
      const themeSunset = document.getElementById("theme-sunset");

      // Event bindings
      document.querySelectorAll(".level-select-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          initAudio();
          launchGame(btn.dataset.level);
        });
      });

      exitBtn.addEventListener("click", exitToSetup);
      resetBtn.addEventListener("click", restartGame);
      
      winAgain.addEventListener("click", () => {
        winOverlay.classList.add("hidden");
        winOverlay.classList.remove("flex");
        restartGame();
      });
      winLevel.addEventListener("click", () => {
        winOverlay.classList.add("hidden");
        winOverlay.classList.remove("flex");
        exitToSetup();
      });

      // Themes config
      function setTheme(themeClass, clickedBtn) {
        state.activeTheme = themeClass;
        [themeIndigo, themeEmerald, themeSunset].forEach(b => {
          b.classList.remove("border-white", "ring-2", "ring-indigo-500/20");
          b.classList.add("border-white/5");
        });
        clickedBtn.classList.remove("border-white/5");
        clickedBtn.classList.add("border-white", "ring-2", "ring-indigo-500/20");
        if (playPanel.classList.contains("hidden") === false) {
          renderBoard();
        }
      }

      themeIndigo.addEventListener("click", () => setTheme('tile-gradient-indigo', themeIndigo));
      themeEmerald.addEventListener("click", () => setTheme('tile-gradient-emerald', themeEmerald));
      themeSunset.addEventListener("click", () => setTheme('tile-gradient-sunset', themeSunset));

      function launchGame(levelName) {
        state.level = levelName;
        state.size = LEVELS[levelName];
        
        setupPanel.classList.add("hidden");
        playPanel.classList.remove("hidden");

        badgeLevel.textContent = levelName.charAt(0).toUpperCase() + levelName.slice(1);
        
        restartGame();
      }

      function restartGame() {
        state.moves = 0;
        state.seconds = 0;
        movesVal.textContent = "0";
        timeVal.textContent = "0s";
        
        // Show best record for current grid
        const bestMoves = localStorage.getItem(`slide_best_${state.level}`);
        bestVal.textContent = bestMoves ? `${bestMoves} moves` : '--';

        // Setup solvable grid configuration
        const totalElements = state.size * state.size;
        
        // Populate standard solved array
        let grid = [];
        for (let i = 1; i < totalElements; i++) grid.push(i);
        grid.push(0); // 0 acts as space

        state.grid = grid;
        state.emptyIndex = totalElements - 1;

        // Shuffle with randomized legal sliding moves to guarantee solvability
        const shuffleSteps = state.level === 'easy' ? 80 : (state.level === 'medium' ? 180 : 350);
        for (let i = 0; i < shuffleSteps; i++) {
          const neighbors = getNeighbors(state.emptyIndex, state.size);
          const randNeighbor = neighbors[Math.floor(Math.random() * neighbors.length)];
          // Swap empty
          [state.grid[state.emptyIndex], state.grid[randNeighbor]] = [state.grid[randNeighbor], state.grid[state.emptyIndex]];
          state.emptyIndex = randNeighbor;
        }

        renderBoard();

        // Start stopwatch timer
        clearInterval(state.timerInterval);
        state.timerInterval = setInterval(() => {
          state.seconds++;
          timeVal.textContent = `${state.seconds}s`;
        }, 1000);
      }

      function getNeighbors(index, size) {
        const row = Math.floor(index / size);
        const col = index % size;
        const neighbors = [];
        if (row > 0) neighbors.push(index - size);
        if (row < size - 1) neighbors.push(index + size);
        if (col > 0) neighbors.push(index - 1);
        if (col < size - 1) neighbors.push(index + 1);
        return neighbors;
      }

      function renderBoard() {
        boardElement.innerHTML = "";
        
        // Configure grid template columns
        boardElement.style.gridTemplateColumns = `repeat(${state.size}, minmax(0, 1fr))`;
        
        const total = state.size * state.size;
        for (let i = 0; i < total; i++) {
          const val = state.grid[i];
          const cell = document.createElement("div");
          
          if (val === 0) {
            cell.className = "tile empty bg-slate-950 rounded-2xl border border-dashed border-white/5 flex items-center justify-center select-none aspect-square shadow-inner";
          } else {
            cell.className = `tile ${state.activeTheme} rounded-2xl flex items-center justify-center font-black text-2xl cursor-pointer select-none aspect-square text-white shadow-md`;
            cell.textContent = val;
            
            // Interaction listeners
            const slideAction = () => selectTile(i);
            cell.addEventListener("mousedown", slideAction);
            cell.addEventListener("touchstart", (e) => {
              e.preventDefault();
              slideAction();
            });
          }
          
          boardElement.appendChild(cell);
        }
      }

      function selectTile(index) {
        const size = state.size;
        const neighbors = getNeighbors(state.emptyIndex, size);
        
        if (neighbors.includes(index)) {
          // Slide swap
          [state.grid[state.emptyIndex], state.grid[index]] = [state.grid[index], state.grid[state.emptyIndex]];
          state.emptyIndex = index;
          
          state.moves++;
          movesVal.textContent = state.moves;
          
          playSound('slide');
          renderBoard();
          
          // Check win condition
          if (checkWin()) {
            endGameWin();
          }
        }
      }

      function checkWin() {
        const total = state.size * state.size;
        for (let i = 0; i < total - 1; i++) {
          if (state.grid[i] !== i + 1) return false;
        }
        return state.grid[total - 1] === 0;
      }

      function endGameWin() {
        clearInterval(state.timerInterval);
        playSound('win');

        // Set best highscore record
        const bestKey = `slide_best_${state.level}`;
        const previousBest = localStorage.getItem(bestKey);
        if (!previousBest || state.moves < parseInt(previousBest)) {
          localStorage.setItem(bestKey, state.moves);
        }

        winMoves.textContent = state.moves;
        winTime.textContent = `${state.seconds}s`;

        winOverlay.classList.remove("hidden");
        winOverlay.classList.add("flex");
      }

      function exitToSetup() {
        clearInterval(state.timerInterval);
        playPanel.classList.add("hidden");
        setupPanel.classList.remove("hidden");
      }
    </script>
