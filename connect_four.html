<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Connect Four - Classic Gravity Drop</title>
  <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg">
  
  <!-- Google Font & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">

  <!-- Glowing background elements -->
  <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-rose-500/5 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

    <!-- Top HUD Header -->
    <header class="text-center mb-5">
      <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-indigo-400 uppercase drop-shadow-md">
        Connect Four
      </h1>
      <p class="text-slate-400 text-xs mt-1">Get four in a row horizontally, vertically, or diagonally</p>
    </header>

    <!-- Turn Indicator HUD -->
    <div id="player" class="w-full text-center py-3 px-6 rounded-2xl font-bold text-sm bg-slate-950/40 border border-white/5 text-slate-300 mb-6 tracking-wide transition-all duration-300">
      Player <span class="text-emerald-400 font-extrabold">1</span>'s Turn
    </div>

    <!-- Dynamic Connect Four Grid Board -->
    <div id="board-grid" class="grid grid-cols-7 gap-2.5 p-3.5 bg-indigo-650 border-2 border-indigo-500/35 rounded-3xl shadow-2xl w-full max-w-[360px] sm:max-w-[400px] mb-6 shadow-indigo-500/10 select-none">
      <!-- Generated in JS -->
    </div>

    <!-- Reset Trigger -->
    <button id="reset-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
      Reset Game 🔁
    </button>
  </div>

  <!-- Win Modal dialog -->
  <div id="win-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
    <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-emerald-500/10 rounded-full blur-2xl"></div>
      <h2 id="win-title" class="text-3xl font-black text-emerald-400 mb-2 uppercase tracking-wide">Victory! 🎉</h2>
      <p id="win-message" class="text-slate-400 text-sm mb-6"></p>
      
      <button id="modal-restart" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
        Play Again
      </button>
    </div>
  </div>

  <script>
    const gridContainer = document.getElementById("board-grid");
    const playerType = document.getElementById("player");
    const reset = document.getElementById("reset-btn");
    
    const winModal = document.getElementById("win-modal");
    const winTitle = document.getElementById("win-title");
    const winMessage = document.getElementById("win-message");
    const modalRestart = document.getElementById("modal-restart");

    let playerNumber = 1; 
    let filledGrid = []; 
    let filledCells = 0; 
    let gameOver = false;

    reset.addEventListener("click", resetBoard);
    modalRestart.addEventListener("click", () => {
      winModal.classList.add("hidden");
      winModal.classList.remove("flex");
      resetBoard();
    });

    function initBoard() {
      gridContainer.innerHTML = "";
      
      // Build 42 grid slots
      for (let i = 0; i < 42; i++) {
        const colIndex = i % 7;
        const cell = document.createElement("div");
        cell.className = "aspect-square rounded-full bg-[#090b16] border border-indigo-900/50 flex items-center justify-center cursor-pointer hover:bg-slate-900/20 transition-all shadow-inner";
        
        const slot = document.createElement("div");
        slot.className = "slot w-[82%] h-[82%] rounded-full bg-transparent transition-all duration-300";
        cell.appendChild(slot);
        
        cell.addEventListener("click", () => handleCellClick(colIndex));
        gridContainer.appendChild(cell);
      }
    }

    function handleCellClick(col) {
      if (gameOver) return;

      // Find bottom-most empty row in selected column
      let row = -1;
      for (let r = 5; r >= 0; r--) {
        if (filledGrid[r][col] === -1) {
          row = r;
          break;
        }
      }

      // Column is full, return
      if (row === -1) return;

      // Place chip
      filledGrid[row][col] = playerNumber;
      filledCells++;

      // Visually update the slot inside grid cell
      const cellIndex = row * 7 + col;
      const slotNode = gridContainer.children[cellIndex].querySelector(".slot");

      if (playerNumber === 1) {
        slotNode.className = "slot w-[82%] h-[82%] rounded-full bg-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,0.7)] scale-95 transition-all duration-350";
        
        if (playerWon(row, col, 1)) {
          showWinner("Player 1 (Green)", "text-emerald-400");
          return;
        }
        
        playerNumber = 2;
        playerType.innerHTML = `Player <span class="text-rose-400 font-extrabold">2</span>'s Turn`;
      } else {
        slotNode.className = "slot w-[82%] h-[82%] rounded-full bg-rose-500 drop-shadow-[0_0_8px_rgba(244,63,94,0.7)] scale-95 transition-all duration-350";
        
        if (playerWon(row, col, 2)) {
          showWinner("Player 2 (Red)", "text-rose-500");
          return;
        }
        
        playerNumber = 1;
        playerType.innerHTML = `Player <span class="text-emerald-400 font-extrabold">1</span>'s Turn`;
      }

      if (filledCells === 42) {
        showWinner("Draw Match", "text-amber-400");
      }
    }

    function showWinner(winnerName, colorClass) {
      gameOver = true;
      winTitle.className = `text-3xl font-black ${colorClass} mb-2 uppercase tracking-wide`;
      
      if (winnerName === "Draw Match") {
        winTitle.textContent = "Draw! 🤝";
        winMessage.innerHTML = `The game is a draw! All slots have been occupied.`;
      } else {
        winTitle.textContent = "Victory! 🏆";
        winMessage.innerHTML = `Congratulations! <strong>${winnerName}</strong> has aligned four chips in a row.`;
      }
      
      winModal.classList.remove("hidden");
      winModal.classList.add("flex");
    }

    function playerWon(row, col, player) {
      let count = 0;

      // Check Column-wise consecutive chips
      for (let i = 0; i < 7; i++) {
        if (filledGrid[row][i] === player) {
          count++;
          if (count === 4) return true;
        } else {
          count = 0;
        }
      }

      // Check Row-wise consecutive chips
      count = 0;
      for (let i = 0; i < 6; i++) {
        if (filledGrid[i][col] === player) {
          count++;
          if (count === 4) return true;
        } else {
          count = 0;
        }
      }

      // Check primary diagonal (\)
      count = 0;
      if (row >= col) {
        let i = row - col;
        let j = 0;
        for (; i <= 5; i++, j++) {
          if (filledGrid[i][j] === player) {
            count++;
            if (count === 4) return true;
          } else {
            count = 0;
          }
        }
      } else {
        let i = 0;
        let j = col - row;
        for (; j <= 6; i++, j++) {
          if (filledGrid[i][j] === player) {
            count++;
            if (count === 4) return true;
          } else {
            count = 0;
          }
        }
      }

      // Check secondary diagonal (/)
      count = 0;
      if (row + col <= 5) {
        let i = row + col;
        let j = 0;
        for (; i >= 0 && j <= row + col; i--, j++) {
          if (filledGrid[i][j] === player) {
            count++;
            if (count === 4) return true;
          } else {
            count = 0;
          }
        }
      } else {
        let i = 5;
        let j = row + col - 5;
        for (; j <= 6; j++, i--) {
          if (filledGrid[i][j] === player) {
            count++;
            if (count === 4) return true;
          } else {
            count = 0;
          }
        }
      }

      return false;
    }

    function resetBoard() {
      // Re-populate matrix elements to -1 (empty)
      filledGrid = [];
      for (let i = 0; i < 6; i++) {
        let arr = [-1, -1, -1, -1, -1, -1, -1];
        filledGrid.push(arr);
      }

      playerNumber = 1;
      filledCells = 0;
      gameOver = false;
      playerType.innerHTML = `Player <span class="text-emerald-400 font-extrabold">1</span>'s Turn`;

      initBoard();
    }

    // Startup Init
    resetBoard();
  </script>
</body>
</html>
