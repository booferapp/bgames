<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Insect Splat - Speed Clicker Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    
    <style>
      .screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        transition: transform 0.5s ease-in-out;
        position: absolute;
        inset: 0;
      }
      
      /* Sliding screen animation triggers */
      .screen-1 { z-index: 30; }
      .screen-2 { z-index: 20; transform: translateY(100vh); }
      .screen-3 { z-index: 10; transform: translateY(200vh); }

      .screen-1.up { transform: translateY(-100vh); }
      .screen-2.up { transform: translateY(0); }
      .screen-2.shift-up { transform: translateY(-100vh); }
      .screen-3.up { transform: translateY(0); }

      .insect {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 80px;
        height: 80px;
        position: absolute;
        transform: translate(-50%, -50%) scale(1);
        transition: transform 0.25s ease-out;
        cursor: pointer;
        user-select: none;
      }

      .insect.caught {
        transform: translate(-50%, -50%) scale(0) rotate(180deg);
        pointer-events: none;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans h-screen w-screen overflow-hidden select-none relative">
    
    <!-- Glowing background lights -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <!-- Screen 1: Welcome Screen -->
    <div class="screen screen-1">
      <div class="text-center p-6 max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 rounded-3xl shadow-2xl relative overflow-hidden">
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
        <h1 class="text-4xl md:text-5xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-teal-400 uppercase drop-shadow-md mb-2">
          Insect Splat
        </h1>
        <p class="text-slate-400 text-sm mb-8">Test your reflexes. Click on the targets as fast as you can.</p>
        <button id="start-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-teal-600 hover:from-indigo-500 hover:to-teal-500 active:scale-[0.98] text-white font-black rounded-2xl shadow-lg transition-all cursor-pointer">
          Play Game
        </button>
      </div>
    </div>

    <!-- Screen 2: Choice Selection Screen -->
    <div class="screen screen-2">
      <div class="text-center p-6 max-w-lg">
        <h2 class="text-2xl font-black uppercase tracking-wide mb-6">Choose your Target</h2>
        
        <div class="grid grid-cols-2 gap-4 w-full">
          <button class="choose-insect-btn p-5 bg-slate-900/60 hover:bg-slate-800/60 border border-white/5 hover:border-indigo-500 rounded-2xl transition-all cursor-pointer flex flex-col items-center gap-3 active:scale-95" data-char="🪰" data-name="Fly">
            <span class="text-5xl">🪰</span>
            <span class="font-bold text-sm text-slate-300">Fly</span>
          </button>
          <button class="choose-insect-btn p-5 bg-slate-900/60 hover:bg-slate-800/60 border border-white/5 hover:border-indigo-500 rounded-2xl transition-all cursor-pointer flex flex-col items-center gap-3 active:scale-95" data-char="🦟" data-name="Mosquito">
            <span class="text-5xl">🦟</span>
            <span class="font-bold text-sm text-slate-300">Mosquito</span>
          </button>
          <button class="choose-insect-btn p-5 bg-slate-900/60 hover:bg-slate-800/60 border border-white/5 hover:border-indigo-500 rounded-2xl transition-all cursor-pointer flex flex-col items-center gap-3 active:scale-95" data-char="🕷️" data-name="Spider">
            <span class="text-5xl">🕷️</span>
            <span class="font-bold text-sm text-slate-300">Spider</span>
          </button>
          <button class="choose-insect-btn p-5 bg-slate-900/60 hover:bg-slate-800/60 border border-white/5 hover:border-indigo-500 rounded-2xl transition-all cursor-pointer flex flex-col items-center gap-3 active:scale-95" data-char="🪳" data-name="Roach">
            <span class="text-5xl">🪳</span>
            <span class="font-bold text-sm text-slate-300">Roach</span>
          </button>
        </div>
      </div>
    </div>

    <!-- Screen 3: Game Board Screen -->
    <div class="screen screen-3 game-container" id="game-container">
      
      <!-- Top HUD Stats -->
      <div class="fixed top-6 left-6 right-6 flex items-center justify-between max-w-5xl mx-auto z-50 pointer-events-none">
        <div class="bg-slate-900/80 backdrop-blur-md border border-white/5 py-2 px-5 rounded-2xl shadow-xl flex flex-col items-center pointer-events-auto">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Time</span>
          <span id="time" class="text-lg font-black text-indigo-400">Time: 00:00</span>
        </div>
        <div class="bg-slate-900/80 backdrop-blur-md border border-white/5 py-2 px-5 rounded-2xl shadow-xl flex flex-col items-center pointer-events-auto">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Score</span>
          <span id="score" class="text-lg font-black text-teal-400">Score: 0</span>
        </div>
      </div>

      <!-- Live message alert card -->
      <div id="message" class="fixed top-24 left-1/2 transform -translate-x-1/2 bg-slate-900/90 backdrop-blur-md border border-amber-500/20 text-amber-300 p-4 rounded-2xl text-center text-xs font-semibold shadow-2xl z-40 transition-all duration-500 opacity-0 -translate-y-12 select-none pointer-events-none max-w-xs">
        ⚡ Are you annoyed yet?<br />You are playing an endless swarm!
      </div>
    </div>

    <script>
      const screen1 = document.querySelector(".screen-1");
      const screen2 = document.querySelector(".screen-2");
      const screen3 = document.querySelector(".screen-3");
      
      const chooseInsectButtons = document.querySelectorAll(".choose-insect-btn");
      const startButton = document.getElementById("start-btn");
      const gameContainer = document.getElementById("game-container");
      const timeElement = document.getElementById("time");
      const scoreElement = document.getElementById("score");
      const message = document.getElementById("message");

      let seconds = 0;
      let score = 0;
      let selectedInsect = {};
      let timeInterval = null;

      startButton.addEventListener("click", () => {
        screen1.classList.add("up");
        screen2.classList.add("up");
      });

      const increaseScore = () => {
        score++;
        if (score > 19) {
          message.classList.remove("opacity-0", "-translate-y-12");
          message.classList.add("opacity-100", "translate-y-0");
        }
        scoreElement.textContent = `Score: ${score}`;
      };

      const addInsects = () => {
        setTimeout(createInsect, 800);
        setTimeout(createInsect, 1300);
      };

      // Corrected capture handler
      const catchInsect = function () {
        increaseScore();
        this.classList.add("caught");
        // Fixed bug: Called remove() as a function execution to clear element from DOM
        setTimeout(() => this.remove(), 500);
        addInsects();
      };

      const getRandomLocation = () => {
        const width = window.innerWidth;
        const height = window.innerHeight;
        // Restricting targets within central screen layout boundaries
        const x = Math.random() * (width - 160) + 80;
        const y = Math.random() * (height - 200) + 120;
        return { x, y };
      };

      const createInsect = () => {
        const insect = document.createElement("div");
        insect.className = "insect";
        
        const { x, y } = getRandomLocation();
        insect.style.top = `${y}px`;
        insect.style.left = `${x}px`;
        
        // Render randomly rotated target emoji
        insect.innerHTML = `
          <span style="font-size: 3.5rem; transform: rotate(${Math.random() * 360}deg)" class="select-none block animate-pulse">
            ${selectedInsect.char}
          </span>
        `;
        
        insect.addEventListener("click", catchInsect);
        gameContainer.appendChild(insect);
      };

      const increaseTime = () => {
        let m = Math.floor(seconds / 60);
        let s = seconds % 60;
        m = m < 10 ? `0${m}` : m;
        s = s < 10 ? `0${s}` : s;
        timeElement.textContent = `Time: ${m}:${s}`;
        seconds++;
      };

      const startGame = () => {
        if (timeInterval) clearInterval(timeInterval);
        timeInterval = setInterval(increaseTime, 1000);
      };

      chooseInsectButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const char = button.dataset.char;
          const alt = button.dataset.name;
          
          selectedInsect = { char, alt };
          
          screen2.classList.add("shift-up");
          screen3.classList.add("up");
          
          setTimeout(createInsect, 1000);
          startGame();
        });
      });
    </script>
  </body>
</html>
