  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    <div class="absolute top-10 left-10 w-72 h-72 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-10 right-10 w-96 h-96 bg-cyan-500/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-lg bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col relative z-10">
      
      <!-- Top HUD Info -->

        <!-- Overlays -->

          <div class="bg-slate-900/60 border border-white/5 py-3 px-6 rounded-2xl mb-6 min-w-[160px]">

          <button id="restart-btn" class="w-full max-w-[200px] py-3 bg-gradient-to-r from-indigo-500 to-cyan-500 hover:from-indigo-400 hover:to-cyan-400 text-white font-bold rounded-xl shadow-lg transition-all active:scale-95 cursor-pointer">
            Play Again

      <!-- Footer Control Options -->
      <footer class="mt-6 flex gap-3 border-t border-white/5 pt-4">
        <button id="stop-btn" class="flex-1 py-3 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 font-semibold border border-white/5 rounded-xl transition-all cursor-pointer text-sm hidden">
          Quit Game
        </button>
      </footer>

    <!-- Web Audio Synth logic -->
    <script>
      // Sound Synthesizer via Web Audio API
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      function playSound(type) {
        try {
          initAudio();
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          const now = audioCtx.currentTime;

          if (type === 'catch') {
            // High pitch cute pop
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
          } else if (type === 'star') {
            // Rising sparkles
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.linearRampToValueAtTime(1500, now + 0.25);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
          } else if (type === 'bomb') {
            // Low boom rumble
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.linearRampToValueAtTime(60, now + 0.4);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.45);
            osc.start(now);
            osc.stop(now + 0.45);
          } else if (type === 'gameover') {
            // Sad decay
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.linearRampToValueAtTime(100, now + 0.6);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
          }
        } catch (e) {
          console.warn("Audio Context failed: ", e);
        }
      }

      // Game Data
      const emojis = ['🦄', '🐼', '🦊', '🐯', '🐨', '🦁', '🐸', '🐙', '👾', '🚀'];
      const gridArena = document.getElementById("grid-arena");
      
      const scoreVal = document.getElementById("score-val");
      const timeVal = document.getElementById("time-val");
      const highVal = document.getElementById("high-val");

      const startOverlay = document.getElementById("start-overlay");
      const gameoverOverlay = document.getElementById("gameover-overlay");
      const finalScore = document.getElementById("final-score");

      const startBtn = document.getElementById("start-btn");
      const restartBtn = document.getElementById("restart-btn");
      const stopBtn = document.getElementById("stop-btn");

      let score = 0;
      let timeLeft = 30;
      let playing = false;
      let activeHole = null;
      let activeItemType = null; // 'emoji', 'bomb', 'star'
      let moleTimer = null;
      let countTimer = null;
      
      // Load highscore
      let highScore = parseInt(localStorage.getItem("emoji_highscore")) || 0;
      highVal.textContent = highScore;

      // Populate grid cells
      const totalCells = 9;
      for (let i = 1; i <= totalCells; i++) {
        const cell = document.createElement("div");
        cell.id = `cell-${i}`;
        cell.className = "flex items-center justify-center bg-slate-900 border border-white/5 hover:border-indigo-500/30 rounded-2xl cursor-pointer transition-all duration-200 select-none text-4xl aspect-square shadow-sm";
        cell.addEventListener("mousedown", () => hitCell(i));
        cell.addEventListener("touchstart", (e) => {
          e.preventDefault();
          hitCell(i);
        });
        gridArena.appendChild(cell);
      }

      const cells = document.querySelectorAll("#grid-arena > div");

      startBtn.addEventListener("click", startGame);
      restartBtn.addEventListener("click", startGame);
      stopBtn.addEventListener("click", resetGame);

      function startGame() {
        initAudio();
        score = 0;
        timeLeft = 30;
        playing = true;

        scoreVal.textContent = score;
        timeVal.textContent = timeLeft;

        startOverlay.classList.add("hidden");
        gameoverOverlay.classList.add("hidden");
        stopBtn.classList.remove("hidden");

        // Start countdown timer
        clearInterval(countTimer);
        countTimer = setInterval(() => {
          timeLeft--;
          timeVal.textContent = timeLeft;
          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);

        // Start pop generator
        spawnNext();
      }

      function spawnNext() {
        if (!playing) return;

        // Clear previous
        cells.forEach(c => {
          c.textContent = "";
          c.classList.remove("emoji-active", "bg-indigo-500/10", "bg-rose-500/10", "bg-amber-500/10", "custom-shadow", "custom-shadow-glow");
        });

        // Determine item type
        // 75% normal emoji, 15% bomb, 10% golden star
        const randType = Math.random();
        if (randType < 0.7) {
          activeItemType = 'emoji';
        } else if (randType < 0.85) {
          activeItemType = 'bomb';
        } else {
          activeItemType = 'star';
        }

        // Random cell selection
        const randIndex = Math.floor(Math.random() * totalCells);
        activeHole = randIndex + 1;
        const targetCell = cells[randIndex];

        // Assign contents and styling
        if (activeItemType === 'emoji') {
          targetCell.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          targetCell.classList.add("emoji-active", "bg-indigo-500/10", "custom-shadow");
        } else if (activeItemType === 'bomb') {
          targetCell.textContent = '💣';
          targetCell.classList.add("emoji-active", "bg-rose-500/10");
        } else {
          targetCell.textContent = '⭐';
          targetCell.classList.add("emoji-active", "bg-amber-500/10", "custom-shadow-glow");
        }

        // Next spawn schedule
        // Speeds up slightly as time runs down
        const spawnDelay = Math.max(400, 750 - (30 - timeLeft) * 8);
        
        clearTimeout(moleTimer);
        moleTimer = setTimeout(() => {
          // If not whacked, just spawn another one
          spawnNext();
        }, spawnDelay);
      }

      function hitCell(index) {
        if (!playing) return;

        if (index === activeHole) {
          if (activeItemType === 'emoji') {
            score += 10;
            playSound('catch');
            showFloatingText(cells[index-1], "+10", "text-indigo-400");
          } else if (activeItemType === 'star') {
            score += 30;
            playSound('star');
            showFloatingText(cells[index-1], "+30 ⭐", "text-amber-400");
          } else if (activeItemType === 'bomb') {
            score = Math.max(0, score - 20);
            playSound('bomb');
            showFloatingText(cells[index-1], "-20 💥", "text-rose-500");
            triggerShake(gridArena);
          }

          scoreVal.textContent = score;
          activeHole = null; // Prevent double hitting
          
          // Instantly pop next
          clearTimeout(moleTimer);
          spawnNext();
        }
      }

      function showFloatingText(element, text, colorClass) {
        const floating = document.createElement("div");
        floating.className = `absolute pointer-events-none text-sm font-black uppercase tracking-wider transition-all duration-500 opacity-100 translate-y-0 ${colorClass}`;
        floating.textContent = text;
        element.appendChild(floating);
        
        setTimeout(() => {
          floating.style.opacity = "0";
          floating.style.transform = "translateY(-20px)";
        }, 10);

        setTimeout(() => {
          floating.remove();
        }, 500);
      }

      function triggerShake(element) {
        element.classList.add("animate-bounce");
        setTimeout(() => {
          element.classList.remove("animate-bounce");
        }, 300);
      }

      function endGame() {
        if (window.Boofer && Boofer.isAvailable()) {
          const finalScore = typeof score !== 'undefined' ? score : (typeof finalScore !== 'undefined' ? finalScore : 0);
          Boofer.gameOver(finalScore);
        }

        playing = false;
        clearInterval(countTimer);
        clearTimeout(moleTimer);
        playSound('gameover');

        cells.forEach(c => {
          c.textContent = "";
          c.classList.remove("emoji-active", "bg-indigo-500/10", "bg-rose-500/10", "bg-amber-500/10", "custom-shadow", "custom-shadow-glow");
        });

        // Update highscore
        if (score > highScore) {
          highScore = score;
          localStorage.setItem("emoji_highscore", highScore);
          highVal.textContent = highScore;
        }

        finalScore.textContent = score;
        gameoverOverlay.classList.remove("hidden");
        stopBtn.classList.add("hidden");
      }

      function resetGame() {
        playing = false;
        clearInterval(countTimer);
        clearTimeout(moleTimer);
        
        cells.forEach(c => {
          c.textContent = "";
          c.classList.remove("emoji-active", "bg-indigo-500/10", "bg-rose-500/10", "bg-amber-500/10", "custom-shadow", "custom-shadow-glow");
        });

        scoreVal.textContent = "0";
        timeVal.textContent = "30";

        startOverlay.classList.remove("hidden");
        gameoverOverlay.classList.add("hidden");
        stopBtn.classList.add("hidden");
      }
    </script>
