<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Guess - Speech Guessing Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-pink-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="text-center mb-6 w-full border-b border-white/5 pb-3">
        <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-400 uppercase drop-shadow-md">
          Voice Guess
        </h1>
        <p class="text-slate-400 text-xs mt-1">Guess a secret number between 1 to 100</p>
      </header>

      <!-- Active Game View -->
      <div id="game-panel" class="w-full flex flex-col items-center gap-6">
        
        <!-- Microphone Glow Ring -->
        <div id="mic-container" class="relative flex items-center justify-center w-24 h-24 bg-indigo-500/10 rounded-full border border-indigo-500/20 shadow-inner animate-pulse">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-indigo-400 drop-shadow-[0_0_8px_rgba(129,140,248,0.5)]" viewBox="0 0 20 20" fill="currentColor">
            <path d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm3 10a5.98 5.98 0 004-1.584V14a1 1 0 112 0v-1.584A5.98 5.98 0 0017 11a1 1 0 110-2h.02A6.002 6.002 0 0013 14h-3a1 1 0 110-2z" />
          </svg>
        </div>

        <h2 id="instructions" class="text-sm font-bold uppercase tracking-widest text-slate-400">
          Speak your guess clearly
        </h2>

        <!-- Fallback Text Input Field (hidden by default unless toggled or speech unsupported) -->
        <div id="fallback-input-container" class="hidden w-full flex-col items-center gap-3">
          <input 
            type="number" 
            id="text-guess-input"
            placeholder="Type code here..."
            class="bg-slate-950/40 border-2 border-slate-800 focus:border-indigo-500 text-white rounded-2xl p-4 text-center font-bold text-lg w-full max-w-[200px] focus:outline-none transition-all duration-300 shadow-inner focus:shadow-indigo-500/10"
          />
          <button id="fallback-submit" class="py-2.5 px-6 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 border border-white/5 font-bold rounded-xl text-xs transition-all cursor-pointer">
            Check Guess
          </button>
        </div>

        <!-- Live transcript display -->
        <div id="msg" class="w-full py-4 px-5 rounded-2xl bg-slate-950/40 border border-slate-850 min-h-[100px] flex flex-col items-center justify-center text-center text-slate-400 font-semibold gap-3 shadow-inner">
          Waiting for audio signals...
        </div>

        <!-- Toggle control -->
        <button id="mode-toggle" class="text-xs text-indigo-400 hover:text-indigo-300 font-bold underline cursor-pointer select-none">
          Type guess instead
        </button>
      </div>

      <!-- Win Screen (Initially hidden) -->
      <div id="win-panel" class="w-full flex-col items-center text-center hidden">
        <h2 class="text-3xl font-black text-emerald-400 mb-2 uppercase tracking-wide">Unlocked! 🎉</h2>
        <p id="win-message" class="text-slate-400 text-sm mb-6"></p>
        
        <button id="play-again" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-pink-600 hover:from-indigo-400 hover:to-pink-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
          Play Again
        </button>
      </div>
    </div>

    <script>
      const gamePanel = document.getElementById("game-panel");
      const winPanel = document.getElementById("win-panel");
      const winMessage = document.getElementById("win-message");
      const playAgainBtn = document.getElementById("play-again");
      
      const messageElement = document.getElementById("msg");
      const instructions = document.getElementById("instructions");
      const micContainer = document.getElementById("mic-container");
      
      const fallbackContainer = document.getElementById("fallback-input-container");
      const textGuessInput = document.getElementById("text-guess-input");
      const fallbackSubmit = document.getElementById("fallback-submit");
      const modeToggle = document.getElementById("mode-toggle");

      let randomNumber;
      let recognition = null;
      let keyboardMode = false;

      // Check SpeechRecognition capabilities
      window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (window.SpeechRecognition) {
        recognition = new window.SpeechRecognition();
        recognition.addEventListener("result", onSpeak);
        recognition.addEventListener("end", () => {
          if (recognition && !keyboardMode) recognition.start();
        });
      } else {
        // Fallback directly to keyboard mode if speech recognition unsupported
        enableKeyboardMode(true);
        modeToggle.style.display = "none";
      }

      modeToggle.addEventListener("click", () => {
        enableKeyboardMode(!keyboardMode);
      });

      function enableKeyboardMode(enable) {
        keyboardMode = enable;
        if (enable) {
          if (recognition) {
            try { recognition.stop(); } catch(e){}
          }
          micContainer.classList.remove("animate-pulse");
          micContainer.style.opacity = "0.3";
          instructions.textContent = "Enter your guess below";
          fallbackContainer.classList.remove("hidden");
          fallbackContainer.classList.add("flex");
          modeToggle.textContent = "Use microphone instead";
          messageElement.textContent = "Waiting for input submission...";
        } else {
          if (recognition) {
            try { recognition.start(); } catch(e){}
          }
          micContainer.classList.add("animate-pulse");
          micContainer.style.opacity = "1";
          instructions.textContent = "Speak your guess clearly";
          fallbackContainer.classList.add("hidden");
          fallbackContainer.classList.remove("flex");
          modeToggle.textContent = "Type guess instead";
          messageElement.textContent = "Waiting for audio signals...";
        }
      }

      fallbackSubmit.addEventListener("click", () => {
        const val = textGuessInput.value.trim();
        if (val !== "") {
          writeMessage(val);
          checkNumber(val);
        }
      });

      textGuessInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          fallbackSubmit.click();
        }
      });

      playAgainBtn.addEventListener("click", resetGame);

      function resetGame() {
        randomNumber = Math.floor(Math.random() * 100) + 1;
        
        winPanel.classList.add("hidden");
        winPanel.classList.remove("flex");
        gamePanel.classList.remove("hidden");

        textGuessInput.value = "";

        if (keyboardMode) {
          messageElement.textContent = "Waiting for input submission...";
        } else {
          messageElement.textContent = "Waiting for audio signals...";
          if (recognition) {
            try { recognition.start(); } catch(e){}
          }
        }
      }

      function onSpeak(event) {
        if (keyboardMode) return;
        const message = event.results[0][0].transcript;
        writeMessage(message);
        checkNumber(message);
      }

      function writeMessage(message) {
        messageElement.innerHTML = `
          <div>You entered:</div>
          <span class="inline-block border border-white/10 px-4 py-1.5 bg-slate-900 rounded-xl text-2xl font-bold text-indigo-400 shadow-inner">${message}</span>
        `;
      }

      function checkNumber(message) {
        const number = parseInt(message);
        if (isNaN(number)) {
          messageElement.innerHTML += `<div class="text-rose-400 mt-2">That is not a valid number</div>`;
          return;
        }
        if (number > 100 || number < 1) {
          messageElement.innerHTML += `<div class="text-rose-400 mt-2">Number must be between 1 and 100</div>`;
          return;
        }
        
        if (number === randomNumber) {
          gameOverAction(number);
        } else if (number > randomNumber) {
          messageElement.innerHTML += `<div class="text-slate-400 text-xs mt-2 uppercase tracking-wide">Go Lower 📉</div>`;
        } else {
          messageElement.innerHTML += `<div class="text-slate-400 text-xs mt-2 uppercase tracking-wide">Go Higher 📈</div>`;
        }
      }

      function gameOverAction(number) {
        if (window.Boofer && Boofer.isAvailable()) {
          const finalScore = typeof score !== 'undefined' ? score : (typeof finalScore !== 'undefined' ? finalScore : 0);
          Boofer.gameOver(finalScore);
        }

        if (recognition) {
          try { recognition.stop(); } catch(e){}
        }
        
        winMessage.innerHTML = `Excellent guess! The code was indeed <strong class="text-emerald-400">${number}</strong>.`;
        
        gamePanel.classList.add("hidden");
        winPanel.classList.remove("hidden");
        winPanel.classList.add("flex");
      }

      // Initial startup trigger
      resetGame();
    </script>
  </body>
</html>
