<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />

    <title>Neon Trivia - Classic Quiz Game</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {

          extend: {

    <style>
      /* Custom scrollbar for review log */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 99px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }

  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-lg bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="text-center mb-6 border-b border-white/5 pb-3">
        <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 uppercase drop-shadow-md">
          Neon Trivia
        </h1>
        <p id="questions-count-hud" class="text-slate-400 text-xs mt-1">20 Questions</p>
      </header>

      <!-- Quiz Arena -->
      <main class="w-full flex-1">
        <div id="quiz" class="flex flex-col gap-5">
          <!-- Dynamically populated questions and cards options -->
        </div>

        <div id="result" class="text-slate-300 max-h-[300px] overflow-y-auto custom-scroll pr-1">
          <!-- Results displayed here -->
        </div>
      </main>

      <!-- Footer action triggers -->
      <footer class="flex items-center gap-3 mt-6 border-t border-white/5 pt-4">
        <button id="submit" class="flex-1 py-3.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-2xl shadow-lg hover:shadow-indigo-500/20 active:scale-[0.98] transition-all cursor-pointer text-sm">
          Submit Answer
        </button>
        <button id="retry" class="flex-1 py-3.5 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold rounded-2xl border border-white/5 active:scale-[0.98] transition-all cursor-pointer text-sm hidden">
          Retry Quiz 🔁
        </button>
        <button id="showAnswer" class="flex-1 py-3.5 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 text-white font-bold rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer text-sm hidden">
          Review Answers 📝
        </button>
      </footer>
    </div>

    <script>
      // 20 Complete Questions Data
      const quizData = [
        {
          question: "What is the capital of France?",
          options: ["Paris", "London", "Berlin", "Madrid"],
          answer: "Paris",
        },
        {
          question: "What is the largest planet in our solar system?",
          options: ["Mars", "Saturn", "Jupiter", "Neptune"],
          answer: "Jupiter",
        },
        {
          question: "Which country won the FIFA World Cup in 2018?",
          options: ["Brazil", "Germany", "France", "Argentina"],
          answer: "France",
        },
        {
          question: "What is the tallest mountain in the world?",
          options: ["Mount Everest", "K2", "Kangchenjunga", "Makalu"],
          answer: "Mount Everest",
        },
        {
          question: "Which is the largest ocean on Earth?",
          options: ["Pacific Ocean", "Indian Ocean", "Atlantic Ocean", "Arctic Ocean"],
          answer: "Pacific Ocean",
        },
        {
          question: "What is the chemical symbol for gold?",
          options: ["Au", "Ag", "Cu", "Fe"],
          answer: "Au",
        },
        {
          question: "Who painted the Mona Lisa?",
          options: ["Pablo Picasso", "Vincent van Gogh", "Leonardo da Vinci", "Michelangelo"],
          answer: "Leonardo da Vinci",
        },
        {
          question: "Which planet is known as the Red Planet?",
          options: ["Mars", "Venus", "Mercury", "Uranus"],
          answer: "Mars",
        },
        {
          question: "What is the largest species of shark?",
          options: ["Great White Shark", "Whale Shark", "Tiger Shark", "Hammerhead Shark"],
          answer: "Whale Shark",
        },
        {
          question: "Which animal is known as the King of the Jungle?",
          options: ["Lion", "Tiger", "Elephant", "Giraffe"],
          answer: "Lion",
        },
        {
          question: "What is the capital of Japan?",
          options: ["Tokyo", "Kyoto", "Osaka", "Nagoya"],
          answer: "Tokyo",
        },
        {
          question: "Which element has the atomic number 1?",
          options: ["Helium", "Oxygen", "Hydrogen", "Carbon"],
          answer: "Hydrogen",
        },
        {
          question: "Who wrote 'Romeo and Juliet'?",
          options: ["Charles Dickens", "William Shakespeare", "Mark Twain", "Leo Tolstoy"],
          answer: "William Shakespeare",
        },
        {
          question: "What is the smallest country in the world?",
          options: ["Monaco", "San Marino", "Liechtenstein", "Vatican City"],
          answer: "Vatican City",
        },
        {
          question: "Which planet is known for its rings?",
          options: ["Venus", "Saturn", "Jupiter", "Neptune"],
          answer: "Saturn",
        },
        {
          question: "Who discovered penicillin?",
          options: ["Marie Curie", "Alexander Fleming", "Louis Pasteur", "Isaac Newton"],
          answer: "Alexander Fleming",
        },
        {
          question: "Which continent is the Sahara Desert located on?",
          options: ["Asia", "Africa", "Australia", "Europe"],
          answer: "Africa",
        },
        {
          question: "What is the main ingredient in guacamole?",
          options: ["Tomato", "Avocado", "Onion", "Pepper"],
          answer: "Avocado",
        },
        {
          question: "Which country is known as the Land of the Rising Sun?",
          options: ["China", "South Korea", "Thailand", "Japan"],
          answer: "Japan",
        },
        {
          question: "What is the primary gas found in Earth's atmosphere?",
          options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Argon"],
          answer: "Nitrogen",
        }
      ];

      const quizContainer = document.getElementById("quiz");
      const resultContainer = document.getElementById("result");
      const submitButton = document.getElementById("submit");
      const retryButton = document.getElementById("retry");
      const showAnswerButton = document.getElementById("showAnswer");
      const countHUD = document.getElementById("questions-count-hud");

      let currentQuestion = 0;
      let score = 0;
      let incorrectAnswers = [];

      // Update Header HUD count dynamically
      countHUD.textContent = `${quizData.length} Questions`;

      function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
      }

      function displayQuestion() {
        const questionData = quizData[currentQuestion];

        // Question header
        const questionElement = document.createElement("div");
        questionElement.className = "text-base font-bold text-slate-200 mb-2 leading-relaxed";
        questionElement.innerHTML = `<span class="text-indigo-400 font-extrabold mr-2">${currentQuestion + 1}.</span>${questionData.question}`;

        // Options lists
        const optionsElement = document.createElement("div");
        optionsElement.className = "flex flex-col gap-3";

        const shuffledOptions = [...questionData.options];
        shuffleArray(shuffledOptions);

        for (let i = 0; i < shuffledOptions.length; i++) {
          const optionLabel = document.createElement("label");
          optionLabel.className = "flex items-center gap-3 p-4 bg-slate-950/40 hover:bg-slate-800/40 border border-slate-850 rounded-2xl cursor-pointer transition-all select-none duration-150 active:scale-[0.99] option-card";
          
          const radio = document.createElement("input");
          radio.type = "radio";
          radio.name = "quiz";
          radio.value = shuffledOptions[i];
          radio.className = "w-4 h-4 accent-indigo-500 cursor-pointer";

          // Add listener to visually highlight selected option
          radio.addEventListener("change", () => {
            document.querySelectorAll(".option-card").forEach(el => {
              el.classList.remove("border-indigo-500/50", "bg-indigo-500/5");
            });
            optionLabel.classList.add("border-indigo-500/50", "bg-indigo-500/5");
          });

          const optionText = document.createElement("span");
          optionText.className = "text-sm font-semibold text-slate-300";
          optionText.textContent = shuffledOptions[i];

          optionLabel.appendChild(radio);
          optionLabel.appendChild(optionText);
          optionsElement.appendChild(optionLabel);
        }

        quizContainer.innerHTML = "";
        quizContainer.appendChild(questionElement);
        quizContainer.appendChild(optionsElement);
      }

      function checkAnswer() {
        const selectedOption = document.querySelector('input[name="quiz"]:checked');
        if (!selectedOption) {
          // If no option is selected, flash an alert border
          quizContainer.querySelector(".flex").classList.add("border-rose-500/30");
          return;
        }

        const answer = selectedOption.value;
        if (answer === quizData[currentQuestion].answer) {
          score++;
        } else {
          incorrectAnswers.push({
            question: quizData[currentQuestion].question,
            incorrectAnswer: answer,
            correctAnswer: quizData[currentQuestion].answer,
          });
        }
        currentQuestion++;
        selectedOption.checked = false;
        
        if (currentQuestion < quizData.length) {
          displayQuestion();
        } else {
          displayResult();
        }
      }

      function displayResult() {
        quizContainer.innerHTML = "";
        
        submitButton.classList.add("hidden");
        retryButton.classList.remove("hidden");
        showAnswerButton.classList.remove("hidden");
        
        const accuracy = Math.round((score / quizData.length) * 100);

        resultContainer.innerHTML = `
          <div class="text-center py-6">
            <span class="text-5xl block mb-4">🎉</span>
            <h2 class="text-2xl font-black text-indigo-400 mb-1">Quiz Completed</h2>
            <p class="text-xs text-slate-400 mb-6">Let's inspect your accuracy scores</p>
            
            <div class="grid grid-cols-2 gap-4 w-full max-w-sm mx-auto mb-4">
              <div class="bg-slate-950/40 border border-white/5 py-3 rounded-2xl">
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-0.5">Final Score</span>
                <span class="text-2xl font-black text-white">${score} / ${quizData.length}</span>
              </div>
              <div class="bg-slate-950/40 border border-white/5 py-3 rounded-2xl">
                <span class="text-[9px] font-bold text-slate-500 uppercase tracking-widest block mb-0.5">Accuracy</span>
                <span class="text-2xl font-black text-teal-400">${accuracy}%</span>
              </div>
            </div>
          </div>
        `;
      }

      function retryQuiz() {
        currentQuestion = 0;
        score = 0;
        incorrectAnswers = [];
        
        submitButton.classList.remove("hidden");
        retryButton.classList.add("hidden");
        showAnswerButton.classList.add("hidden");
        
        resultContainer.innerHTML = "";
        displayQuestion();
      }

      function showAnswer() {
        showAnswerButton.classList.add("hidden");
        
        let incorrectAnswersHtml = "";
        
        if (incorrectAnswers.length === 0) {
          incorrectAnswersHtml = `
            <div class="text-center py-4 bg-emerald-500/10 border border-emerald-500/20 rounded-2xl text-emerald-400 font-bold text-sm">
              🌟 Flawless Match! All answers are correct.
            </div>
          `;
        } else {
          for (let i = 0; i < incorrectAnswers.length; i++) {
            incorrectAnswersHtml += `
              <div class="bg-slate-950/40 border border-white/5 p-4 rounded-2xl mb-3 flex flex-col gap-1.5 text-xs">
                <p class="font-bold text-slate-200 mb-1 leading-relaxed"><span class="text-rose-400 mr-1.5">✘</span>${incorrectAnswers[i].question}</p>
                <p class="text-slate-400">Your Answer: <span class="text-rose-400 font-bold">${incorrectAnswers[i].incorrectAnswer}</span></p>
                <p class="text-slate-400">Correct Answer: <span class="text-emerald-400 font-bold">${incorrectAnswers[i].correctAnswer}</span></p>
              </div>
            `;
          }
        }

        resultContainer.innerHTML = `
          <div class="flex flex-col gap-2.5 mt-2">
            <h3 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-1">Answer Key Log</h3>
            <p class="text-xs text-slate-400 mb-3">You scored ${score} out of ${quizData.length} questions.</p>
            ${incorrectAnswersHtml}
          </div>
        `;
      }

      submitButton.addEventListener("click", checkAnswer);
      retryButton.addEventListener("click", retryQuiz);
      showAnswerButton.addEventListener("click", showAnswer);

      // Startup triggers
      displayQuestion();
    </script>
  </body>
</html>
