<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Type - Speed Typing Test</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      .letter {
        transition: color 0.15s ease, background-color 0.15s ease;
      }
      .letter.right {
        color: #34d399; /* emerald-400 */
      }
      .letter.wrong {
        color: #f87171; /* red-400 */
        background-color: rgba(239, 68, 68, 0.15);
        border-bottom: 2px solid #ef4444;
      }
      .letter.current {
        color: #818cf8; /* indigo-400 */
        border-bottom: 2px solid #6366f1;
        animation: blink 1s infinite;
      }
      @keyframes blink {
        50% { border-color: transparent; }
      }
      /* Hide standard textarea scrollbar */
      textarea::-webkit-scrollbar {
        width: 0px;
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30 selection:text-indigo-200">
    
    <!-- Background glowing bubbles -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-3xl bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col gap-6 relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Header HUD -->
      <header class="flex items-center justify-between border-b border-white/5 pb-4">
        <div>
          <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-emerald-400 uppercase drop-shadow-md">
            Neon Type
          </h1>
          <p class="text-slate-400 text-xs mt-1">Test your typing speed and accuracy</p>
        </div>
        
        <!-- Live Stats HUD -->
        <div class="flex items-center gap-4 bg-slate-950/40 border border-white/5 px-4 py-2 rounded-2xl">
          <div class="text-center">
            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block">Time</span>
            <span id="timer" class="text-lg font-black text-indigo-400">0s</span>
          </div>
          <div class="w-[1px] h-5 bg-slate-800"></div>
          <div class="text-center">
            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block">WPM</span>
            <span id="wpm" class="text-lg font-black text-emerald-400">0</span>
          </div>
          <div class="w-[1px] h-5 bg-slate-800"></div>
          <div class="text-center">
            <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block">Accuracy</span>
            <span id="accuracy" class="text-lg font-black text-slate-200">100%</span>
          </div>
        </div>
      </header>

      <!-- Main Typing Canvas -->
      <div id="typing-area-container" class="relative min-h-[160px] p-6 bg-slate-950/40 border border-slate-800/80 rounded-2xl shadow-inner cursor-text select-none">
        
        <!-- Focus Overlay Warning -->
        <div id="focus-overlay" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center rounded-2xl z-20 transition-all duration-300 opacity-100 pointer-events-auto">
          <div class="text-center">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400 mx-auto mb-2 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122" />
            </svg>
            <span class="text-sm font-semibold text-slate-300">Click anywhere inside the box to start typing</span>
          </div>
        </div>

        <!-- Quote display letters container -->
        <div id="quoteDisplay" class="text-xl md:text-2xl leading-relaxed text-slate-500 font-medium tracking-wide break-words z-10 relative select-none">
          <!-- Dynamically filled with spans -->
        </div>

        <!-- Hidden inputs capturing text -->
        <textarea id="quoteInput" class="absolute inset-0 opacity-0 w-full h-full cursor-text resize-none outline-none z-0" autocomplete="off" autofocus></textarea>
      </div>

      <!-- Controls & Reset -->
      <div class="flex items-center justify-between mt-2">
        <span class="text-xs text-slate-400 italic">Press <kbd class="px-1.5 py-0.5 bg-slate-800 border border-slate-700 rounded text-slate-300 text-[10px]">Esc</kbd> or click reload to skip quote</span>
        <button id="skip-button" class="py-2.5 px-6 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-200 font-bold rounded-2xl border border-white/5 transition-all cursor-pointer text-sm">
          Skip Quote 🔁
        </button>
      </div>
    </div>

    <script>
      // Local fallback database of elegant programming and motivational quotes
      const localQuotes = [
        "The only way to do great work is to love what you do. If you haven't found it yet, keep looking. Don't settle.",
        "Talk is cheap. Show me the code. Logic will get you from A to B. Imagination will take you everywhere.",
        "Programs must be written for people to read, and only secondarily for machines to execute.",
        "Truth can only be found in one place: the code itself. Write simple, self-explanatory instructions.",
        "Simplicity is the soul of efficiency. Simple is better than complex, and complex is better than complicated.",
        "Make it work, make it right, make it fast. Optimizing before you measure is the root of all coding sins.",
        "Before software can be reusable it first has to be usable. Focus on the user experience above all else.",
        "First, solve the problem. Then, write the code. Do not start typing before the path is clear in your mind.",
        "Experience is the name everyone gives to their mistakes. Learn from them and continue building.",
        "Any fool can write code that a computer can understand. Good programmers write code that humans can understand."
      ];

      const RANDOM_QUOTE_API_URL = "https://api.quotable.io/random";
      const quoteDisplayElement = document.getElementById("quoteDisplay");
      const quoteInputElement = document.getElementById("quoteInput");
      const timerElement = document.getElementById("timer");
      const wordsPerMinuteElement = document.getElementById("wpm");
      const accuracyElement = document.getElementById("accuracy");
      
      const typingContainer = document.getElementById("typing-area-container");
      const focusOverlay = document.getElementById("focus-overlay");
      const skipBtn = document.getElementById("skip-button");

      let startTime;
      let timerInterval = null;
      let totalTyped = 0;
      let totalErrors = 0;
      let currentQuoteLength = 0;

      // Handle custom mouse focuses
      typingContainer.addEventListener("click", () => {
        quoteInputElement.focus();
      });

      quoteInputElement.addEventListener("focus", () => {
        focusOverlay.classList.remove("opacity-100", "pointer-events-auto");
        focusOverlay.classList.add("opacity-0", "pointer-events-none");
      });

      quoteInputElement.addEventListener("blur", () => {
        focusOverlay.classList.remove("opacity-0", "pointer-events-none");
        focusOverlay.classList.add("opacity-100", "pointer-events-auto");
      });

      // Capture escape key to skip
      window.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          getNextQuote();
        }
      });

      skipBtn.addEventListener("click", getNextQuote);

      quoteInputElement.addEventListener("input", () => {
        const quoteSpans = quoteDisplayElement.querySelectorAll(".letter");
        const valueArray = quoteInputElement.value.split("");
        
        let right = true;
        let correctCount = 0;
        let errorsThisTurn = 0;
        
        // Reset states
        quoteSpans.forEach((span) => span.className = "letter");

        quoteSpans.forEach((characterSpan, i) => {
          const character = valueArray[i];

          // Character not yet typed
          if (character == null) {
            right = false;
            if (i === valueArray.length) {
              characterSpan.classList.add("current"); // blinking caret
            }
          } 
          // Character typed correctly
          else if (character === characterSpan.textContent) {
            characterSpan.classList.add("right");
            correctCount++;
          } 
          // Character typed incorrectly
          else {
            characterSpan.classList.add("wrong");
            errorsThisTurn++;
            right = false;
          }
        });

        // Compute Live Stats
        const timeElapsed = getTimerTime();
        if (timeElapsed > 0) {
          // Standard WPM formula: (characters typed / 5) / time elapsed in minutes
          let liveWpm = Math.round((correctCount / 5) / (timeElapsed / 60));
          wordsPerMinuteElement.textContent = Math.max(0, liveWpm);
        } else {
          wordsPerMinuteElement.textContent = "0";
        }

        // Live Accuracy computation
        const totalTypedThisQuote = valueArray.length;
        if (totalTypedThisQuote > 0) {
          let accuracy = Math.round(((totalTypedThisQuote - errorsThisTurn) / totalTypedThisQuote) * 100);
          accuracyElement.textContent = Math.max(0, accuracy) + "%";
        } else {
          accuracyElement.textContent = "100%";
        }

        // Check if finished quote
        if (right && valueArray.length >= currentQuoteLength) {
          getNextQuote();
        }
      });

      async function getRandomQuote() {
        try {
          // Attempt to fetch from API with a 3-second timeout
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 3000);

          const response = await fetch(RANDOM_QUOTE_API_URL, { signal: controller.signal });
          clearTimeout(timeoutId);
          
          if (!response.ok) throw new Error("API response error");
          
          const data = await response.json();
          return data.content;
        } catch (error) {
          console.warn("Quote API request failed or timed out. Using local fallback database.");
          // Select from fallback lists locally
          return localQuotes[Math.floor(Math.random() * localQuotes.length)];
        }
      }

      async function getNextQuote() {
        // Reset live stats elements
        wordsPerMinuteElement.textContent = "0";
        accuracyElement.textContent = "100%";
        
        quoteDisplayElement.innerHTML = `<span class="text-slate-500 animate-pulse text-sm">Loading sectors...</span>`;
        
        const quote = await getRandomQuote();
        currentQuoteLength = quote.length;
        
        quoteDisplayElement.innerHTML = "";
        quote.split("").forEach((character, index) => {
          const characterSpan = document.createElement("span");
          characterSpan.textContent = character;
          characterSpan.className = "letter";
          if (index === 0) characterSpan.className = "letter current"; // Set initial caret position
          quoteDisplayElement.appendChild(characterSpan);
        });

        quoteInputElement.value = "";
        startTimer();
        quoteInputElement.focus();
      }

      function startTimer() {
        // Clear existing interval safely to avoid memory leaks
        if (timerInterval) {
          clearInterval(timerInterval);
        }
        
        timerElement.textContent = "0s";
        startTime = new Date();
        
        timerInterval = setInterval(() => {
          timerElement.textContent = getTimerTime() + "s";
        }, 1000);
      }

      function getTimerTime() {
        return Math.floor((new Date() - startTime) / 1000);
      }

      // Initial loading trigger
      getNextQuote();
    </script>
  </body>
</html>
