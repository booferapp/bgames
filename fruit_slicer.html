<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Slicer - Fruit Slicing Game</title>
  <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />

  <!-- Google Font & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>

  <style>
    .fruit {
      position: absolute;
      cursor: crosshair;
      user-select: none;
      transition: transform 0.1s linear;
    }

    /* Exploding slices particles animation */
    .particle {
      position: absolute;
      pointer-events: none;
      animation: explode-particle 0.6s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
    }

    @keyframes explode-particle {
      0% {
        transform: translate(0, 0) scale(1.1) rotate(0);
        opacity: 1;
      }

      100% {
        transform: translate(var(--dx), var(--dy)) scale(0.3) rotate(var(--rot)) opacity: 0;
      }
    }
  </style>
</head>

<body
  class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">

  <!-- Glowing background elements -->
  <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>

  <div
    class="w-full max-w-2xl bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

    <!-- Top HUD Header -->
    <header class="w-full flex items-center justify-between border-b border-white/5 pb-3.5 mb-5">
      <div>
        <h1
          class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-indigo-400 uppercase drop-shadow-md">
          Neon Slicer
        </h1>
        <p class="text-slate-400 text-xs mt-0.5">Shatter the fruits! Avoid letting them fall</p>
      </div>
    </header>

    <!-- HUD Stats Panel -->
    <div class="flex items-center justify-between w-full mb-4 px-2">
      <!-- Score badges -->
      <div class="flex items-center gap-2 bg-slate-950/40 border border-white/5 py-2 px-4 rounded-2xl shadow-inner">
        <span class="text-lg">🏆</span>
        <span id="scoreValue" class="text-lg font-extrabold text-emerald-400">0</span>
      </div>

      <!-- Lives count -->
      <div id="trialsleft"
        class="flex items-center gap-1.5 bg-slate-950/40 border border-white/5 py-2 px-4 rounded-2xl">
        <!-- Populated in JS with hearts -->
      </div>
    </div>

    <!-- Main Slicing Board Screen -->
    <div id="fruitcontainer"
      class="relative w-full h-[380px] bg-slate-950 border border-slate-800 rounded-2xl overflow-hidden shadow-inner cursor-crosshair flex items-center justify-center">

      <!-- Front splash screen overlay inside container -->
      <div id="front"
        class="absolute inset-0 flex flex-col items-center justify-center bg-slate-950/80 p-6 text-center z-20">
        <span class="text-6xl mb-4 animate-bounce block">🍉</span>
        <h2
          class="text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 uppercase mb-2">
          Neon Slice Action</h2>
        <p class="text-xs text-slate-400 max-w-[240px] mb-6">Swipe or hover across the falling fruits to slice them!</p>
        <button id="start-btn"
          class="py-2.5 px-6 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl shadow-lg transition-all cursor-pointer text-sm">
          Start Action
        </button>
      </div>

      <!-- Exploding particles container -->
      <div id="particles-layer" class="absolute inset-0 z-10 pointer-events-none"></div>

      <!-- The Fruit Element -->
      <div id="fruit1" class="fruit text-5xl z-15 select-none hidden">🍉</div>
    </div>

    <!-- Action Button -->
    <button id="startReset"
      class="w-full py-4 bg-slate-800 hover:bg-slate-700 active:scale-[0.98] border border-white/5 text-slate-200 font-bold rounded-2xl shadow-lg mt-5 transition-all cursor-pointer">
      Start Game
    </button>
  </div>

  <!-- Game Over overlay modal -->
  <div id="win-modal"
    class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
    <div
      class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl"></div>
      <h2 class="text-3xl font-black text-rose-500 mb-2 uppercase tracking-wide">Game Over 💀</h2>
      <p class="text-slate-400 text-sm mb-6">You ran out of lives. Slice faster next time!</p>

      <div class="bg-slate-950/40 border border-white/5 rounded-2xl py-3 mb-6">
        <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-0.5">Final Score</span>
        <span id="modal-score" class="text-3xl font-black text-white">0</span>
      </div>

      <button id="modal-restart"
        class="w-full py-3.5 bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-400 hover:to-teal-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
        Play Again
      </button>
    </div>
  </div>

  <script>
    const container = document.getElementById("fruitcontainer");
    const particlesLayer = document.getElementById("particles-layer");
    const fruit = document.getElementById("fruit1");
    const frontOverlay = document.getElementById("front");

    const startResetBtn = document.getElementById("startReset");
    const startBtn = document.getElementById("start-btn");
    const scoreValue = document.getElementById("scoreValue");
    const trialsleftContainer = document.getElementById("trialsleft");

    const winModal = document.getElementById("win-modal");
    const modalScore = document.getElementById("modal-score");
    const modalRestart = document.getElementById("modal-restart");

    const fruitsEmojis = [
      { char: "🍉", name: "watermelon" },
      { char: "🍎", name: "apple" },
      { char: "🍍", name: "pineapple" },
      { char: "🍋", name: "lemon" },
      { char: "🍇", name: "grapes" },
      { char: "🍒", name: "cherry" },
      { char: "🍌", name: "banana" },
      { char: "🍓", name: "strawberry" },
      { char: "🥑", name: "avocado" },
      { char: "🥥", name: "coconut" }
    ];

    let playing = false;
    let score = 0;
    let lives = 3;
    let stepSpeed = 0;
    let gameInterval = null;
    let launchTimeout = null;
    let currentFruit = null;
    let audioCtx = null;

    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }

    startBtn.addEventListener("click", startGame);
    startResetBtn.addEventListener("click", () => {
      if (playing) {
        resetGame();
      } else {
        startGame();
      }
    });

    modalRestart.addEventListener("click", () => {
      winModal.classList.add("hidden");
      winModal.classList.remove("flex");
      startGame();
    });

    // Mouse/Touch triggers for slice interaction
    fruit.addEventListener("mouseenter", sliceFruit);
    fruit.addEventListener("touchstart", (e) => {
      e.preventDefault();
      sliceFruit();
    });

    // Swipe support on board
    container.addEventListener("touchmove", (e) => {
      if (!playing) return;
      const touch = e.touches[0];
      const rect = fruit.getBoundingClientRect();

      // Check if touch coordinates lie inside the fruit bounds
      if (
        touch.clientX >= rect.left &&
        touch.clientX <= rect.right &&
        touch.clientY >= rect.top &&
        touch.clientY <= rect.bottom
      ) {
        sliceFruit();
      }
    });

    function startGame() {
      initAudio();
      playing = true;
      score = 0;
      lives = 3;

      if (launchTimeout) clearTimeout(launchTimeout);

      scoreValue.textContent = "0";
      frontOverlay.classList.add("hidden");
      startResetBtn.textContent = "Reset Game";
      startResetBtn.className = "w-full py-4 bg-rose-600/20 hover:bg-rose-600/30 text-rose-450 active:scale-[0.98] border border-rose-500/20 font-bold rounded-2xl shadow-lg mt-5 transition-all cursor-pointer";

      updateHearts();
      launchFruit();
    }

    function resetGame() {
      playing = false;
      clearInterval(gameInterval);
      if (launchTimeout) clearTimeout(launchTimeout);

      fruit.classList.add("hidden");
      frontOverlay.classList.remove("hidden");
      startResetBtn.textContent = "Start Game";
      startResetBtn.className = "w-full py-4 bg-slate-800 hover:bg-slate-700 active:scale-[0.98] border border-white/5 text-slate-200 font-bold rounded-2xl shadow-lg mt-5 transition-all cursor-pointer";
    }

    function updateHearts() {
      trialsleftContainer.innerHTML = "";
      for (let i = 0; i < 3; i++) {
        const heart = document.createElement("span");
        heart.textContent = (i < lives) ? "❤️" : "🖤";
        heart.className = "text-sm";
        trialsleftContainer.appendChild(heart);
      }
    }

    function launchFruit() {
      if (!playing) return;

      // Choose random fruit details
      currentFruit = fruitsEmojis[Math.floor(Math.random() * fruitsEmojis.length)];
      fruit.textContent = currentFruit.char;

      const containerWidth = container.clientWidth;

      // Reset positioning variables
      fruit.style.left = `${Math.floor(Math.random() * (containerWidth - 80)) + 40}px`;
      fruit.style.top = `-50px`;

      fruit.classList.remove("hidden");

      // Randomize speed steps
      stepSpeed = Math.floor(Math.random() * 4) + 2.5;

      if (gameInterval) clearInterval(gameInterval);

      gameInterval = setInterval(() => {
        const topPos = parseFloat(fruit.style.top || -50);
        fruit.style.top = `${topPos + stepSpeed}px`;

        // Rotate item as it falls
        fruit.style.transform = `rotate(${topPos * 1.5}deg)`;

        // Off-screen boundary checks
        if (topPos > container.clientHeight) {
          clearInterval(gameInterval);
          lives--;
          updateHearts();

          if (lives <= 0) {
            triggerGameOver();
          } else {
            launchFruit();
          }
        }
      }, 12);
    }

    function sliceFruit() {
      if (!playing || fruit.classList.contains("hidden")) return;

      // Play frequency swish/splat sound synthesizer
      playSliceSound();

      // Increment Score
      score++;
      scoreValue.textContent = score;

      // Hide fruit immediately
      clearInterval(gameInterval);
      fruit.classList.add("hidden");

      // Trigger custom particle splat explosion
      triggerSplatExplosion();

      // Launch next fruit
      if (launchTimeout) clearTimeout(launchTimeout);
      launchTimeout = setTimeout(launchFruit, 600);
    }

    // Pure JS/CSS Particle Exploder
    function triggerSplatExplosion() {
      const topVal = parseFloat(fruit.style.top);
      const leftVal = parseFloat(fruit.style.left);

      // Create 8 particle slices
      for (let i = 0; i < 8; i++) {
        const p = document.createElement("span");
        p.textContent = currentFruit.char;
        p.className = "particle text-2xl select-none";
        p.style.top = `${topVal + 20}px`;
        p.style.left = `${leftVal + 20}px`;

        // Random offset values
        const dx = (Math.random() * 140 - 70) + "px";
        const dy = (Math.random() * 140 - 70) + "px";
        const rot = (Math.random() * 360 - 180) + "deg";

        p.style.setProperty("--dx", dx);
        p.style.setProperty("--dy", dy);
        p.style.setProperty("--rot", rot);

        particlesLayer.appendChild(p);

        // Delete particle from DOM after animation completes
        setTimeout(() => p.remove(), 600);
      }
    }

    // Voice synthesiser beep sweep (100% reliable offline sound)
    function playSliceSound() {
      try {
        initAudio();
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.type = "sine";
        osc.frequency.setValueAtTime(550, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.12);

        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start();
        osc.stop(audioCtx.currentTime + 0.12);
      } catch (e) {
        console.warn("AudioContext block", e);
      }
    }

    function triggerGameOver() {
        if (window.Boofer && Boofer.isAvailable()) {
          const finalScore = typeof score !== 'undefined' ? score : (typeof finalScore !== 'undefined' ? finalScore : 0);
          Boofer.gameOver(finalScore);
        }

      playing = false;
      clearInterval(gameInterval);
      if (launchTimeout) clearTimeout(launchTimeout);

      modalScore.textContent = score;
      winModal.classList.remove("hidden");
      winModal.classList.add("flex");

      resetGame();
    }
  </script>
</body>

</html>
