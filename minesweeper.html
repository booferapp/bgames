<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Minesweeper</title>
  <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
  
  <!-- Google Font & Tailwind -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
        },
      },
    }
  </script>
</head>
<body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30 selection:text-indigo-200">

  <!-- Glowing backgrounds -->
  <div class="absolute top-1/4 left-1/4 w-80 h-80 bg-red-500/5 rounded-full blur-3xl pointer-events-none"></div>
  <div class="absolute bottom-1/4 right-1/4 w-80 h-80 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>

  <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
    <div class="absolute -top-10 -left-10 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl"></div>

    <header class="text-center mb-6">
      <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-indigo-400 uppercase drop-shadow-md">
        Minesweeper
      </h1>
      <p class="text-slate-400 text-xs mt-1">Clear all safe spaces without detonating any mines</p>
    </header>

    <!-- HUD Status Panel -->
    <div class="grid grid-cols-2 gap-4 w-full mb-6">
      <!-- Mines Left Counter -->
      <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Mines</span>
        <span id="mines-count" class="text-xl font-extrabold text-rose-400">10</span>
      </div>
      
      <!-- Flag Tool Toggle -->
      <button id="flag-button" class="border border-white/5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-2xl transition-all flex items-center justify-center gap-2 cursor-pointer active:scale-95 py-2.5 px-4 select-none">
        <span class="text-lg">🚩</span>
        <span class="text-xs uppercase tracking-wider">Flag: Off</span>
      </button>
    </div>

    <!-- Minesweeper Board -->
    <div id="board" class="grid grid-cols-8 gap-1.5 p-2 bg-slate-950/60 border border-slate-800/80 rounded-2xl w-fit shadow-inner mb-6">
      <!-- Dynamically filled with tiles -->
    </div>

    <!-- Reset Trigger -->
    <button id="reset-button" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
      Reset Board 🔁
    </button>
  </div>

  <!-- End Game Alert Overlay -->
  <div id="game-over-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
    <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl"></div>
      <h2 id="modal-title" class="text-3xl font-black text-rose-500 mb-2 uppercase tracking-wide">Boom!</h2>
      <p id="modal-message" class="text-slate-400 text-sm mb-6">You detonated a mine. Watch your step next time!</p>
      
      <button id="modal-restart" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
        Play Again
      </button>
    </div>
  </div>

  <script>
    let board = [];
    const rows = 8;
    const columns = 8;
    const minesCount = 10;
    let minesLocation = []; 

    let tilesClicked = 0; 
    let flagEnabled = false;
    let gameOver = false;

    const boardElement = document.getElementById("board");
    const minesCountEl = document.getElementById("mines-count");
    const flagBtn = document.getElementById("flag-button");
    const resetButton = document.getElementById("reset-button");
    
    // Modal selectors
    const modal = document.getElementById("game-over-modal");
    const modalTitle = document.getElementById("modal-title");
    const modalMessage = document.getElementById("modal-message");
    const modalRestart = document.getElementById("modal-restart");

    window.onload = function () {
      initGame();
      flagBtn.addEventListener("click", toggleFlag);
      resetButton.addEventListener("click", resetGame);
      modalRestart.addEventListener("click", () => {
        modal.classList.add("hidden");
        modal.classList.remove("flex");
        resetGame();
      });
    };

    function initGame() {
      board = [];
      minesLocation = [];
      tilesClicked = 0;
      gameOver = false;
      
      minesCountEl.innerText = minesCount;
      boardElement.innerHTML = "";
      
      setMines();

      // Populate board grid
      for (let r = 0; r < rows; r++) {
        let row = [];
        for (let c = 0; c < columns; c++) {
          let tile = document.createElement("div");
          tile.id = r.toString() + "-" + c.toString();
          
          // Styling tile using Tailwind
          tile.className = "w-10 h-10 sm:w-11 sm:h-11 bg-slate-800 hover:bg-slate-700 border border-slate-750 rounded-xl flex items-center justify-center font-black text-lg cursor-pointer select-none transition-all duration-150 shadow-sm";
          
          tile.addEventListener("click", clickTile);
          
          boardElement.appendChild(tile);
          row.push(tile);
        }
        board.push(row);
      }
    }

    function resetGame() {
      // Clean display state of flag button
      flagEnabled = false;
      flagBtn.className = "border border-white/5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-2xl transition-all flex items-center justify-center gap-2 cursor-pointer active:scale-95 py-2.5 px-4 select-none";
      flagBtn.innerHTML = `<span class="text-lg">🚩</span><span class="text-xs uppercase tracking-wider">Flag: Off</span>`;
      
      initGame();
    }

    function setMines() {
      let minesLeft = minesCount;
      while (minesLeft > 0) {
        let r = Math.floor(Math.random() * rows);
        let c = Math.floor(Math.random() * columns);
        let id = r.toString() + "-" + c.toString();

        if (!minesLocation.includes(id)) {
          minesLocation.push(id);
          minesLeft -= 1;
        }
      }
    }

    function toggleFlag() {
      if (gameOver) return;
      
      flagEnabled = !flagEnabled;
      if (flagEnabled) {
        flagBtn.className = "border border-amber-500/30 bg-amber-500/10 text-amber-400 font-bold rounded-2xl transition-all flex items-center justify-center gap-2 cursor-pointer active:scale-95 py-2.5 px-4 select-none shadow-[0_0_12px_rgba(245,158,11,0.2)]";
        flagBtn.innerHTML = `<span class="text-lg">🚩</span><span class="text-xs uppercase tracking-wider">Flag: On</span>`;
      } else {
        flagBtn.className = "border border-white/5 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold rounded-2xl transition-all flex items-center justify-center gap-2 cursor-pointer active:scale-95 py-2.5 px-4 select-none";
        flagBtn.innerHTML = `<span class="text-lg">🚩</span><span class="text-xs uppercase tracking-wider">Flag: Off</span>`;
      }
    }

    function clickTile() {
      if (gameOver || this.classList.contains("tile-clicked")) {
        return;
      }

      let tile = this;
      if (flagEnabled) {
        if (tile.innerText == "") {
          tile.innerText = "🚩";
          tile.classList.add("text-rose-400");
        } else if (tile.innerText == "🚩") {
          tile.innerText = "";
          tile.classList.remove("text-rose-400");
        }
        return;
      }

      // If clicked on a flagged tile under normal clicking, do nothing
      if (tile.innerText == "🚩") {
        return;
      }

      if (minesLocation.includes(tile.id)) {
        gameOver = true;
        revealMines();
        
        // Show Lose Modal
        showEndModal(false);
        return;
      }

      let coords = tile.id.split("-"); 
      let r = parseInt(coords[0]);
      let c = parseInt(coords[1]);
      checkMine(r, c);
    }

    function revealMines() {
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < columns; c++) {
          let tile = board[r][c];
          if (minesLocation.includes(tile.id)) {
            tile.innerText = "💣";
            tile.className = "w-10 h-10 sm:w-11 sm:h-11 bg-rose-500/20 border border-rose-500/50 text-rose-500 flex items-center justify-center font-black text-lg select-none rounded-xl shadow-inner animate-pulse";
          }
        }
      }
    }

    // Number colors using modern Tailwind styling
    const numberColors = {
      1: "text-sky-400",
      2: "text-emerald-400",
      3: "text-rose-400",
      4: "text-indigo-400",
      5: "text-amber-400",
      6: "text-teal-400",
      7: "text-fuchsia-400",
      8: "text-slate-400"
    };

    function checkMine(r, c) {
      if (r < 0 || r >= rows || c < 0 || c >= columns) {
        return;
      }
      if (board[r][c].classList.contains("tile-clicked")) {
        return;
      }

      const tile = board[r][c];
      tile.classList.remove("bg-slate-800", "hover:bg-slate-700", "cursor-pointer");
      tile.classList.add("tile-clicked", "bg-slate-900/80", "border-slate-950", "text-slate-400", "cursor-default", "shadow-inner");
      
      tilesClicked += 1;
      let minesFound = 0;

      // Checking neighbors
      minesFound += checkTile(r - 1, c - 1); //top left
      minesFound += checkTile(r - 1, c);     //top
      minesFound += checkTile(r - 1, c + 1); //top right
      minesFound += checkTile(r, c - 1);     //left
      minesFound += checkTile(r, c + 1);     //right
      minesFound += checkTile(r + 1, c - 1); //bottom left
      minesFound += checkTile(r + 1, c);     //bottom
      minesFound += checkTile(r + 1, c + 1); //bottom right

      if (minesFound > 0) {
        tile.innerText = minesFound;
        if (numberColors[minesFound]) {
          tile.classList.add(numberColors[minesFound]);
        }
      } else {
        tile.innerText = "";

        // Recursively check clean tiles
        checkMine(r - 1, c - 1);
        checkMine(r - 1, c);
        checkMine(r - 1, c + 1);
        checkMine(r, c - 1);
        checkMine(r, c + 1);
        checkMine(r + 1, c - 1);
        checkMine(r + 1, c);
        checkMine(r + 1, c + 1);
      }

      if (tilesClicked == rows * columns - minesCount) {
        minesCountEl.innerText = "Cleared";
        gameOver = true;
        showEndModal(true);
      }
    }

    function checkTile(r, c) {
      if (r < 0 || r >= rows || c < 0 || c >= columns) {
        return 0;
      }
      if (minesLocation.includes(r.toString() + "-" + c.toString())) {
        return 1;
      }
      return 0;
    }

    function showEndModal(isWin) {
      if (isWin) {
        modalTitle.innerText = "Cleared! 🎉";
        modalTitle.className = "text-3xl font-black text-emerald-400 mb-2 uppercase tracking-wide";
        modalMessage.innerText = "Congratulations! You mapped all safety sectors without detonating any mines.";
      } else {
        modalTitle.innerText = "Boom! 💀";
        modalTitle.className = "text-3xl font-black text-rose-500 mb-2 uppercase tracking-wide";
        modalMessage.innerText = "You detonated a mine. Watch your step next time!";
      }
      
      modal.classList.remove("hidden");
      modal.classList.add("flex");
    }
  </script>
</body>
</html>
