<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Hangman - Word Guessing Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    <style>
      .figure-part {
        display: none;
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: draw 0.6s ease-out forwards;
      }
      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }
    </style>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 flex items-center justify-center p-4 selection:bg-indigo-500/30 selection:text-indigo-200">
    
    <div class="w-full max-w-2xl bg-slate-900/60 backdrop-blur-xl border border-white/5 rounded-3xl p-6 md:p-8 shadow-2xl flex flex-col items-center relative overflow-hidden">
      <!-- Glow effects -->
      <div class="absolute -top-24 -left-24 w-48 h-48 bg-indigo-500/10 rounded-full blur-3xl pointer-events-none"></div>
      <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-pink-500/10 rounded-full blur-3xl pointer-events-none"></div>

      <!-- Header -->
      <header class="text-center mb-6 z-10">
        <h1 class="text-4xl font-extrabold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 uppercase drop-shadow-md">Hangman</h1>
        <p class="text-slate-400 text-sm mt-2">Find the hidden word before the stickman meets his fate</p>
      </header>

      <!-- Game Container -->
      <div class="w-full flex flex-col md:flex-row items-center justify-around gap-8 z-10">
        <!-- SVG Canvas (Hangman) -->
        <div class="relative bg-slate-950/40 p-4 rounded-2xl border border-white/5 shadow-inner">
          <svg height="250" width="200" class="stroke-indigo-400 stroke-[5] fill-none stroke-linecap-round filter drop-shadow-[0_0_8px_rgba(129,140,248,0.5)]">
            <!-- Scaffold -->
            <line x1="60" y1="20" x2="140" y2="20" class="stroke-slate-500" />
            <line x1="140" y1="20" x2="140" y2="50" class="stroke-slate-500" />
            <line x1="60" y1="20" x2="60" y2="230" class="stroke-slate-500" />
            <line x1="20" y1="230" x2="100" y2="230" class="stroke-slate-500" />
            
            <!-- Head -->
            <circle cx="140" cy="70" r="20" class="figure-part stroke-indigo-400" />
            <!-- Body -->
            <line x1="140" y1="90" x2="140" y2="150" class="figure-part stroke-indigo-400" />
            <!-- Arms -->
            <line x1="140" y1="110" x2="110" y2="130" class="figure-part stroke-indigo-400" />
            <line x1="140" y1="110" x2="170" y2="130" class="figure-part stroke-indigo-400" />
            <!-- Legs -->
            <line x1="140" y1="150" x2="115" y2="195" class="figure-part stroke-indigo-400" />
            <line x1="140" y1="150" x2="165" y2="195" class="figure-part stroke-indigo-400" />
          </svg>
        </div>

        <!-- Right Side: Info & Letters -->
        <div class="flex flex-col items-center md:items-start justify-center flex-1 w-full gap-6">
          <div class="text-center md:text-left">
            <h2 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-2">Incorrect Letters</h2>
            <div id="wrong-letters" class="flex flex-wrap gap-2 min-h-[40px] justify-center md:justify-start">
              <!-- Dynamically populated -->
              <span class="text-slate-500 italic text-sm">None yet</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Word Display -->
      <div id="word" class="flex items-center justify-center gap-2 mt-8 mb-6 flex-wrap min-h-[60px] z-10">
        <!-- Dynamically populated letters -->
      </div>

      <!-- Virtual Keyboard -->
      <div id="keyboard" class="grid grid-cols-7 sm:grid-cols-9 gap-1.5 md:gap-2 w-full mt-4 max-w-xl z-10">
        <!-- JS builds these keys -->
      </div>

      <!-- Toast Notification -->
      <div id="notification-container" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-slate-900 border border-amber-500/30 text-amber-300 font-semibold px-6 py-3 rounded-full shadow-2xl flex items-center gap-2 transition-all duration-300 translate-y-24 opacity-0 pointer-events-none z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-amber-400" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span>You have already entered this letter</span>
      </div>

      <!-- End Game Modal -->
      <div id="popup-container" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden">
          <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
          <h2 id="final-message" class="text-3xl font-extrabold text-white mb-2"></h2>
          <p id="final-message-reveal-word" class="text-indigo-400 font-medium tracking-wide text-lg mt-2 mb-6"></p>
          <button id="play-button" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold text-lg rounded-2xl shadow-lg hover:shadow-indigo-500/20 active:scale-[0.98] transition-all cursor-pointer">
            Play Again
          </button>
        </div>
      </div>
    </div>

    <script>
      const wordElement = document.getElementById("word");
      const wrongLettersElement = document.getElementById("wrong-letters");
      const playAgainButton = document.getElementById("play-button");
      const popup = document.getElementById("popup-container");
      const notification = document.getElementById("notification-container");
      const finalMessage = document.getElementById("final-message");
      const finalMessageRevealWord = document.getElementById("final-message-reveal-word");
      const figureParts = document.querySelectorAll(".figure-part");
      const keyboardElement = document.getElementById("keyboard");

      const words = [
        "application", "programming", "interface", "wizard", "element",
        "prototype", "callback", "undefined", "arguments", "settings",
        "selector", "container", "instance", "response", "console",
        "constructor", "token", "function", "return", "length",
        "type", "node"
      ];
      
      let selectedWord = words[Math.floor(Math.random() * words.length)];
      let playable = true;
      const correctLetters = [];
      const wrongLetters = [];

      // Generate virtual keyboard layout
      function buildKeyboard() {
        keyboardElement.innerHTML = "";
        const letters = "abcdefghijklmnopqrstuvwxyz".split("");
        letters.forEach((letter) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.textContent = letter.toUpperCase();
          btn.id = `key-${letter}`;
          btn.className = "h-11 md:h-12 bg-slate-800 hover:bg-slate-700 text-slate-200 font-bold rounded-xl transition-all cursor-pointer active:scale-95 flex items-center justify-center text-sm md:text-base border border-white/5 select-none";
          btn.addEventListener("click", () => handleLetterInput(letter));
          keyboardElement.appendChild(btn);
        });
      }

      function displayWord() {
        wordElement.innerHTML = selectedWord
          .split("")
          .map(
            (letter) => `
            <span class="w-8 h-12 md:w-10 md:h-14 border-b-4 ${
              correctLetters.includes(letter) ? "border-indigo-400" : "border-slate-700"
            } flex items-center justify-center font-extrabold text-2xl md:text-3xl text-white select-none transition-colors duration-300">
              ${correctLetters.includes(letter) ? letter.toUpperCase() : ""}
            </span>
          `
          )
          .join("");

        const innerWord = wordElement.innerText.replace(/\s/g, "").toLowerCase();
        if (innerWord === selectedWord) {
          finalMessage.innerText = "Congratulations! 🏆";
          finalMessageRevealWord.innerText = `You guessed it: ${selectedWord.toUpperCase()}`;
          popup.classList.remove("hidden");
          popup.classList.add("flex");
          playable = false;
        }
      }

      function updateWrongLettersElement() {
        if (wrongLetters.length === 0) {
          wrongLettersElement.innerHTML = `<span class="text-slate-500 italic text-sm">None yet</span>`;
        } else {
          wrongLettersElement.innerHTML = wrongLetters
            .map(
              (letter) => `
              <span class="w-8 h-8 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 font-bold text-sm flex items-center justify-center animate-pop uppercase">
                ${letter}
              </span>
            `
            )
            .join("");
        }

        figureParts.forEach((part, index) => {
          const errors = wrongLetters.length;
          if (index < errors) {
            part.style.display = "block";
          } else {
            part.style.display = "none";
          }
        });

        if (wrongLetters.length === figureParts.length) {
          finalMessage.innerText = "Game Over 💀";
          finalMessageRevealWord.innerText = `The word was: ${selectedWord.toUpperCase()}`;
          popup.classList.remove("hidden");
          popup.classList.add("flex");
          playable = false;
        }
      }

      function showNotification() {
        notification.classList.remove("opacity-0", "translate-y-24", "pointer-events-none");
        notification.classList.add("opacity-100", "translate-y-0");
        setTimeout(() => {
          notification.classList.remove("opacity-100", "translate-y-0");
          notification.classList.add("opacity-0", "translate-y-24", "pointer-events-none");
        }, 2000);
      }

      function handleLetterInput(letter) {
        if (!playable) return;
        
        const keyBtn = document.getElementById(`key-${letter}`);

        if (selectedWord.includes(letter)) {
          if (!correctLetters.includes(letter)) {
            correctLetters.push(letter);
            displayWord();
            if (keyBtn) {
              keyBtn.classList.remove("bg-slate-800", "hover:bg-slate-700", "text-slate-200");
              keyBtn.classList.add("bg-indigo-600/30", "border-indigo-500/50", "text-indigo-400", "cursor-default", "pointer-events-none");
            }
          } else {
            showNotification();
          }
        } else {
          if (!wrongLetters.includes(letter)) {
            wrongLetters.push(letter);
            updateWrongLettersElement();
            if (keyBtn) {
              keyBtn.classList.remove("bg-slate-800", "hover:bg-slate-700", "text-slate-200");
              keyBtn.classList.add("bg-red-500/10", "border-red-500/20", "text-red-400/40", "cursor-default", "pointer-events-none");
            }
          } else {
            showNotification();
          }
        }
      }

      // Keyboard support
      window.addEventListener("keydown", (e) => {
        if (playable) {
          const letter = e.key.toLowerCase();
          if (letter >= "a" && letter <= "z" && !e.ctrlKey && !e.altKey && !e.metaKey) {
            handleLetterInput(letter);
          }
        }
      });

      playAgainButton.addEventListener("click", () => {
        playable = true;
        correctLetters.length = 0;
        wrongLetters.length = 0;
        selectedWord = words[Math.floor(Math.random() * words.length)];
        buildKeyboard();
        displayWord();
        updateWrongLettersElement();
        popup.classList.remove("flex");
        popup.classList.add("hidden");
      });

      // Init
      buildKeyboard();
      displayWord();
    </script>
  </body>
</html>
