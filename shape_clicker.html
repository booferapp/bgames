<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Click - Shape Clicker Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    
    <style>
      .box {
        position: absolute;
        cursor: pointer;
        display: none;
        transition: transform 0.1s ease-out;
      }
      .box:active {
        transform: scale(0.9);
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-lg bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="text-center mb-5 w-full border-b border-white/5 pb-3">
        <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-teal-400 uppercase drop-shadow-md">
          Neon Click
        </h1>
        <p class="text-slate-400 text-xs mt-1">Splat the shapes quickly to test your response index</p>
      </header>

      <!-- HUD Stats Panel -->
      <div class="grid grid-cols-2 gap-4 w-full mb-4">
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Last Speed</span>
          <span id="stat-last" class="text-lg font-extrabold text-teal-400">0s</span>
        </div>
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Personal Best</span>
          <span id="stat-best" class="text-lg font-extrabold text-indigo-400">--</span>
        </div>
      </div>

      <!-- Turn Message Alert banner -->
      <div id="message" class="w-full py-3 px-4 rounded-xl font-semibold text-sm text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 text-center min-h-[44px] flex items-center justify-center select-none">
        Click the shape below to initiate the timer!
      </div>

      <!-- Target click arena -->
      <div class="output relative w-full h-[320px] bg-slate-950 border border-slate-800/80 rounded-2xl shadow-inner mt-4 overflow-hidden">
        <!-- Spawns inside here -->
        <div id="box" class="box flex items-center justify-center font-bold text-slate-950 select-none shadow-[0_0_15px_rgba(255,255,255,0.4)]"></div>
      </div>
      
      <div class="text-center text-[10px] text-slate-500 mt-4 select-none">
        The shape will change its bounds and position after every splat
      </div>
    </div>

    <script>
      const game = { timer: 0, start: null };
      
      const message = document.getElementById("message");
      const box = document.getElementById("box");
      const output = document.querySelector(".output");
      
      const statLast = document.getElementById("stat-last");
      const statBest = document.getElementById("stat-best");

      // Personal Best score records from local storage
      let bestTime = localStorage.getItem("best-reaction-time") 
        ? parseFloat(localStorage.getItem("best-reaction-time")) 
        : null;
      
      if (bestTime) {
        statBest.textContent = bestTime + "s";
      }

      // Initial placement
      box.style.display = "block";
      box.style.width = "100px";
      box.style.height = "100px";
      box.style.backgroundColor = "#818cf8"; // Indigo
      box.style.borderRadius = "50%";
      box.style.left = "calc(50% - 50px)";
      box.style.top = "calc(50% - 50px)";
      box.innerHTML = `<span class="text-sm">START</span>`;

      box.addEventListener("click", () => {
        box.textContent = "";
        box.style.display = "none";
        
        // Random spawn timer delay up to 2.5 seconds
        game.timer = setTimeout(addBox, randomNumbers(2000) + 500);
        
        if (!game.start) {
          message.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-teal-400 bg-teal-500/10 border border-teal-500/20 text-center min-h-[44px] flex items-center justify-center select-none animate-pulse";
          message.textContent = "Standby... Watch for the shape!";
        } else {
          const current = new Date().getTime();
          const duration = (current - game.start) / 1000;
          
          statLast.textContent = duration + "s";
          
          // Assess if this is a personal best
          if (bestTime === null || duration < bestTime) {
            bestTime = duration;
            localStorage.setItem("best-reaction-time", bestTime);
            statBest.textContent = bestTime + "s";
            
            message.className = "w-full py-3 px-4 rounded-xl font-black text-sm text-emerald-400 bg-emerald-500/10 border border-emerald-500/20 text-center min-h-[44px] flex items-center justify-center select-none shadow-[0_0_12px_rgba(52,211,153,0.15)]";
            message.textContent = `New Personal Best! ${duration} seconds!`;
          } else {
            message.className = "w-full py-3 px-4 rounded-xl font-semibold text-sm text-indigo-300 bg-indigo-500/10 border border-indigo-500/20 text-center min-h-[44px] flex items-center justify-center select-none";
            message.textContent = `Click took ${duration} seconds.`;
          }
        }
      });

      function randomNumbers(max) {
        return Math.floor(Math.random() * max);
      }

      function addBox() {
        game.start = new Date().getTime();
        const container = output.getBoundingClientRect();
        
        // Restricting scale bounds to fit inside cards
        const dimX = randomNumbers(60) + 30; // 30px to 90px width
        const dimY = randomNumbers(60) + 30; // 30px to 90px height
        
        // Random glossy neon colors
        const colors = ["#f87171", "#fb923c", "#facc15", "#4ade80", "#2dd4bf", "#38bdf8", "#818cf8", "#c084fc", "#f472b6"];
        const chosenColor = colors[randomNumbers(colors.length)];

        box.style.display = "block";
        box.style.width = `${dimX}px`;
        box.style.height = `${dimY}px`;
        box.style.backgroundColor = chosenColor;
        box.style.boxShadow = `0 0 16px ${chosenColor}`;
        
        // Keep within output dimensions
        box.style.left = randomNumbers(container.width - dimX) + "px";
        box.style.top = randomNumbers(container.height - dimY) + "px";
        
        // Circle or square shape formats
        box.style.borderRadius = randomNumbers(2) === 0 ? "50%" : "8px";
      }
    </script>
  </body>
</html>
