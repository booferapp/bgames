    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    <script>
      Math.minmax = (value, limit) => {
        return Math.max(Math.min(value, limit), -limit);
      };

      const distance2D = (p1, p2) => {
        return Math.sqrt((p2.x - p1.x) ** 2 + (p2.y - p1.y) ** 2);
      };

      const getAngle = (p1, p2) => {
        let angle = Math.atan((p2.y - p1.y) / (p2.x - p1.x));
        if (p2.x - p1.x < 0) angle += Math.PI;
        return angle;
      };

      const closestItCanBe = (cap, ball) => {
        let angle = getAngle(cap, ball);
        const deltaX = Math.cos(angle) * (wallW / 2 + ballSize / 2);
        const deltaY = Math.sin(angle) * (wallW / 2 + ballSize / 2);
        return { x: cap.x + deltaX, y: cap.y + deltaY };
      };

      const rollAroundCap = (cap, ball) => {
        let impactAngle = getAngle(ball, cap);
        let heading = getAngle(
          { x: 0, y: 0 },
          { x: ball.velocityX, y: ball.velocityY }
        );
        let impactHeadingAngle = impactAngle - heading;
        const velocityMagnitude = distance2D(
          { x: 0, y: 0 },
          { x: ball.velocityX, y: ball.velocityY }
        );
        const velocityMagnitudeDiagonalToTheImpact = Math.sin(impactHeadingAngle) * velocityMagnitude;
        const closestDistance = wallW / 2 + ballSize / 2;
        const rotationAngle = Math.atan(velocityMagnitudeDiagonalToTheImpact / closestDistance);

        const deltaFromCap = {
          x: Math.cos(impactAngle + Math.PI - rotationAngle) * closestDistance,
          y: Math.sin(impactAngle + Math.PI - rotationAngle) * closestDistance,
        };

        const x = ball.x;
        const y = ball.y;
        const velocityX = ball.x - (cap.x + deltaFromCap.x);
        const velocityY = ball.y - (cap.y + deltaFromCap.y);
        const nextX = x + velocityX;
        const nextY = y + velocityY;

        return { x, y, velocityX, velocityY, nextX, nextY };
      };

      const slow = (number, difference) => {
        if (Math.abs(number) <= difference) return 0;
        if (number > difference) return number - difference;
        return number + difference;
      };

      const mazeElement = document.getElementById("maze");
      const joystickHeadElement = document.getElementById("joystick-head");
      const noteElement = document.getElementById("note");
      
      const btnEasy = document.getElementById("btn-easy");
      const btnHard = document.getElementById("btn-hard");
      const resetBtn = document.getElementById("reset-btn");

      let hardMode = false;
      let previousTimestamp;
      let gameInProgress = false;
      let mouseStartX;
      let mouseStartY;
      let accelerationX = 0;
      let accelerationY = 0;
      let frictionX = 0;
      let frictionY = 0;

      const pathW = 25; 
      const wallW = 10; 
      const ballSize = 10; 
      const holeSize = 18;

      let balls = [];
      let ballElements = [];
      let holeElements = [];

      // Setup Wall metadata
      const walls = [
        // Border
        { column: 0, row: 0, horizontal: true, length: 10 },
        { column: 0, row: 0, horizontal: false, length: 9 },
        { column: 0, row: 9, horizontal: true, length: 10 },
        { column: 10, row: 0, horizontal: false, length: 9 },

        // Horizontal lines starting in 1st column
        { column: 0, row: 6, horizontal: true, length: 1 },
        { column: 0, row: 8, horizontal: true, length: 1 },

        // Horizontal lines starting in 2nd column
        { column: 1, row: 1, horizontal: true, length: 2 },
        { column: 1, row: 7, horizontal: true, length: 1 },

        // Horizontal lines starting in 3rd column
        { column: 2, row: 2, horizontal: true, length: 2 },
        { column: 2, row: 4, horizontal: true, length: 1 },
        { column: 2, row: 5, horizontal: true, length: 1 },
        { column: 2, row: 6, horizontal: true, length: 1 },

        // Horizontal lines starting in 4th column
        { column: 3, row: 3, horizontal: true, length: 1 },
        { column: 3, row: 8, horizontal: true, length: 3 },

        // Horizontal lines starting in 5th column
        { column: 4, row: 6, horizontal: true, length: 1 },

        // Horizontal lines starting in 6th column
        { column: 5, row: 2, horizontal: true, length: 2 },
        { column: 5, row: 7, horizontal: true, length: 1 },

        // Horizontal lines starting in 7th column
        { column: 6, row: 1, horizontal: true, length: 1 },
        { column: 6, row: 6, horizontal: true, length: 2 },

        // Horizontal lines starting in 8th column
        { column: 7, row: 3, horizontal: true, length: 2 },
        { column: 7, row: 7, horizontal: true, length: 2 },

        // Horizontal lines starting in 9th column
        { column: 8, row: 1, horizontal: true, length: 1 },
        { column: 8, row: 2, horizontal: true, length: 1 },
        { column: 8, row: 3, horizontal: true, length: 1 },
        { column: 8, row: 4, horizontal: true, length: 2 },
        { column: 8, row: 8, horizontal: true, length: 2 },

        // Vertical lines after the 1st column
        { column: 1, row: 1, horizontal: false, length: 2 },
        { column: 1, row: 4, horizontal: false, length: 2 },

        // Vertical lines after the 2nd column
        { column: 2, row: 2, horizontal: false, length: 2 },
        { column: 2, row: 5, horizontal: false, length: 1 },
        { column: 2, row: 7, horizontal: false, length: 2 },

        // Vertical lines after the 3rd column
        { column: 3, row: 0, horizontal: false, length: 1 },
        { column: 3, row: 4, horizontal: false, length: 1 },
        { column: 3, row: 6, horizontal: false, length: 2 },

        // Vertical lines after the 4th column
        { column: 4, row: 1, horizontal: false, length: 2 },
        { column: 4, row: 6, horizontal: false, length: 1 },

        // Vertical lines after the 5th column
        { column: 5, row: 0, horizontal: false, length: 2 },
        { column: 5, row: 6, horizontal: false, length: 1 },
        { column: 5, row: 8, horizontal: false, length: 1 },

        // Vertical lines after the 6th column
        { column: 6, row: 4, horizontal: false, length: 1 },
        { column: 6, row: 6, horizontal: false, length: 1 },

        // Vertical lines after the 7th column
        { column: 7, row: 1, horizontal: false, length: 4 },
        { column: 7, row: 7, horizontal: false, length: 2 },

        // Vertical lines after the 8th column
        { column: 8, row: 2, horizontal: false, length: 1 },
        { column: 8, row: 4, horizontal: false, length: 2 },

        // Vertical lines after the 9th column
        { column: 9, row: 1, horizontal: false, length: 1 },
        { column: 9, row: 5, horizontal: false, length: 2 },
      ].map((wall) => ({
        x: wall.column * (pathW + wallW),
        y: wall.row * (pathW + wallW),
        horizontal: wall.horizontal,
        length: wall.length * (pathW + wallW),
      }));

      // Draw walls on maze
      walls.forEach(({ x, y, horizontal, length }) => {
        const wall = document.createElement("div");
        wall.setAttribute("class", "wall");
        wall.style.cssText = `
          left: ${x}px;
          top: ${y}px;
          width: ${wallW}px;
          height: ${length}px;
          transform: rotate(${horizontal ? -90 : 0}deg);
        `;
        mazeElement.appendChild(wall);
      });

      const holes = [
        { column: 0, row: 5 },
        { column: 2, row: 0 },
        { column: 2, row: 4 },
        { column: 4, row: 6 },
        { column: 6, row: 2 },
        { column: 6, row: 8 },
        { column: 8, row: 1 },
        { column: 8, row: 2 },
      ].map((hole) => ({
        x: hole.column * (wallW + pathW) + (wallW / 2 + pathW / 2),
        y: hole.row * (wallW + pathW) + (wallW / 2 + pathW / 2),
      }));

      // Start drag listener (mouse & touch support)
      joystickHeadElement.addEventListener("mousedown", dragStart);
      joystickHeadElement.addEventListener("touchstart", dragStart, { passive: false });

      function dragStart(event) {
        if (!gameInProgress) {
          const clientX = event.touches ? event.touches[0].clientX : event.clientX;
          const clientY = event.touches ? event.touches[0].clientY : event.clientY;
          
          mouseStartX = clientX;
          mouseStartY = clientY;
          gameInProgress = true;
          
          window.requestAnimationFrame(main);
          noteElement.textContent = "Roll the balls into center!";
          joystickHeadElement.style.animation = "none";
          joystickHeadElement.style.cursor = "grabbing";
        }
      }

      // Drag move handler
      window.addEventListener("mousemove", dragMove);
      window.addEventListener("touchmove", dragMove, { passive: false });

      function dragMove(event) {
        if (gameInProgress) {
          const clientX = event.touches ? event.touches[0].clientX : event.clientX;
          const clientY = event.touches ? event.touches[0].clientY : event.clientY;
          
          const mouseDeltaX = -Math.minmax(mouseStartX - clientX, 15);
          const mouseDeltaY = -Math.minmax(mouseStartY - clientY, 15);

          joystickHeadElement.style.left = `${mouseDeltaX}px`;
          joystickHeadElement.style.top = `${mouseDeltaY}px`;

          const rotationY = mouseDeltaX * 0.8; 
          const rotationX = mouseDeltaY * 0.8;

          mazeElement.style.transform = `rotateY(${rotationY}deg) rotateX(${-rotationX}deg)`;

          const gravity = 2;
          const friction = 0.01; 

          accelerationX = gravity * Math.sin((rotationY / 180) * Math.PI);
          accelerationY = gravity * Math.sin((rotationX / 180) * Math.PI);
          frictionX = gravity * Math.cos((rotationY / 180) * Math.PI) * friction;
          frictionY = gravity * Math.cos((rotationX / 180) * Math.PI) * friction;
        }
      }

      // End drag handler
      window.addEventListener("mouseup", dragEnd);
      window.addEventListener("touchend", dragEnd);

      function dragEnd() {
        if (gameInProgress) {
          // Keep game running, but return head to center
          joystickHeadElement.style.left = "0px";
          joystickHeadElement.style.top = "0px";
          joystickHeadElement.style.cursor = "grab";
          
          // Reset tilt variables
          mazeElement.style.transform = "rotateY(0deg) rotateX(0deg)";
          accelerationX = 0;
          accelerationY = 0;
        }
      }

      // Button mode selectors
      btnEasy.addEventListener("click", () => {
        hardMode = false;
        btnEasy.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-sm transition-all cursor-pointer";
        btnHard.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
        resetGame();
      });

      btnHard.addEventListener("click", () => {
        hardMode = true;
        btnHard.className = "px-3 py-1.5 text-xs font-bold rounded-lg bg-indigo-600 text-white shadow-sm transition-all cursor-pointer";
        btnEasy.className = "px-3 py-1.5 text-xs font-bold rounded-lg text-slate-400 hover:text-slate-200 transition-all cursor-pointer";
        resetGame();
      });

      resetBtn.addEventListener("click", resetGame);

      // Keyboard space trigger support
      window.addEventListener("keydown", function (event) {
        if (event.key == " ") {
          event.preventDefault();
          resetGame();
        }
      });

      function resetGame() {
        previousTimestamp = undefined;
        gameInProgress = false;
        mouseStartX = undefined;
        mouseStartY = undefined;
        accelerationX = undefined;
        accelerationY = undefined;
        frictionX = undefined;
        frictionY = undefined;

        mazeElement.style.transform = "rotateY(0deg) rotateX(0deg)";
        joystickHeadElement.style.left = "0px";
        joystickHeadElement.style.top = "0px";
        joystickHeadElement.style.animation = "pulse-glow 1.5s infinite alternate ease-in-out";
        joystickHeadElement.style.cursor = "grab";

        if (hardMode) {
          noteElement.innerHTML = `Avoid the black holes!`;
        } else {
          noteElement.innerHTML = `Roll all balls to the green center!`;
        }

        balls = [
          { column: 0, row: 0 },
          { column: 9, row: 0 },
          { column: 0, row: 8 },
          { column: 9, row: 8 },
        ].map((ball) => ({
          x: ball.column * (wallW + pathW) + (wallW / 2 + pathW / 2),
          y: ball.row * (wallW + pathW) + (wallW / 2 + pathW / 2),
          velocityX: 0,
          velocityY: 0,
        }));

        // Draw balls initial state
        if (ballElements.length === 0) {
          balls.forEach(({ x, y }) => {
            const ball = document.createElement("div");
            ball.className = "ball";
            ball.style.left = `${x}px`;
            ball.style.top = `${y}px`;
            mazeElement.appendChild(ball);
            ballElements.push(ball);
          });
        } else {
          balls.forEach(({ x, y }, index) => {
            ballElements[index].style.left = `${x}px`;
            ballElements[index].style.top = `${y}px`;
            ballElements[index].style.display = "block";
          });
        }

        // Clean previous holes
        holeElements.forEach((h) => mazeElement.removeChild(h));
        holeElements = [];

        // Build holes in hardMode
        if (hardMode) {
          holes.forEach(({ x, y }) => {
            const hole = document.createElement("div");
            hole.className = "black-hole";
            hole.style.left = `${x}px`;
            hole.style.top = `${y}px`;
            mazeElement.appendChild(hole);
            holeElements.push(hole);
          });
        }
      }

      function main(timestamp) {
        if (!gameInProgress) return;

        if (previousTimestamp === undefined) {
          previousTimestamp = timestamp;
          window.requestAnimationFrame(main);
          return;
        }

        const maxVelocity = 1.5;
        const timeElapsed = (timestamp - previousTimestamp) / 16;

        try {
          if (accelerationX != undefined && accelerationY != undefined) {
            const velocityChangeX = accelerationX * timeElapsed;
            const velocityChangeY = accelerationY * timeElapsed;
            const frictionDeltaX = frictionX * timeElapsed;
            const frictionDeltaY = frictionY * timeElapsed;

            balls.forEach((ball) => {
              if (velocityChangeX == 0) {
                ball.velocityX = slow(ball.velocityX, frictionDeltaX);
              } else {
                ball.velocityX = ball.velocityX + velocityChangeX;
                ball.velocityX = Math.max(Math.min(ball.velocityX, 1.5), -1.5);
                ball.velocityX = ball.velocityX - Math.sign(velocityChangeX) * frictionDeltaX;
                ball.velocityX = Math.minmax(ball.velocityX, maxVelocity);
              }

              if (velocityChangeY == 0) {
                ball.velocityY = slow(ball.velocityY, frictionDeltaY);
              } else {
                ball.velocityY = ball.velocityY + velocityChangeY;
                ball.velocityY = ball.velocityY - Math.sign(velocityChangeY) * frictionDeltaY;
                ball.velocityY = Math.minmax(ball.velocityY, maxVelocity);
              }

              ball.nextX = ball.x + ball.velocityX;
              ball.nextY = ball.y + ball.velocityY;

              // Collision checks against walls
              walls.forEach((wall) => {
                if (wall.horizontal) {
                  if (
                    ball.nextY + ballSize / 2 >= wall.y - wallW / 2 &&
                    ball.nextY - ballSize / 2 <= wall.y + wallW / 2
                  ) {
                    const wallStart = { x: wall.x, y: wall.y };
                    const wallEnd = { x: wall.x + wall.length, y: wall.y };

                    if (ball.nextX + ballSize / 2 >= wallStart.x - wallW / 2 && ball.nextX < wallStart.x) {
                      const distance = distance2D(wallStart, { x: ball.nextX, y: ball.nextY });
                      if (distance < ballSize / 2 + wallW / 2) {
                        const closest = closestItCanBe(wallStart, { x: ball.nextX, y: ball.nextY });
                        const rolled = rollAroundCap(wallStart, {
                          x: closest.x,
                          y: closest.y,
                          velocityX: ball.velocityX,
                          velocityY: ball.velocityY,
                        });
                        Object.assign(ball, rolled);
                      }
                    }

                    if (ball.nextX - ballSize / 2 <= wallEnd.x + wallW / 2 && ball.nextX > wallEnd.x) {
                      const distance = distance2D(wallEnd, { x: ball.nextX, y: ball.nextY });
                      if (distance < ballSize / 2 + wallW / 2) {
                        const closest = closestItCanBe(wallEnd, { x: ball.nextX, y: ball.nextY });
                        const rolled = rollAroundCap(wallEnd, {
                          x: closest.x,
                          y: closest.y,
                          velocityX: ball.velocityX,
                          velocityY: ball.velocityY,
                        });
                        Object.assign(ball, rolled);
                      }
                    }

                    if (ball.nextX >= wallStart.x && ball.nextX <= wallEnd.x) {
                      if (ball.nextY < wall.y) {
                        ball.nextY = wall.y - wallW / 2 - ballSize / 2;
                      } else {
                        ball.nextY = wall.y + wallW / 2 + ballSize / 2;
                      }
                      ball.y = ball.nextY;
                      ball.velocityY = -ball.velocityY / 3;
                    }
                  }
                } else {
                  // Vertical wall collision
                  if (
                    ball.nextX + ballSize / 2 >= wall.x - wallW / 2 &&
                    ball.nextX - ballSize / 2 <= wall.x + wallW / 2
                  ) {
                    const wallStart = { x: wall.x, y: wall.y };
                    const wallEnd = { x: wall.x, y: wall.y + wall.length };

                    if (ball.nextY + ballSize / 2 >= wallStart.y - wallW / 2 && ball.nextY < wallStart.y) {
                      const distance = distance2D(wallStart, { x: ball.nextX, y: ball.nextY });
                      if (distance < ballSize / 2 + wallW / 2) {
                        const closest = closestItCanBe(wallStart, { x: ball.nextX, y: ball.nextY });
                        const rolled = rollAroundCap(wallStart, {
                          x: closest.x,
                          y: closest.y,
                          velocityX: ball.velocityX,
                          velocityY: ball.velocityY,
                        });
                        Object.assign(ball, rolled);
                      }
                    }

                    if (ball.nextY - ballSize / 2 <= wallEnd.y + wallW / 2 && ball.nextY > wallEnd.y) {
                      const distance = distance2D(wallEnd, { x: ball.nextX, y: ball.nextY });
                      if (distance < ballSize / 2 + wallW / 2) {
                        const closest = closestItCanBe(wallEnd, { x: ball.nextX, y: ball.nextY });
                        const rolled = rollAroundCap(wallEnd, {
                          x: closest.x,
                          y: closest.y,
                          velocityX: ball.velocityX,
                          velocityY: ball.velocityY,
                        });
                        Object.assign(ball, rolled);
                      }
                    }

                    if (ball.nextY >= wallStart.y && ball.nextY <= wallEnd.y) {
                      if (ball.nextX < wall.x) {
                        ball.nextX = wall.x - wallW / 2 - ballSize / 2;
                      } else {
                        ball.nextX = wall.x + wallW / 2 + ballSize / 2;
                      }
                      ball.x = ball.nextX;
                      ball.velocityX = -ball.velocityX / 3;
                    }
                  }
                }
              });

              // Black holes check in hard mode
              if (hardMode) {
                holes.forEach((hole, hi) => {
                  const distance = distance2D(hole, {
                    x: ball.nextX,
                    y: ball.nextY,
                  });
                  if (distance <= holeSize / 2) {
                    throw Error("The ball fell into a hole");
                  }
                });
              }

              ball.x = ball.x + ball.velocityX;
              ball.y = ball.y + ball.velocityY;
            });

            // Update DOM positions
            balls.forEach(({ x, y }, index) => {
              ballElements[index].style.left = `${x}px`;
              ballElements[index].style.top = `${y}px`;
            });
          }

          // Win verification
          const won = balls.every(
            (ball) => distance2D(ball, { x: 350 / 2, y: 315 / 2 }) < 65 / 2
          );

          if (won) {
            noteElement.innerHTML = `<span class="text-emerald-400 font-extrabold text-sm block">Victory! 🎉</span>Cleared sectors! Try hard mode.`;
            gameInProgress = false;
          } else {
            previousTimestamp = timestamp;
            window.requestAnimationFrame(main);
          }
        } catch (error) {
          if (error.message == "The ball fell into a hole") {
            noteElement.innerHTML = `<span class="text-rose-500 font-bold block">Black Hole Detonation! 💀</span>A ball fell in. Press Reset to try again.`;
            gameInProgress = false;
          } else {
            throw error;
          }
        }
      }

      // Initial startup call
      resetGame();
    </script>
  </body>
