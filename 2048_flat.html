<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 - Classic Puzzle</title>
    
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="min-h-screen bg-[radial-gradient(ellipse_at_top,#fcf8f2_0%,#efe5d9_60%,#dfd3c3_100%)] text-slate-800 font-sans p-4 flex items-center justify-center selection:bg-amber-200">
    <div class="w-full max-w-md bg-white/40 backdrop-blur-xl border border-white/60 p-6 rounded-3xl shadow-2xl flex flex-col gap-6">
      
      <!-- Top info bar -->
      <div class="flex items-center justify-between gap-4">
        <h1 class="text-5xl font-black tracking-tight text-slate-700">2048</h1>
        <div class="bg-slate-700/90 text-white px-5 py-2 rounded-2xl flex flex-col items-center shadow-md min-w-[80px]">
          <span class="text-[10px] uppercase font-bold tracking-widest text-slate-300">Score</span>
          <span id="score" class="text-2xl font-extrabold tabular-nums">0</span>
        </div>
      </div>

      <div class="bg-slate-700/5 px-4 py-3 rounded-xl border border-slate-700/10 text-center">
        <span id="result" class="text-sm font-semibold text-slate-600">Join the numbers and get to the <b class="text-slate-800">2048</b> tile!</span>
      </div>

      <!-- Game Board Grid -->
      <div class="bg-[#bbada0] p-3 rounded-2xl shadow-inner w-full aspect-square flex flex-wrap">
        <div class="grid grid-cols-4 gap-3 w-full h-full"></div>
      </div>
      
      <p class="text-center text-xs text-slate-400 font-semibold mt-1">
        ⌨️ Use your <kbd class="px-1.5 py-0.5 bg-slate-200 rounded">Arrow Keys</kbd> to slide tiles.
      </p>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const gridDisplay = document.querySelector(".grid");
        const scoreDisplay = document.getElementById("score");
        const resultDisplay = document.getElementById("result");
        let squares = [];
        const width = 4;
        let score = 0;

        // Create the playing board
        function createBoard() {
          gridDisplay.innerHTML = "";
          squares = [];
          for (let i = 0; i < width * width; i++) {
            const square = document.createElement("div");
            square.innerHTML = 0;
            // Modern, responsive card sizing with Tailwind classes
            square.className = "aspect-square w-full flex items-center justify-center rounded-xl text-2xl sm:text-3xl font-extrabold select-none transition-all duration-100 shadow-md";
            gridDisplay.appendChild(square);
            squares.push(square);
          }
          generate();
          generate();
        }
        createBoard();

        // Generate a new number
        function generate() {
          const randomNumber = Math.floor(Math.random() * squares.length);
          if (squares[randomNumber].innerHTML == 0) {
            squares[randomNumber].innerHTML = 2;
            checkForGameOver();
          } else {
            generate();
          }
        }

        function moveRight() {
          for (let i = 0; i < 16; i++) {
            if (i % 4 === 0) {
              let totalOne = squares[i].innerHTML;
              let totalTwo = squares[i + 1].innerHTML;
              let totalThree = squares[i + 2].innerHTML;
              let totalFour = squares[i + 3].innerHTML;
              let row = [
                parseInt(totalOne),
                parseInt(totalTwo),
                parseInt(totalThree),
                parseInt(totalFour),
              ];

              let filteredRow = row.filter((num) => num);
              let missing = 4 - filteredRow.length;
              let zeros = Array(missing).fill(0);
              let newRow = zeros.concat(filteredRow);

              squares[i].innerHTML = newRow[0];
              squares[i + 1].innerHTML = newRow[1];
              squares[i + 2].innerHTML = newRow[2];
              squares[i + 3].innerHTML = newRow[3];
            }
          }
        }

        function moveLeft() {
          for (let i = 0; i < 16; i++) {
            if (i % 4 === 0) {
              let totalOne = squares[i].innerHTML;
              let totalTwo = squares[i + 1].innerHTML;
              let totalThree = squares[i + 2].innerHTML;
              let totalFour = squares[i + 3].innerHTML;
              let row = [
                parseInt(totalOne),
                parseInt(totalTwo),
                parseInt(totalThree),
                parseInt(totalFour),
              ];

              let filteredRow = row.filter((num) => num);
              let missing = 4 - filteredRow.length;
              let zeros = Array(missing).fill(0);
              let newRow = filteredRow.concat(zeros);

              squares[i].innerHTML = newRow[0];
              squares[i + 1].innerHTML = newRow[1];
              squares[i + 2].innerHTML = newRow[2];
              squares[i + 3].innerHTML = newRow[3];
            }
          }
        }

        function moveUp() {
          for (let i = 0; i < 4; i++) {
            let totalOne = squares[i].innerHTML;
            let totalTwo = squares[i + width].innerHTML;
            let totalThree = squares[i + width * 2].innerHTML;
            let totalFour = squares[i + width * 3].innerHTML;
            let column = [
              parseInt(totalOne),
              parseInt(totalTwo),
              parseInt(totalThree),
              parseInt(totalFour),
            ];

            let filteredColumn = column.filter((num) => num);
            let missing = 4 - filteredColumn.length;
            let zeros = Array(missing).fill(0);
            let newColumn = filteredColumn.concat(zeros);

            squares[i].innerHTML = newColumn[0];
            squares[i + width].innerHTML = newColumn[1];
            squares[i + width * 2].innerHTML = newColumn[2];
            squares[i + width * 3].innerHTML = newColumn[3];
          }
        }

        function moveDown() {
          for (let i = 0; i < 4; i++) {
            let totalOne = squares[i].innerHTML;
            let totalTwo = squares[i + width].innerHTML;
            let totalThree = squares[i + width * 2].innerHTML;
            let totalFour = squares[i + width * 3].innerHTML;
            let column = [
              parseInt(totalOne),
              parseInt(totalTwo),
              parseInt(totalThree),
              parseInt(totalFour),
            ];

            let filteredColumn = column.filter((num) => num);
            let missing = 4 - filteredColumn.length;
            let zeros = Array(missing).fill(0);
            let newColumn = zeros.concat(filteredColumn);

            squares[i].innerHTML = newColumn[0];
            squares[i + width].innerHTML = newColumn[1];
            squares[i + width * 2].innerHTML = newColumn[2];
            squares[i + width * 3].innerHTML = newColumn[3];
          }
        }

        function combineRow() {
          for (let i = 0; i < 15; i++) {
            if (squares[i].innerHTML === squares[i + 1].innerHTML) {
              let combinedTotal =
                parseInt(squares[i].innerHTML) + parseInt(squares[i + 1].innerHTML);
              squares[i].innerHTML = combinedTotal;
              squares[i + 1].innerHTML = 0;
              score += combinedTotal;
              scoreDisplay.innerHTML = score;
            }
          }
          checkForWin();
        }

        function combineColumn() {
          for (let i = 0; i < 12; i++) {
            if (squares[i].innerHTML === squares[i + width].innerHTML) {
              let combinedTotal =
                parseInt(squares[i].innerHTML) +
                parseInt(squares[i + width].innerHTML);
              squares[i].innerHTML = combinedTotal;
              squares[i + width].innerHTML = 0;
              score += combinedTotal;
              scoreDisplay.innerHTML = score;
            }
          }
          checkForWin();
        }

        // Assign functions to arrow keys
        function control(e) {
          if (e.keyCode === 37) {
            keyLeft();
          } else if (e.keyCode === 38) {
            keyUp();
          } else if (e.keyCode === 39) {
            keyRight();
          } else if (e.keyCode === 40) {
            keyDown();
          }
        }
        document.addEventListener("keyup", control);

        function keyRight() {
          moveRight();
          combineRow();
          moveRight();
          generate();
        }

        function keyLeft() {
          moveLeft();
          combineRow();
          moveLeft();
          generate();
        }

        function keyUp() {
          moveUp();
          combineColumn();
          moveUp();
          generate();
        }

        function keyDown() {
          moveDown();
          combineColumn();
          moveDown();
          generate();
        }

        // Check for 2048 to win
        function checkForWin() {
          for (let i = 0; i < squares.length; i++) {
            if (squares[i].innerHTML == 2048) {
              resultDisplay.innerHTML = "<span class='text-emerald-600 font-bold'>🎉 You WIN! Completed 2048!</span>";
              document.removeEventListener("keyup", control);
              setTimeout(() => clear(), 3000);
            }
          }
        }

        // Check for game over
        function checkForGameOver() {
          let zeros = 0;
          for (let i = 0; i < squares.length; i++) {
            if (squares[i].innerHTML == 0) {
              zeros++;
            }
          }
          if (zeros === 0) {
            resultDisplay.innerHTML = "<span class='text-rose-500 font-bold'>💀 You LOSE! Game Over.</span>";
            document.removeEventListener("keyup", control);
            setTimeout(() => clear(), 3000);
          }
        }

        function clear() {
          clearInterval(myTimer);
        }

        // Add 2048 brand colors dynamically
        function addColours() {
          for (let i = 0; i < squares.length; i++) {
            const val = parseInt(squares[i].innerHTML, 10);
            squares[i].style.color = "#776e65";
            if (val === 0) {
              squares[i].style.backgroundColor = "#afa192";
              squares[i].style.color = "transparent"; // Hide 0 text
            } else if (val === 2) {
              squares[i].style.backgroundColor = "#eee4da";
            } else if (val === 4) {
              squares[i].style.backgroundColor = "#ede0c8";
            } else if (val === 8) {
              squares[i].style.backgroundColor = "#f2b179";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 16) {
              squares[i].style.backgroundColor = "#f59563";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 32) {
              squares[i].style.backgroundColor = "#f67c5f";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 64) {
              squares[i].style.backgroundColor = "#f65e3b";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 128) {
              squares[i].style.backgroundColor = "#edcf72";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 256) {
              squares[i].style.backgroundColor = "#edcc61";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 512) {
              squares[i].style.backgroundColor = "#edc850";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 1024) {
              squares[i].style.backgroundColor = "#edc53f";
              squares[i].style.color = "#f9f6f2";
            } else if (val === 2048) {
              squares[i].style.backgroundColor = "#edc22e";
              squares[i].style.color = "#f9f6f2";
            } else {
              squares[i].style.backgroundColor = "#3c3a32";
              squares[i].style.color = "#f9f6f2";
            }
          }
        }
        addColours();

        const myTimer = setInterval(addColours, 50);
      });
    </script>
  </body>
</html>
