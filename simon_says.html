    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

      <footer class="w-full mt-6 border-t border-white/5 pt-4">

          Start Game

    <!-- Simon Synth & Logic -->
    <script>
      // Sound synth configuration
      let audioCtx = null;
      function initAudio() {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
      }

      // Frequencies corresponding to color pads
      const pitches = {
        green: 261.63,  // C4
        red: 329.63,    // E4
        yellow: 392.00, // G4
        blue: 523.25    // C5
      };

      function playTone(color) {
        try {
          initAudio();
          if (audioCtx.state === 'suspended') {
            audioCtx.resume();
          }

          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);

          const now = audioCtx.currentTime;

          if (color === 'fail') {
            // Low buzzer dissonant sweep
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(140, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.55);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
          } else {
            // High clean sine wave tone
            osc.type = 'sine';
            osc.frequency.setValueAtTime(pitches[color], now);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
          }
        } catch (e) {
          console.warn("Audio Context failed: ", e);
        }
      }

      // Game state variables
      const colors = ["green", "red", "yellow", "blue"];
      let gamePattern = [];
      let userPattern = [];
      let level = 0;
      let stepIndex = 0;
      let gameStarted = false;
      let playbackMode = false;
      let highscore = parseInt(localStorage.getItem("simon_highscore")) || 0;

      // DOM Elements
      const greenPad = document.getElementById("green");
      const redPad = document.getElementById("red");
      const yellowPad = document.getElementById("yellow");
      const bluePad = document.getElementById("blue");

      const startBtn = document.getElementById("start-btn");
      const scoreVal = document.getElementById("score-val");
      const highVal = document.getElementById("high-val");

      const levelDisplay = document.getElementById("level-display");
      const statusLabel = document.getElementById("status-label");
      const msgBox = document.getElementById("msg-box");

      highVal.textContent = highscore;

      // Event triggers
      startBtn.addEventListener("click", () => {
        if (!gameStarted) {
          initAudio();
          startGame();
        }
      });

      const padElements = { green: greenPad, red: redPad, yellow: yellowPad, blue: bluePad };

      colors.forEach(color => {
        const pad = padElements[color];

        const handleInput = () => {
          if (!gameStarted || playbackMode) return;
          
          flashPad(color);
          playTone(color);
          userPattern.push(color);
          
          checkSequence(userPattern.length - 1);
        };

        pad.addEventListener("mousedown", handleInput);
        pad.addEventListener("touchstart", (e) => {
          e.preventDefault();
          handleInput();
        });
      });

      function startGame() {
        gameStarted = true;
        gamePattern = [];
        level = 0;
        highscore = parseInt(localStorage.getItem("simon_highscore")) || 0;
        highVal.textContent = highscore;
        startBtn.classList.add("hidden");
        
        nextSequence();
      }

      function nextSequence() {
        userPattern = [];
        level++;
        levelDisplay.textContent = level;
        scoreVal.textContent = level - 1;
        
        // Push a new random color to pattern
        const randColor = colors[Math.floor(Math.random() * colors.length)];
        gamePattern.push(randColor);

        // Animate sequence
        playbackMode = true;
        statusLabel.textContent = "Watching";
        statusLabel.classList.remove("text-indigo-400");
        statusLabel.classList.add("text-amber-400");
        msgBox.textContent = "Watch Simon's sequence...";

        setTimeout(() => {
          animatePattern(0);
        }, 600);
      }

      function animatePattern(index) {
        if (index >= gamePattern.length) {
          playbackMode = false;
          statusLabel.textContent = "Your Turn";
          statusLabel.classList.remove("text-amber-400");
          statusLabel.classList.add("text-indigo-400");
          msgBox.textContent = "Repeat the pattern!";
          return;
        }

        const color = gamePattern[index];
        flashPad(color);
        playTone(color);

        setTimeout(() => {
          animatePattern(index + 1);
        }, 600);
      }

      function flashPad(color) {
        const pad = padElements[color];
        pad.classList.add("active");
        setTimeout(() => {
          pad.classList.remove("active");
        }, 300);
      }

      function checkSequence(currentStep) {
        if (userPattern[currentStep] === gamePattern[currentStep]) {
          // If correct, check if sequence is finished
          if (userPattern.length === gamePattern.length) {
            msgBox.textContent = "Perfect! Keep going...";
            
            // Save highscore
            const currentScore = level;
            if (currentScore > highscore) {
              highscore = currentScore;
              localStorage.setItem("simon_highscore", highscore);
              highVal.textContent = highscore;
            }

            setTimeout(() => {
              nextSequence();
            }, 1000);
          }
        } else {
          // Game Over sequence
          playTone('fail');
          
          // Flash body or screen
          document.body.classList.add("bg-rose-950/40");
          setTimeout(() => {
            document.body.classList.remove("bg-rose-950/40");
          }, 300);

          statusLabel.textContent = "Failed";
          statusLabel.classList.remove("text-indigo-400", "text-amber-400");
          statusLabel.classList.add("text-rose-500");
          levelDisplay.textContent = "XX";
          msgBox.textContent = `Incorrect! You reached Level ${level}.`;

          gameStarted = false;
          startBtn.textContent = "Play Again";
          startBtn.classList.remove("hidden");
        }
      }
    </script>
