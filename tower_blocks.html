<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0" />
    <title>Neon Tower Blocks - 3D Stacking Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r83/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/latest/TweenMax.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {

  <body class="bg-[#0b0f19] text-slate-100 font-sans h-screen w-screen overflow-hidden select-none relative">
    
    <div id="container" class="relative w-full h-full">
      <!-- 3D Canvas Container -->
      <div id="game" class="absolute inset-0 z-0"></div>
      
      <!-- Score Counter HUD -->
      <div id="score" class="absolute top-8 left-0 right-0 text-center font-extrabold text-6xl text-white select-none pointer-events-none drop-shadow-[0_2px_8px_rgba(255,255,255,0.15)] z-10 transition-all duration-500 -translate-y-24 opacity-0 scale-75">
        0
      </div>
      
      <!-- Instructions Banner -->
      <div id="instructions" class="absolute bottom-12 left-1/2 transform -translate-x-1/2 text-center text-sm md:text-base font-semibold text-slate-300 bg-slate-900/60 backdrop-blur-md border border-white/5 py-3 px-6 rounded-full shadow-lg z-10 transition-all duration-500 opacity-0 translate-y-12 select-none pointer-events-none">
        Tap screen or press Spacebar to drop the block
      </div>
      
      <!-- Game Start Screen -->
      <div id="ready-screen" class="absolute inset-0 flex flex-col items-center justify-center p-6 z-20 transition-all duration-500 bg-slate-950/40 backdrop-blur-[2px]">
        <div class="text-center max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/10 p-8 rounded-3xl shadow-2xl relative overflow-hidden">
          <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>
          <h1 class="text-4xl md:text-5xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 uppercase drop-shadow-md mb-2">Tower Blocks</h1>
          <p class="text-slate-400 text-sm mb-8">Stack the blocks perfectly on top of each other. How high can you stack?</p>
          <button id="start-button" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-extrabold text-lg rounded-2xl shadow-lg hover:shadow-indigo-500/20 active:scale-[0.98] transition-all cursor-pointer">
            Start Stacking
          </button>
        </div>
      </div>
      
      <!-- Game Over Overlay -->
      <div id="game-over-screen" class="absolute inset-0 flex-col items-center justify-center p-6 z-20 transition-all duration-500 bg-slate-950/80 backdrop-blur-md hidden opacity-0">
        <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-90 transition-all duration-500">
          <div class="absolute -top-10 -left-10 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl"></div>
          <h2 class="text-3xl font-black text-rose-500 mb-2 uppercase tracking-wide">Game Over</h2>
          <p class="text-slate-400 text-sm mb-6">Excellent stacking! You've set a new foundation.</p>
          
          <div class="bg-slate-950/40 border border-white/5 rounded-2xl py-4 mb-8">
            <span class="text-xs font-bold text-slate-500 uppercase tracking-widest block mb-1">Final Score</span>
            <span id="final-score" class="text-5xl font-black text-white">0</span>
          </div>

          <button id="restart-button" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
            Play Again
          </button>
        </div>
      </div>
    </div>

    <script>
      console.clear();

      var Stage = /** @class */ (function () {
        function Stage() {
          var _this = this;
          this.render = function () {
            this.renderer.render(this.scene, this.camera);
          };
          this.add = function (elem) {
            this.scene.add(elem);
          };
          this.remove = function (elem) {
            this.scene.remove(elem);
          };
          this.container = document.getElementById("game");
          // renderer
          this.renderer = new THREE.WebGLRenderer({
            antialias: true,
            alpha: false,
          });
          this.renderer.setSize(window.innerWidth, window.innerHeight);
          // Dark background clear color
          this.renderer.setClearColor("#0b0f19", 1);
          this.container.appendChild(this.renderer.domElement);
          // scene
          this.scene = new THREE.Scene();
          // camera
          var aspect = window.innerWidth / window.innerHeight;
          var d = 20;
          this.camera = new THREE.OrthographicCamera(
            -d * aspect,
            d * aspect,
            d,
            -d,
            -100,
            1000
          );
          this.camera.position.x = 2;
          this.camera.position.y = 2;
          this.camera.position.z = 2;
          this.camera.lookAt(new THREE.Vector3(0, 0, 0));
          // light - enhanced for glowing pastel shapes
          this.light = new THREE.DirectionalLight(0xffffff, 0.7);
          this.light.position.set(5, 10, 3);
          this.scene.add(this.light);
          
          this.softLight = new THREE.AmbientLight(0x404040, 0.9);
          this.scene.add(this.softLight);
          
          window.addEventListener("resize", function () {
            return _this.onResize();
          });
          this.onResize();
        }
        Stage.prototype.setCamera = function (y, speed) {
          if (speed === void 0) {
            speed = 0.3;
          }
          TweenLite.to(this.camera.position, speed, {
            y: y + 4,
            ease: Power1.easeInOut,
          });
          TweenLite.to(this.camera.lookAt, speed, { y: y, ease: Power1.easeInOut });
        };
        Stage.prototype.onResize = function () {
          var viewSize = 30;
          this.renderer.setSize(window.innerWidth, window.innerHeight);
          this.camera.left = window.innerWidth / -viewSize;
          this.camera.right = window.innerWidth / viewSize;
          this.camera.top = window.innerHeight / viewSize;
          this.camera.bottom = window.innerHeight / -viewSize;
          this.camera.updateProjectionMatrix();
        };
        return Stage;
      })();

      var Block = /** @class */ (function () {
        function Block(block) {
          this.STATES = { ACTIVE: "active", STOPPED: "stopped", MISSED: "missed" };
          this.MOVE_AMOUNT = 12;
          this.dimension = { width: 0, height: 0, depth: 0 };
          this.position = { x: 0, y: 0, z: 0 };
          this.targetBlock = block;
          this.index = (this.targetBlock ? this.targetBlock.index : 0) + 1;
          this.workingPlane = this.index % 2 ? "x" : "z";
          this.workingDimension = this.index % 2 ? "width" : "depth";
          // Dimensions
          this.dimension.width = this.targetBlock ? this.targetBlock.dimension.width : 10;
          this.dimension.height = this.targetBlock ? this.targetBlock.dimension.height : 2;
          this.dimension.depth = this.targetBlock ? this.targetBlock.dimension.depth : 10;
          this.position.x = this.targetBlock ? this.targetBlock.position.x : 0;
          this.position.y = this.dimension.height * this.index;
          this.position.z = this.targetBlock ? this.targetBlock.position.z : 0;
          this.colorOffset = this.targetBlock ? this.targetBlock.colorOffset : Math.round(Math.random() * 100);
          
          // Color logic
          if (!this.targetBlock) {
            this.color = new THREE.Color("#4f46e5"); // indigo primary block
          } else {
            var offset = this.index + this.colorOffset;
            // Generate vibrant glowing pastel colors
            var r = Math.sin(0.35 * offset) * 45 + 180;
            var g = Math.sin(0.35 * offset + 2) * 45 + 180;
            var b = Math.sin(0.35 * offset + 4) * 45 + 180;
            this.color = new THREE.Color(r / 255, g / 255, b / 255);
          }
          
          this.state = this.index > 1 ? this.STATES.ACTIVE : this.STATES.STOPPED;
          this.speed = -0.12 - this.index * 0.004;
          if (this.speed < -4) this.speed = -4;
          this.direction = this.speed;
          
          var geometry = new THREE.BoxGeometry(
            this.dimension.width,
            this.dimension.height,
            this.dimension.depth
          );
          geometry.applyMatrix(
            new THREE.Matrix4().makeTranslation(
              this.dimension.width / 2,
              this.dimension.height / 2,
              this.dimension.depth / 2
            )
          );
          // Premium Toon / Flat shading look
          this.material = new THREE.MeshToonMaterial({
            color: this.color,
            shading: THREE.FlatShading,
          });
          this.mesh = new THREE.Mesh(geometry, this.material);
          this.mesh.position.set(
            this.position.x,
            this.position.y,
            this.position.z
          );
          if (this.state == this.STATES.ACTIVE) {
            this.position[this.workingPlane] = Math.random() > 0.5 ? -this.MOVE_AMOUNT : this.MOVE_AMOUNT;
          }
        }
        Block.prototype.reverseDirection = function () {
          this.direction = this.direction > 0 ? this.speed : Math.abs(this.speed);
        };
        Block.prototype.place = function () {
          this.state = this.STATES.STOPPED;
          var overlap =
            this.targetBlock.dimension[this.workingDimension] -
            Math.abs(this.position[this.workingPlane] - this.targetBlock.position[this.workingPlane]);
          
          var blocksToReturn = {
            plane: this.workingPlane,
            direction: this.direction,
          };
          if (this.dimension[this.workingDimension] - overlap < 0.3) {
            overlap = this.dimension[this.workingDimension];
            blocksToReturn.bonus = true;
            this.position.x = this.targetBlock.position.x;
            this.position.z = this.targetBlock.position.z;
            this.dimension.width = this.targetBlock.dimension.width;
            this.dimension.depth = this.targetBlock.dimension.depth;
          }
          if (overlap > 0) {
            var choppedDimensions = {
              width: this.dimension.width,
              height: this.dimension.height,
              depth: this.dimension.depth,
            };
            choppedDimensions[this.workingDimension] -= overlap;
            this.dimension[this.workingDimension] = overlap;
            
            var placedGeometry = new THREE.BoxGeometry(
              this.dimension.width,
              this.dimension.height,
              this.dimension.depth
            );
            placedGeometry.applyMatrix(
              new THREE.Matrix4().makeTranslation(
                this.dimension.width / 2,
                this.dimension.height / 2,
                this.dimension.depth / 2
              )
            );
            var placedMesh = new THREE.Mesh(placedGeometry, this.material);
            
            var choppedGeometry = new THREE.BoxGeometry(
              choppedDimensions.width,
              choppedDimensions.height,
              choppedDimensions.depth
            );
            choppedGeometry.applyMatrix(
              new THREE.Matrix4().makeTranslation(
                choppedDimensions.width / 2,
                choppedDimensions.height / 2,
                choppedDimensions.depth / 2
              )
            );
            var choppedMesh = new THREE.Mesh(choppedGeometry, this.material);
            var choppedPosition = {
              x: this.position.x,
              y: this.position.y,
              z: this.position.z,
            };
            if (this.position[this.workingPlane] < this.targetBlock.position[this.workingPlane]) {
              this.position[this.workingPlane] = this.targetBlock.position[this.workingPlane];
            } else {
              choppedPosition[this.workingPlane] += overlap;
            }
            placedMesh.position.set(this.position.x, this.position.y, this.position.z);
            choppedMesh.position.set(choppedPosition.x, choppedPosition.y, choppedPosition.z);
            blocksToReturn.placed = placedMesh;
            if (!blocksToReturn.bonus) blocksToReturn.chopped = choppedMesh;
          } else {
            this.state = this.STATES.MISSED;
          }
          this.dimension[this.workingDimension] = overlap;
          return blocksToReturn;
        };
        Block.prototype.tick = function () {
          if (this.state == this.STATES.ACTIVE) {
            var value = this.position[this.workingPlane];
            if (value > this.MOVE_AMOUNT || value < -this.MOVE_AMOUNT) this.reverseDirection();
            this.position[this.workingPlane] += this.direction;
            this.mesh.position[this.workingPlane] = this.position[this.workingPlane];
          }
        };
        return Block;
      })();

      var Game = /** @class */ (function () {
        function Game() {
          var _this = this;
          this.STATES = {
            LOADING: "loading",
            PLAYING: "playing",
            READY: "ready",
            ENDED: "ended",
            RESETTING: "resetting",
          };
          this.blocks = [];
          this.state = this.STATES.LOADING;
          this.stage = new Stage();
          
          this.scoreContainer = document.getElementById("score");
          this.instructions = document.getElementById("instructions");
          this.readyScreen = document.getElementById("ready-screen");
          this.gameOverScreen = document.getElementById("game-over-screen");
          this.finalScore = document.getElementById("final-score");
          
          this.newBlocks = new THREE.Group();
          this.placedBlocks = new THREE.Group();
          this.choppedBlocks = new THREE.Group();
          this.stage.add(this.newBlocks);
          this.stage.add(this.placedBlocks);
          this.stage.add(this.choppedBlocks);
          
          this.addBlock();
          this.tick();
          this.updateState(this.STATES.READY);
          
          document.addEventListener("keydown", function (e) {
            if (e.keyCode == 32) _this.onAction();
          });
          
          // Fast mobile touchstart drop
          document.addEventListener("touchstart", function (e) {
            if (e.target.closest("#start-button") || e.target.closest("#restart-button")) return;
            e.preventDefault();
            _this.onAction();
          }, { passive: false });
          
          // Tap/Click placement (excluding start/restart button clicks)
          document.addEventListener("click", function (e) {
            if (e.target.closest("#start-button") || e.target.closest("#restart-button")) return;
            _this.onAction();
          });
          
          document.getElementById("start-button").addEventListener("click", function(e) {
            e.stopPropagation();
            _this.startGame();
          });
          document.getElementById("restart-button").addEventListener("click", function(e) {
            e.stopPropagation();
            _this.restartGame();
          });
        }
        Game.prototype.updateState = function (newState) {
          this.state = newState;
          
          // Handle screen styling transitions via Tailwind classes
          if (newState === this.STATES.READY) {
            this.readyScreen.classList.remove("hidden");
            setTimeout(() => this.readyScreen.classList.remove("opacity-0"), 50);
            
            this.gameOverScreen.classList.add("opacity-0");
            setTimeout(() => this.gameOverScreen.classList.add("hidden"), 500);
            
            this.scoreContainer.classList.add("opacity-0", "-translate-y-24");
            this.instructions.classList.add("opacity-0", "translate-y-12");
          } 
          else if (newState === this.STATES.PLAYING) {
            this.readyScreen.classList.add("opacity-0");
            setTimeout(() => this.readyScreen.classList.add("hidden"), 500);
            
            this.gameOverScreen.classList.add("opacity-0");
            setTimeout(() => this.gameOverScreen.classList.add("hidden"), 500);
            
            this.scoreContainer.classList.remove("opacity-0", "-translate-y-24");
            this.scoreContainer.classList.add("opacity-100", "translate-y-0");
            
            if (this.blocks.length < 5) {
              this.instructions.classList.remove("opacity-0", "translate-y-12");
              this.instructions.classList.add("opacity-100", "translate-y-0");
            }
          } 
          else if (newState === this.STATES.ENDED) {
            this.gameOverScreen.classList.remove("hidden");
            setTimeout(() => {
              this.gameOverScreen.classList.remove("opacity-0");
              this.gameOverScreen.querySelector("div").classList.remove("scale-90");
              this.gameOverScreen.querySelector("div").classList.add("scale-100");
            }, 50);
            
            this.finalScore.textContent = String(this.blocks.length - 2);
            this.scoreContainer.classList.add("opacity-0", "-translate-y-24");
            this.instructions.classList.add("opacity-0", "translate-y-12");
          }
        };
        Game.prototype.onAction = function () {
          switch (this.state) {
            case this.STATES.PLAYING:
              this.placeBlock();
              break;
          }
        };
        Game.prototype.startGame = function () {
          if (this.state != this.STATES.PLAYING) {
            this.scoreContainer.innerHTML = "0";
            this.updateState(this.STATES.PLAYING);
            this.addBlock();
          }
        };
        Game.prototype.restartGame = function () {
          var _this = this;
          this.updateState(this.STATES.RESETTING);
          
          this.gameOverScreen.classList.add("opacity-0");
          this.gameOverScreen.querySelector("div").classList.add("scale-90");
          setTimeout(() => this.gameOverScreen.classList.add("hidden"), 500);
          
          var oldBlocks = this.placedBlocks.children;
          var removeSpeed = 0.2;
          var delayAmount = 0.02;
          var _loop_1 = function (i) {
            TweenLite.to(oldBlocks[i].scale, removeSpeed, {
              x: 0,
              y: 0,
              z: 0,
              delay: (oldBlocks.length - i) * delayAmount,
              ease: Power1.easeIn,
              onComplete: function () {
                return _this.placedBlocks.remove(oldBlocks[i]);
              },
            });
            TweenLite.to(oldBlocks[i].rotation, removeSpeed, {
              y: 0.5,
              delay: (oldBlocks.length - i) * delayAmount,
              ease: Power1.easeIn,
            });
          };
          for (var i = 0; i < oldBlocks.length; i++) {
            _loop_1(i);
          }
          var cameraMoveSpeed = removeSpeed * 2 + oldBlocks.length * delayAmount;
          this.stage.setCamera(2, cameraMoveSpeed);
          
          var countdown = { value: this.blocks.length - 1 };
          TweenLite.to(countdown, cameraMoveSpeed, {
            value: 0,
            onUpdate: function () {
              // Ensure we show decrementing count visually in score
              _this.scoreContainer.innerHTML = String(Math.round(countdown.value));
            },
          });
          this.blocks = this.blocks.slice(0, 1);
          setTimeout(function () {
            _this.startGame();
          }, cameraMoveSpeed * 1000);
        };
        Game.prototype.placeBlock = function () {
          var _this = this;
          var currentBlock = this.blocks[this.blocks.length - 1];
          var newBlocks = currentBlock.place();
          this.newBlocks.remove(currentBlock.mesh);
          if (newBlocks.placed) this.placedBlocks.add(newBlocks.placed);
          if (newBlocks.chopped) {
            this.choppedBlocks.add(newBlocks.chopped);
            var positionParams = {
              y: "-=30",
              ease: Power1.easeIn,
              onComplete: function () {
                return _this.choppedBlocks.remove(newBlocks.chopped);
              },
            };
            var rotateRandomness = 10;
            var rotationParams = {
              delay: 0.05,
              x: newBlocks.plane == "z" ? Math.random() * rotateRandomness - rotateRandomness / 2 : 0.1,
              z: newBlocks.plane == "x" ? Math.random() * rotateRandomness - rotateRandomness / 2 : 0.1,
              y: Math.random() * 0.1,
            };
            if (newBlocks.chopped.position[newBlocks.plane] > newBlocks.placed.position[newBlocks.plane]) {
              positionParams[newBlocks.plane] = "+=" + 40 * Math.abs(newBlocks.direction);
            } else {
              positionParams[newBlocks.plane] = "-=" + 40 * Math.abs(newBlocks.direction);
            }
            TweenLite.to(newBlocks.chopped.position, 1, positionParams);
            TweenLite.to(newBlocks.chopped.rotation, 1, rotationParams);
          }
          this.addBlock();
        };
        Game.prototype.addBlock = function () {
          var lastBlock = this.blocks[this.blocks.length - 1];
          if (lastBlock && lastBlock.state == lastBlock.STATES.MISSED) {
            return this.endGame();
          }
          this.scoreContainer.innerHTML = String(this.blocks.length - 1);
          var newKidOnTheBlock = new Block(lastBlock);
          this.newBlocks.add(newKidOnTheBlock.mesh);
          this.blocks.push(newKidOnTheBlock);
          this.stage.setCamera(this.blocks.length * 2);
          
          if (this.blocks.length >= 5) {
            this.instructions.classList.remove("opacity-100", "translate-y-0");
            this.instructions.classList.add("opacity-0", "translate-y-12");
          }
        };
        Game.prototype.endGame = function () {
          this.updateState(this.STATES.ENDED);
        };
        Game.prototype.tick = function () {
          var _this = this;
          this.blocks[this.blocks.length - 1].tick();
          this.stage.render();
          requestAnimationFrame(function () {
            _this.tick();
          });
        };
        return Game;
      })();
      
      var game = new Game();
    </script>
  </body>
</html>
