    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    <script>
      var svg = document.querySelector("svg");
      var cursor = svg.createSVGPoint();
      var arrows = document.querySelector(".arrows");
      var randomAngle = 0;

      // Game Score & Stats variables
      var score = 0;
      var shots = 0;
      var hits = 0;
      var bullseyes = 0;

      const hudScore = document.getElementById("hud-score");
      const hudBullseyes = document.getElementById("hud-bullseyes");
      const hudAccuracy = document.getElementById("hud-accuracy");

      function updateHUD() {
        hudScore.textContent = score;
        hudBullseyes.textContent = bullseyes;
        if (shots > 0) {
          hudAccuracy.textContent = Math.round((hits / shots) * 100) + "%";
        } else {
          hudAccuracy.textContent = "0%";
        }
      }

      // Center of target
      var target = {
        x: 900,
        y: 249.5
      };

      // Target intersection line segment
      var lineSegment = {
        x1: 875,
        y1: 280,
        x2: 925,
        y2: 220
      };

      // Bow rotation point
      var pivot = {
        x: 100,
        y: 250
      };

      // Aim init
      aim({
        clientX: 320,
        clientY: 300
      });

      // Mouse/Touch Drag Handlers
      window.addEventListener("mousedown", dragStart);
      window.addEventListener("touchstart", dragStart, { passive: false });

      function dragStart(e) {
        // Prevent default browser dragging behaviors
        if (e.type === "touchstart") {
          e.preventDefault();
        }
        
        randomAngle = (Math.random() * Math.PI * 0.03) - 0.015;
        TweenMax.to(".arrow-angle use", 0.3, {
          opacity: 1
        });
        
        window.addEventListener("mousemove", aim);
        window.addEventListener("touchmove", aim, { passive: false });
        
        window.addEventListener("mouseup", loose);
        window.addEventListener("touchend", loose);
        
        aim(e);
      }

      function getMouseEvent(e) {
        if (e.touches && e.touches.length > 0) {
          return e.touches[0];
        }
        return e;
      }

      function aim(e) {
        if (e.type === "touchmove") e.preventDefault();
        var mouseEv = getMouseEvent(e);
        
        // Get mouse position in relation to svg position and scale
        var point = getMouseSVG(mouseEv);
        point.x = Math.min(point.x, pivot.x - 7);
        point.y = Math.max(point.y, pivot.y + 7);
        var dx = point.x - pivot.x;
        var dy = point.y - pivot.y;
        
        // Make it more difficult by adding random angle each time
        var angle = Math.atan2(dy, dx) + randomAngle;
        var bowAngle = angle - Math.PI;
        var distance = Math.min(Math.sqrt((dx * dx) + (dy * dy)), 50);
        var scale = Math.min(Math.max(distance / 30, 1), 2);
        
        TweenMax.to("#bow", 0.3, {
          scaleX: scale,
          rotation: bowAngle + "rad",
          transformOrigin: "right center"
        });
        
        var arrowX = Math.min(pivot.x - ((1 / scale) * distance), 88);
        TweenMax.to(".arrow-angle", 0.3, {
          rotation: bowAngle + "rad",
          svgOrigin: "100 250"
        });
        TweenMax.to(".arrow-angle use", 0.3, {
          x: -distance
        });
        TweenMax.to("#bow polyline", 0.3, {
          attr: {
            points: "88,200 " + Math.min(pivot.x - ((1 / scale) * distance), 88) + ",250 88,300"
          }
        });

        var radius = distance * 9;
        var offset = {
          x: (Math.cos(bowAngle) * radius),
          y: (Math.sin(bowAngle) * radius)
        };
        var arcWidth = offset.x * 3;

        TweenMax.to("#arc", 0.3, {
          attr: {
            d: "M100,250c" + offset.x + "," + offset.y + "," + (arcWidth - offset.x) + "," + (offset.y + 50) + "," + arcWidth + ",50"
          },
          autoAlpha: distance / 60
        });
      }

      function loose() {
        window.removeEventListener("mousemove", aim);
        window.removeEventListener("touchmove", aim);
        window.removeEventListener("mouseup", loose);
        window.removeEventListener("touchend", loose);

        TweenMax.to("#bow", 0.4, {
          scaleX: 1,
          transformOrigin: "right center",
          ease: Elastic.easeOut
        });
        TweenMax.to("#bow polyline", 0.4, {
          attr: {
            points: "88,200 88,250 88,300"
          },
          ease: Elastic.easeOut
        });
        
        // Duplicate arrow for shooting animation
        var newArrow = document.createElementNS("http://www.w3.org/2000/svg", "use");
        newArrow.setAttributeNS('http://www.w3.org/1999/xlink', 'href', "#arrow");
        arrows.appendChild(newArrow);

        // Track standard shot
        shots++;

        // Animate arrow along path
        var path = MorphSVGPlugin.pathDataToBezier("#arc");
        TweenMax.to([newArrow], 0.5, {
          force3D: true,
          bezier: {
            type: "cubic",
            values: path,
            autoRotate: ["x", "y", "rotation"]
          },
          onUpdate: hitTest,
          onUpdateParams: ["{self}"],
          onComplete: onMiss,
          ease: Linear.easeNone
        });
        TweenMax.to("#arc", 0.3, {
          opacity: 0
        });
        
        // Hide preparation arrow
        TweenMax.set(".arrow-angle use", {
          opacity: 0
        });
      }

      function hitTest(tween) {
        var arrow = tween.target[0];
        var transform = arrow._gsTransform;
        var radians = transform.rotation * Math.PI / 180;
        var arrowSegment = {
          x1: transform.x,
          y1: transform.y,
          x2: (Math.cos(radians) * 60) + transform.x,
          y2: (Math.sin(radians) * 60) + transform.y
        }

        var intersection = getIntersection(arrowSegment, lineSegment);
        if (intersection.segment1 && intersection.segment2) {
          tween.pause();
          var dx = intersection.x - target.x;
          var dy = intersection.y - target.y;
          var distance = Math.sqrt((dx * dx) + (dy * dy));
          var selector = ".hit";
          
          hits++;
          if (distance < 7) {
            selector = ".bullseye";
            bullseyes++;
            score += 50; // 50 pts for bullseye
          } else {
            score += 10; // 10 pts for regular hit
          }
          
          updateHUD();
          showMessage(selector);
        }
      }

      function onMiss() {
        updateHUD();
        showMessage(".miss");
      }

      function showMessage(selector) {
        TweenMax.killTweensOf(selector);
        TweenMax.killChildTweensOf(selector);
        TweenMax.set(selector, {
          autoAlpha: 1
        });
        TweenMax.staggerFromTo(selector + " path", .5, {
          rotation: -5,
          scale: 0,
          transformOrigin: "center"
        }, {
          scale: 1,
          ease: Back.easeOut
        }, .05);
        TweenMax.staggerTo(selector + " path", .3, {
          delay: 2,
          rotation: 20,
          scale: 0,
          ease: Back.easeIn
        }, .03);
      }

      function getMouseSVG(e) {
        cursor.x = e.clientX;
        cursor.y = e.clientY;
        return cursor.matrixTransform(svg.getScreenCTM().inverse());
      }

      function getIntersection(segment1, segment2) {
        var dx1 = segment1.x2 - segment1.x1;
        var dy1 = segment1.y2 - segment1.y1;
        var dx2 = segment2.x2 - segment2.x1;
        var dy2 = segment2.y2 - segment2.y1;
        var cx = segment1.x1 - segment2.x1;
        var cy = segment1.y1 - segment2.y1;
        var denominator = dy2 * dx1 - dx2 * dy1;
        if (denominator == 0) {
          return null;
        }
        var ua = (dx2 * cy - dy2 * cx) / denominator;
        var ub = (dx1 * cy - dy1 * cx) / denominator;
        return {
          x: segment1.x1 + ua * dx1,
          y: segment1.y1 + ua * dy1,
          segment1: ua >= 0 && ua <= 1,
          segment2: ub >= 0 && ub <= 1
        };
      }
    </script>
