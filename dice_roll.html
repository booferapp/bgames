<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Dice - Roll Simulator</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    
    <style>
      .dice {
        animation-duration: 0.8s;
        animation-fill-mode: forwards;
        animation-timing-function: ease-in-out;
      }
      .roll-animation {
        animation-name: roll;
      }
      @keyframes roll {
        0% { transform: rotateY(0deg) rotateX(0deg) scale(0.95); }
        50% { transform: rotateY(360deg) rotateX(360deg) scale(1.15); }
        100% { transform: rotateY(720deg) rotateX(720deg) scale(1); }
      }
      /* Custom scrollbar for history list */
      .custom-scroll::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scroll::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scroll::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 99px;
      }
      .custom-scroll::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-teal-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="text-center mb-6">
        <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-teal-400 uppercase drop-shadow-md">
          Neon Dice
        </h1>
        <p class="text-slate-400 text-xs mt-1">Roll the dice and inspect your probability matrix</p>
      </header>

      <!-- Dice Board Panel -->
      <div class="flex items-center justify-center bg-slate-950/40 p-8 border border-slate-800 rounded-3xl w-40 h-40 shadow-inner mb-6 relative overflow-hidden">
        <!-- Inner glow behind dice -->
        <div class="absolute inset-0 bg-indigo-500/5 rounded-full filter blur-xl animate-pulse"></div>
        
        <div id="dice" class="dice text-7xl font-black text-transparent bg-clip-text bg-gradient-to-br from-indigo-300 to-indigo-100 drop-shadow-[0_0_12px_rgba(129,140,248,0.4)] select-none cursor-pointer">
          &#9860;
        </div>
      </div>

      <!-- Interactive Controls -->
      <div class="flex items-center gap-3 w-full mb-6">
        <button id="roll-button" class="flex-1 py-4 bg-gradient-to-r from-indigo-600 to-teal-600 hover:from-indigo-500 hover:to-teal-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
          Roll Dice
        </button>
        <button id="clear-button" class="py-4 px-5 bg-slate-800 hover:bg-slate-700 active:scale-95 text-slate-300 font-bold rounded-2xl border border-white/5 transition-all cursor-pointer">
          Clear
        </button>
      </div>

      <!-- Roll History panel -->
      <div class="w-full flex flex-col">
        <h2 class="text-xs uppercase tracking-widest text-slate-500 font-bold mb-3">Roll Logs</h2>
        
        <div class="max-h-[160px] overflow-y-auto custom-scroll pr-1">
          <ul id="roll-history" class="flex flex-col gap-2 w-full">
            <li class="text-slate-500 italic text-sm text-center py-4 bg-slate-950/20 border border-white/5 rounded-2xl">
              No entries logged yet
            </li>
          </ul>
        </div>
      </div>
    </div>

    <script>
      const buttonEl = document.getElementById("roll-button");
      const clearBtn = document.getElementById("clear-button");
      const diceEl = document.getElementById("dice");
      const rollHistoryEl = document.getElementById("roll-history");

      let historyList = [];

      function rollDice() {
        const rollResult = Math.floor(Math.random() * 6) + 1;
        const diceFace = getDiceFace(rollResult);
        diceEl.innerHTML = diceFace;
        
        historyList.push(rollResult);
        updateRollHistory();
      }

      function updateRollHistory() {
        if (historyList.length === 0) {
          rollHistoryEl.innerHTML = `
            <li class="text-slate-500 italic text-sm text-center py-4 bg-slate-950/20 border border-white/5 rounded-2xl">
              No entries logged yet
            </li>
          `;
          return;
        }

        rollHistoryEl.innerHTML = "";
        for (let i = 0; i < historyList.length; i++) {
          const listItem = document.createElement("li");
          listItem.className = "bg-slate-950/30 border border-white/5 px-5 py-2.5 rounded-2xl flex items-center justify-between shadow-inner hover:bg-slate-900/30 transition-colors animate-pop text-sm font-semibold text-slate-300";
          listItem.innerHTML = `
            <span>Attempt #${i + 1}</span>
            <span class="text-2xl text-indigo-400 drop-shadow-[0_0_4px_rgba(129,140,248,0.4)]">${getDiceFace(historyList[i])}</span>
          `;
          rollHistoryEl.appendChild(listItem);
        }
        
        // Auto scroll to bottom of logs
        const scrollContainer = rollHistoryEl.parentElement;
        scrollContainer.scrollTop = scrollContainer.scrollHeight;
      }

      function getDiceFace(rollResult) {
        switch (rollResult) {
          case 1: return "&#9856;";
          case 2: return "&#9857;";
          case 3: return "&#9858;";
          case 4: return "&#9859;";
          case 5: return "&#9860;";
          case 6: return "&#9861;";
          default: return "";
        }
      }

      buttonEl.addEventListener("click", triggerRoll);
      // Clicking on the dice also triggers a roll! Great UX enhancement.
      diceEl.addEventListener("click", triggerRoll);

      function triggerRoll() {
        if (diceEl.classList.contains("roll-animation")) return; // Prevent double rolling click locks
        
        diceEl.classList.add("roll-animation");
        setTimeout(() => {
          diceEl.classList.remove("roll-animation");
          rollDice();
        }, 800);
      }

      clearBtn.addEventListener("click", () => {
        historyList = [];
        updateRollHistory();
      });
    </script>
  </body>
</html>
