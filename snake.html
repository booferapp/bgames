<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Snake - Classic Retro Arcade</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    
    <style>
      /* Smooth grid cell sizing */
      .play-board {
        display: grid;
        grid-template-rows: repeat(30, 1fr);
        grid-template-columns: repeat(30, 1fr);
      }
      .play-board .food {
        background-color: #ef4444; /* rose-500 */
        border-radius: 50%;
        box-shadow: 0 0 8px #ef4444;
        animation: pulse 1.2s infinite alternate;
      }
      .play-board .snake-head {
        background-color: #38bdf8; /* sky-400 */
        border-radius: 6px;
        box-shadow: 0 0 6px #38bdf8;
        z-index: 10;
      }
      .play-board .snake-body {
        background-color: #4f46e5; /* indigo-600 */
        border-radius: 4px;
        box-shadow: 0 0 4px #4f46e5;
      }
      
      @keyframes pulse {
        from { transform: scale(0.9); opacity: 0.8; }
        to { transform: scale(1.15); opacity: 1; }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background effects -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-sky-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-sky-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="w-full flex items-center justify-between border-b border-white/5 pb-3.5 mb-5">
        <div>
          <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-400 uppercase drop-shadow-md">
            Neon Snake
          </h1>
          <p class="text-slate-400 text-xs mt-0.5">Collect elements and grow your segment</p>
        </div>
      </header>

      <!-- Live Score details -->
      <div class="grid grid-cols-2 gap-4 w-full mb-5">
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Score</span>
          <span id="score" class="text-xl font-extrabold text-sky-400">0</span>
        </div>
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">High Score</span>
          <span id="high-score" class="text-xl font-extrabold text-indigo-400">0</span>
        </div>
      </div>

      <!-- Play board Grid Screen -->
      <div class="play-board w-full aspect-square max-w-[340px] bg-slate-950 border border-slate-800/80 rounded-2xl overflow-hidden shadow-inner p-1">
        <!-- Snake / Food items drawn here -->
      </div>

      <!-- Gaming D-Pad Controls for Mobile/Touch -->
      <div class="flex flex-col items-center justify-center gap-1.5 mt-6 w-full select-none md:hidden">
        <!-- Up -->
        <button data-key="ArrowUp" class="ctrl-btn w-12 h-12 bg-slate-800 active:bg-slate-700 text-white font-bold rounded-xl border border-white/5 flex items-center justify-center cursor-pointer shadow-md select-none">
          ▲
        </button>
        <!-- Left / Right -->
        <div class="flex items-center justify-center gap-6 w-full">
          <button data-key="ArrowLeft" class="ctrl-btn w-12 h-12 bg-slate-800 active:bg-slate-700 text-white font-bold rounded-xl border border-white/5 flex items-center justify-center cursor-pointer shadow-md select-none">
            ◀
          </button>
          <div class="w-12 h-12"></div> <!-- Spacer -->
          <button data-key="ArrowRight" class="ctrl-btn w-12 h-12 bg-slate-800 active:bg-slate-700 text-white font-bold rounded-xl border border-white/5 flex items-center justify-center cursor-pointer shadow-md select-none">
            ▶
          </button>
        </div>
        <!-- Down -->
        <button data-key="ArrowDown" class="ctrl-btn w-12 h-12 bg-slate-800 active:bg-slate-700 text-white font-bold rounded-xl border border-white/5 flex items-center justify-center cursor-pointer shadow-md select-none">
          ▼
        </button>
      </div>

      <div class="hidden md:block text-center text-xs text-slate-500 mt-4 select-none leading-relaxed">
        Use arrow keys on keyboard to navigate the snake.
      </div>
    </div>

    <!-- Game Over Modal Overlay -->
    <div id="win-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
      <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-rose-500/10 rounded-full blur-2xl"></div>
        <h2 class="text-3xl font-black text-rose-500 mb-2 uppercase tracking-wide">Crash! 💥</h2>
        <p class="text-slate-400 text-sm mb-6">The snake collided. Ready to try again?</p>
        
        <div class="bg-slate-950/40 border border-white/5 rounded-2xl py-3 mb-6">
          <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest block mb-0.5">Final Score</span>
          <span id="modal-score" class="text-3xl font-black text-white">0</span>
        </div>

        <button id="modal-restart" class="w-full py-3.5 bg-gradient-to-r from-sky-500 to-indigo-600 hover:from-sky-400 hover:to-indigo-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
          Play Again
        </button>
      </div>
    </div>

    <script>
      const playBoard = document.querySelector(".play-board");
      const scoreElement = document.getElementById("score");
      const highScoreElement = document.getElementById("high-score");
      const ctrlButtons = document.querySelectorAll(".ctrl-btn");
      
      const winModal = document.getElementById("win-modal");
      const modalScore = document.getElementById("modal-score");
      const modalRestart = document.getElementById("modal-restart");

      let gameOver = false;
      let foodX, foodY;
      let snakeX = 5, snakeY = 5;
      let velocityX = 0, velocityY = 0;
      let snakeBody = [];
      let setIntervalId = null;
      let score = 0;

      // Getting high score from the local storage
      let highScore = localStorage.getItem("high-score") || 0;
      highScoreElement.textContent = highScore;

      const updateFoodPosition = () => {
        // Passing a random 1 - 30 value as food position
        foodX = Math.floor(Math.random() * 30) + 1;
        foodY = Math.floor(Math.random() * 30) + 1;

        // Prevent spawning food inside the snake's body
        for (let i = 0; i < snakeBody.length; i++) {
          if (snakeBody[i][0] === foodX && snakeBody[i][1] === foodY) {
            updateFoodPosition();
            break;
          }
        }
      }

      const handleGameOver = () => {
        clearInterval(setIntervalId);
        modalScore.textContent = score;
        winModal.classList.remove("hidden");
        winModal.classList.add("flex");
      }

      modalRestart.addEventListener("click", () => {
        winModal.classList.add("hidden");
        winModal.classList.remove("flex");
        resetGame();
      });

      function resetGame() {
        gameOver = false;
        score = 0;
        scoreElement.textContent = "0";
        snakeX = 5;
        snakeY = 5;
        velocityX = 0;
        velocityY = 0;
        snakeBody = [];
        updateFoodPosition();
        
        if (setIntervalId) clearInterval(setIntervalId);
        setIntervalId = setInterval(initGame, 110);
      }

      const changeDirection = e => {
        // Changing velocity value based on key press (preventing 180-degree self-eating moves)
        if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W") && velocityY !== 1) {
          velocityX = 0;
          velocityY = -1;
        } else if ((e.key === "ArrowDown" || e.key === "s" || e.key === "S") && velocityY !== -1) {
          velocityX = 0;
          velocityY = 1;
        } else if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && velocityX !== 1) {
          velocityX = -1;
          velocityY = 0;
        } else if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && velocityX !== -1) {
          velocityX = 1;
          velocityY = 0;
        }
      }

      // Bind click and touch events on mobile D-Pad
      ctrlButtons.forEach(button => {
        button.addEventListener("click", () => {
          changeDirection({ key: button.dataset.key });
        });
        button.addEventListener("touchstart", (e) => {
          e.preventDefault();
          changeDirection({ key: button.dataset.key });
        }, { passive: false });
      });

      // Swipe controls on the game board
      let touchStartX = 0;
      let touchStartY = 0;
      playBoard.addEventListener("touchstart", (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      playBoard.addEventListener("touchmove", (e) => {
        e.preventDefault();
      }, { passive: false });

      playBoard.addEventListener("touchend", (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const dx = touchEndX - touchStartX;
        const dy = touchEndY - touchStartY;
        const absX = Math.abs(dx);
        const absY = Math.abs(dy);
        
        if (Math.max(absX, absY) > 30) {
          if (absX > absY) {
            if (dx > 0) changeDirection({ key: "ArrowRight" });
            else changeDirection({ key: "ArrowLeft" });
          } else {
            if (dy > 0) changeDirection({ key: "ArrowDown" });
            else changeDirection({ key: "ArrowUp" });
          }
        }
      }, { passive: true });

      const initGame = () => {
        if (gameOver) return handleGameOver();

        let html = `<div class="food" style="grid-area: ${foodY} / ${foodX}"></div>`;

        // Checking if the snake hit the food
        if (snakeX === foodX && snakeY === foodY) {
          updateFoodPosition();
          snakeBody.push([foodY, foodX]); 
          score++; 
          highScore = score >= highScore ? score : highScore;
          localStorage.setItem("high-score", highScore);
          scoreElement.textContent = score;
          highScoreElement.textContent = highScore;
        }
        
        // Updating the snake's head position based on the current velocity
        snakeX += velocityX;
        snakeY += velocityY;
        
        // Shifting forward the values of the elements in the snake body by one
        for (let i = snakeBody.length - 1; i > 0; i--) {
          snakeBody[i] = snakeBody[i - 1];
        }
        snakeBody[0] = [snakeX, snakeY]; 

        // Boundary collision check
        if (snakeX <= 0 || snakeX > 30 || snakeY <= 0 || snakeY > 30) {
          gameOver = true;
          return handleGameOver();
        }

        // Draw snake parts
        for (let i = 0; i < snakeBody.length; i++) {
          const typeClass = (i === 0) ? "snake-head" : "snake-body";
          html += `<div class="${typeClass}" style="grid-area: ${snakeBody[i][1]} / ${snakeBody[i][0]}"></div>`;
          
          // Self-collision check
          if (i !== 0 && snakeBody[0][1] === snakeBody[i][1] && snakeBody[0][0] === snakeBody[i][0]) {
            gameOver = true;
          }
        }
        playBoard.innerHTML = html;
      }

      // Start loop
      document.addEventListener("keydown", changeDirection);
      resetGame();
    </script>
  </body>
</html>
