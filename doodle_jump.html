<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doodle Jump - High Flying Adventure</title>

    <style>

  <body class="min-h-screen p-4 flex items-center justify-center bg-[radial-gradient(ellipse_at_top,#1e293b_0%,#0f172a_50%,#020617_100%)] font-sans selection:bg-green-200">
    <div class="relative w-full max-w-[480px] bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border-4 border-slate-800/30">
      
      <!-- In-game Stats UI Overlay -->
      <div class="absolute top-0 left-0 right-0 p-4 flex items-center justify-between pointer-events-none bg-gradient-to-b from-black/50 to-transparent z-10">
        <div class="flex items-baseline gap-2">
          <span class="text-xs uppercase font-extrabold tracking-wider text-slate-300">Score</span>
          <span id="scoreEl" class="font-fredoka text-2xl text-white drop-shadow-md">0</span>
        </div>
        <div class="flex items-baseline gap-2">
          <span class="text-xs uppercase font-extrabold tracking-wider text-amber-400">Best</span>
          <span id="highScoreEl" class="font-fredoka text-2xl text-yellow-400 drop-shadow-md">0</span>
        </div>
      </div>

      <!-- Main Game Canvas -->
      <canvas id="gameCanvas" width="480" height="600" class="block w-full h-auto max-h-[70vh] bg-[linear-gradient(180deg,#87ceeb_0%,#e0f6ff_40%,#98d8aa_70%,#7bc67e_100%)] cursor-pointer touch-none"></canvas>

      <!-- Mobile Touch Controls -->
      <div class="absolute bottom-0 left-0 right-0 p-6 flex justify-between items-center pointer-events-none z-10" id="mobileControls">
        <button type="button" class="ctrl-btn pointer-events-auto w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-black bg-white/20 backdrop-blur-md border border-white/10 active:bg-green-500/80 hover:bg-white/30 transition-all shadow-lg select-none touch-manipulation cursor-pointer" id="btnLeft" aria-label="Move left">←</button>
        <button type="button" class="ctrl-btn pointer-events-auto w-16 h-16 rounded-full flex items-center justify-center text-white text-2xl font-black bg-white/20 backdrop-blur-md border border-white/10 active:bg-green-500/80 hover:bg-white/30 transition-all shadow-lg select-none touch-manipulation cursor-pointer" id="btnRight" aria-label="Move right">→</button>
      </div>

      <!-- Start Overlay screen -->
      <div id="startOverlay" class="absolute inset-0 bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center p-8 text-center z-20 transition-all duration-300">
        <div class="w-16 h-16 bg-gradient-to-tr from-green-500 to-emerald-400 rounded-2xl flex items-center justify-center shadow-lg shadow-green-500/20 mb-4 animate-bounce">
          <span class="text-3xl">🚀</span>
        </div>
        <h1 class="font-fredoka text-4xl text-white mb-4 tracking-wider drop-shadow-[0_3px_0_#10b981]">Doodle Jump</h1>
        <p class="text-sm sm:text-base text-slate-300 mb-2">Use <kbd class="px-2 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/10 text-white">←</kbd> <kbd class="px-2 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/10 text-white">→</kbd> or <kbd class="px-2 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/10 text-white">A</kbd> <kbd class="px-2 py-1 bg-white/10 rounded-lg text-xs font-bold border border-white/10 text-white">D</kbd> to tilt and move.</p>
        <p class="text-xs text-slate-400 mb-6">Or tap the arrows on mobile. Land on platforms to jump higher!</p>
        <button type="button" id="startBtn" class="px-8 py-3.5 font-fredoka text-lg text-slate-950 bg-gradient-to-r from-green-400 to-emerald-400 hover:from-green-300 hover:to-emerald-300 rounded-full shadow-lg shadow-green-500/30 hover:scale-105 active:scale-95 transition-all duration-150 cursor-pointer">Play Now</button>
      </div>

      <!-- Game Over Overlay screen -->
      <div id="gameOverOverlay" class="absolute inset-0 bg-slate-950/85 backdrop-blur-sm hidden flex-col items-center justify-center p-8 text-center z-20 transition-all duration-300">
        <div class="w-16 h-16 bg-rose-500/10 border border-rose-500/30 rounded-2xl flex items-center justify-center mb-4">
          <span class="text-3xl">💥</span>
        </div>
        <h2 class="font-fredoka text-3xl text-rose-500 mb-2">Game Over</h2>
        <p class="text-slate-300 mb-6 text-lg">You scored: <span id="finalScoreEl" class="font-fredoka text-yellow-400 text-2xl">0</span> points</p>
        <button type="button" id="restartBtn" class="px-8 py-3.5 font-fredoka text-lg text-slate-950 bg-gradient-to-r from-green-400 to-emerald-400 hover:from-green-300 hover:to-emerald-300 rounded-full shadow-lg shadow-green-500/30 hover:scale-105 active:scale-95 transition-all duration-150 cursor-pointer">Play Again</button>
      </div>

    </div>

    <script>
      (function () {
        "use strict";

        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        
        // Polyfill for roundRect
        if (!ctx.roundRect) {
          ctx.roundRect = function (x, y, w, h, r) {
            r = Math.min(r, w / 2, h / 2);
            this.beginPath();
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
          };
        }
        
        const scoreEl = document.getElementById("scoreEl");
        const highScoreEl = document.getElementById("highScoreEl");
        const startOverlay = document.getElementById("startOverlay");
        const gameOverOverlay = document.getElementById("gameOverOverlay");
        const startBtn = document.getElementById("startBtn");
        const restartBtn = document.getElementById("restartBtn");
        const finalScoreEl = document.getElementById("finalScoreEl");
        const btnLeft = document.getElementById("btnLeft");
        const btnRight = document.getElementById("btnRight");

        const CANVAS_WIDTH = 480;
        const CANVAS_HEIGHT = 600;
        const GRAVITY = 0.45;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        const PLATFORM_MIN_WIDTH = 60;
        const PLATFORM_MAX_WIDTH = 120;
        const PLATFORM_HEIGHT = 14;
        const PLATFORM_GAP_MIN = 50;
        const PLATFORM_GAP_MAX = 120;
        const PLAYER_WIDTH = 36;
        const PLAYER_HEIGHT = 40;
        const CAMERA_LEAD = 0.4;

        let animationId = null;
        let player = null;
        let platforms = [];
        let cameraY = 0;
        let startCameraY = 0;
        let score = 0;
        let highScore = parseInt(localStorage.getItem("doodle-high-score") || "0", 10);
        let gameRunning = false;
        let keys = { left: false, right: false };
        let time = 0;

        function setPixelRatio() {
          const dpr = Math.min(window.devicePixelRatio || 1, 2);
          const rect = canvas.getBoundingClientRect();
          canvas.width = CANVAS_WIDTH * dpr;
          canvas.height = CANVAS_HEIGHT * dpr;
          canvas.style.width = rect.width + "px";
          canvas.style.height = rect.height + "px";
          ctx.scale(dpr, dpr);
        }

        function createPlatform(x, y, width, type) {
          return {
            x,
            y,
            width,
            height: PLATFORM_HEIGHT,
            type: type || "normal",
            moveDir: type === "moving" ? (Math.random() > 0.5 ? 1 : -1) : 0,
            moveRange: type === "moving" ? 40 + Math.random() * 40 : 0,
            startX: x,
          };
        }

        function initPlatforms() {
          platforms = [];
          let y = CANVAS_HEIGHT - 80;
          for (let i = 0; i < 10; i++) {
            const width =
              PLATFORM_MIN_WIDTH + Math.random() * (PLATFORM_MAX_WIDTH - PLATFORM_MIN_WIDTH);
            let x = Math.random() * (CANVAS_WIDTH - width);
            let type = "normal";
            if (i === 0) {
              x = (CANVAS_WIDTH - width) / 2;
            } else {
              const typeRand = Math.random();
              if (typeRand < 0.15) type = "break";
              else if (typeRand < 0.35) type = "moving";
            }
            platforms.push(createPlatform(x, y, width, type));
            y -= PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);
          }
        }

        function addPlatformsAbove(topY) {
          let lastY = platforms.length ? Math.min(...platforms.map((p) => p.y)) : topY;
          while (lastY > topY - CANVAS_HEIGHT - 200) {
            lastY -= PLATFORM_GAP_MIN + Math.random() * (PLATFORM_GAP_MAX - PLATFORM_GAP_MIN);
            const width =
              PLATFORM_MIN_WIDTH + Math.random() * (PLATFORM_MAX_WIDTH - PLATFORM_MIN_WIDTH);
            const x = Math.random() * (CANVAS_WIDTH - width);
            const typeRand = Math.random();
            let type = "normal";
            if (typeRand < 0.12) type = "break";
            else if (typeRand < 0.32) type = "moving";
            platforms.push(createPlatform(x, lastY, width, type));
          }
        }

        function resetGame() {
          cameraY = 0;
          score = 0;
          time = 0;
          keys.left = false;
          keys.right = false;
          if (btnLeft) btnLeft.classList.remove("active");
          if (btnRight) btnRight.classList.remove("active");
          initPlatforms();
          const firstPlatform = platforms[0];
          player = {
            x: (CANVAS_WIDTH - PLAYER_WIDTH) / 2,
            y: firstPlatform.y - PLAYER_HEIGHT - 2,
            vx: 0,
            vy: 0,
            width: PLAYER_WIDTH,
            height: PLAYER_HEIGHT,
          };
          startCameraY = player.y - CANVAS_HEIGHT * CAMERA_LEAD;
          gameRunning = true;
          scoreEl.textContent = "0";
          highScoreEl.textContent = highScore;
        }

        function drawPlayer() {
          const x = player.x;
          const y = player.y - cameraY;
          if (y < -PLAYER_HEIGHT - 20 || y > CANVAS_HEIGHT + 20) return;

          ctx.save();
          ctx.translate(x + PLAYER_WIDTH / 2, y + PLAYER_HEIGHT / 2);
          if (keys.left) ctx.scale(-1, 1);
          ctx.translate(-(x + PLAYER_WIDTH / 2), -(y + PLAYER_HEIGHT / 2));

          // Draw body
          ctx.fillStyle = "#f59e0b";
          ctx.beginPath();
          ctx.roundRect(x, y, PLAYER_WIDTH, PLAYER_HEIGHT, 10);
          ctx.fill();

          // Draw eyes
          ctx.fillStyle = "#fff";
          ctx.beginPath();
          ctx.arc(x + 12, y + 14, 6, 0, Math.PI * 2);
          ctx.arc(x + PLAYER_WIDTH - 12, y + 14, 6, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = "#2d3436";
          ctx.beginPath();
          ctx.arc(x + 12, y + 14, 3, 0, Math.PI * 2);
          ctx.arc(x + PLAYER_WIDTH - 12, y + 14, 3, 0, Math.PI * 2);
          ctx.fill();

          // Draw cute details (little ears/hat)
          ctx.fillStyle = "#d97706";
          ctx.beginPath();
          ctx.moveTo(x + 8, y);
          ctx.lineTo(x + 14, y - 6);
          ctx.lineTo(x + 18, y);
          ctx.fill();

          ctx.beginPath();
          ctx.moveTo(x + PLAYER_WIDTH - 8, y);
          ctx.lineTo(x + PLAYER_WIDTH - 14, y - 6);
          ctx.lineTo(x + PLAYER_WIDTH - 18, y);
          ctx.fill();

          ctx.restore();
        }

        function drawPlatform(p) {
          const y = p.y - cameraY;
          if (y < -PLATFORM_HEIGHT - 20 || y > CANVAS_HEIGHT + 50) return;

          const x = p.x;
          const w = p.width;
          const h = p.height;

          if (p.type === "normal") {
            ctx.fillStyle = "#10b981";
            ctx.strokeStyle = "#34d399";
          } else if (p.type === "break") {
            ctx.fillStyle = "#f43f5e";
            ctx.strokeStyle = "#fb7185";
          } else {
            ctx.fillStyle = "#3b82f6";
            ctx.strokeStyle = "#60a5fa";
          }

          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, 6);
          ctx.fill();
          ctx.stroke();
        }

        function gameOver() {
        if (window.Boofer && Boofer.isAvailable()) {
          const finalScore = typeof score !== 'undefined' ? score : (typeof finalScore !== 'undefined' ? finalScore : 0);
          Boofer.gameOver(finalScore);
        }

          gameRunning = false;
          if (animationId) cancelAnimationFrame(animationId);
          finalScoreEl.textContent = score;
          gameOverOverlay.classList.remove("hidden");
        }

        function gameLoop() {
          if (!gameRunning) return;

          time++;
          
          if (keys.left) player.vx = -MOVE_SPEED;
          else if (keys.right) player.vx = MOVE_SPEED;
          else player.vx *= 0.85;
          
          player.x += player.vx;
          player.x = Math.max(0, Math.min(CANVAS_WIDTH - player.width, player.x));
          player.vy += GRAVITY;
          player.y += player.vy;

          for (let i = platforms.length - 1; i >= 0; i--) {
            const p = platforms[i];
            if (p.type === "moving") {
              p.x = p.startX + Math.sin((time + p.startX) * 0.03) * p.moveRange * p.moveDir;
              p.x = Math.max(0, Math.min(CANVAS_WIDTH - p.width, p.x));
            }

            const py = p.y - cameraY;
            if (py > CANVAS_HEIGHT + 100) {
              platforms.splice(i, 1);
              continue;
            }

            const playerBottom = player.y + player.height;
            const platformTop = p.y;
            const overlapX =
              player.x + player.width > p.x && player.x < p.x + p.width;
            if (
              overlapX &&
              playerBottom >= platformTop - 2 &&
              playerBottom <= platformTop + 12 &&
              player.vy >= 0
            ) {
              player.vy = JUMP_FORCE;
              player.y = platformTop - player.height - 1;
              if (p.type === "break") platforms.splice(i, 1);
            }
          }

          const targetCameraY = player.y - CANVAS_HEIGHT * CAMERA_LEAD;
          if (targetCameraY < cameraY) {
            cameraY = targetCameraY;
            const newScore = Math.max(0, Math.floor((startCameraY - cameraY) / 8));
            if (newScore > score) {
              score = newScore;
              scoreEl.textContent = score;
              if (score > highScore) {
                highScore = score;
                highScoreEl.textContent = highScore;
                localStorage.setItem("doodle-high-score", String(highScore));
              }
            }
            addPlatformsAbove(cameraY);
          }

          if (player.y - cameraY > CANVAS_HEIGHT + 50) {
            gameOver();
            return;
          }

          ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

          platforms.forEach(drawPlatform);
          drawPlayer();

          animationId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
          startOverlay.classList.add("hidden");
          gameOverOverlay.classList.add("hidden");
          resetGame();
          gameLoop();
        }

        startBtn.addEventListener("click", startGame);
        restartBtn.addEventListener("click", startGame);

        document.addEventListener("keydown", function (e) {
          if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = true;
          if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = true;
          if (e.key === " ") e.preventDefault();
        });

        document.addEventListener("keyup", function (e) {
          if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") keys.left = false;
          if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") keys.right = false;
        });

        function setKeyLeft(value) {
          keys.left = value;
          if (btnLeft) btnLeft.classList.toggle("active", value);
        }
        function setKeyRight(value) {
          keys.right = value;
          if (btnRight) btnRight.classList.toggle("active", value);
        }
        
        if (btnLeft) {
          btnLeft.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            setKeyLeft(true);
          });
          btnLeft.addEventListener("pointerup", function () { setKeyLeft(false); });
          btnLeft.addEventListener("pointerleave", function () { setKeyLeft(false); });
        }
        if (btnRight) {
          btnRight.addEventListener("pointerdown", function (e) {
            e.preventDefault();
            setKeyRight(true);
          });
          btnRight.addEventListener("pointerup", function () { setKeyRight(false); });
          btnRight.addEventListener("pointerleave", function () { setKeyRight(false); });
        }

        canvas.addEventListener("click", function () {
          if (gameRunning) return;
          if (!startOverlay.classList.contains("hidden")) startGame();
        });

        window.addEventListener("resize", setPixelRatio);
        setPixelRatio();
        highScoreEl.textContent = highScore;
      })();
    </script>
  </body>
</html>
