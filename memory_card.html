<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neon Match - Memory Card Game</title>
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    
    <!-- Google Font & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
    
    <style>
      .card {
        perspective: 1000px;
      }
      .card-inner {
        transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        transform-style: preserve-3d;
      }
      .card.flip .card-inner {
        transform: rotateY(180deg);
      }
      .card-front, .card-back {
        backface-visibility: hidden;
      }
      .card-back {
        transform: rotateY(180deg);
      }
      .card.shake {
        animation: shake 0.4s ease-in-out;
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        20%, 60% { transform: translateX(-6px); }
        40%, 80% { transform: translateX(6px); }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-slate-950 via-slate-900 to-indigo-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4 selection:bg-indigo-500/30">
    
    <!-- Glowing background elements -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-indigo-500/5 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-emerald-500/5 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/60 backdrop-blur-xl border border-white/5 p-6 md:p-8 rounded-3xl shadow-2xl flex flex-col items-center relative overflow-hidden z-10">
      <div class="absolute -top-10 -left-10 w-24 h-24 bg-indigo-500/10 rounded-full blur-2xl"></div>

      <!-- Top HUD Header -->
      <header class="w-full flex items-center justify-between border-b border-white/5 pb-4 mb-6">
        <div>
          <h1 class="text-3xl font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-teal-400 uppercase drop-shadow-md">
            Neon Match
          </h1>
          <p class="text-slate-400 text-xs mt-1">Flip cards and match matching pairs</p>
        </div>
      </header>

      <!-- HUD Stats -->
      <div class="grid grid-cols-2 gap-4 w-full mb-6">
        <!-- Pairs Matched -->
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Matched</span>
          <span id="stat-matches" class="text-xl font-extrabold text-indigo-400">0 / 8</span>
        </div>
        <!-- Moves Taken -->
        <div class="bg-slate-950/40 border border-white/5 py-2.5 px-4 rounded-2xl flex flex-col items-center">
          <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest block mb-0.5">Moves</span>
          <span id="stat-moves" class="text-xl font-extrabold text-teal-400">0</span>
        </div>
      </div>

      <!-- Dynamic Cards Grid -->
      <div id="cards-grid" class="grid grid-cols-4 gap-3 w-full max-w-[340px] sm:max-w-[380px] mb-6 select-none">
        <!-- Dynamically populated card blocks -->
      </div>

      <!-- Reset Trigger -->
      <button id="reset-btn" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-teal-600 hover:from-indigo-500 hover:to-teal-500 active:scale-[0.98] text-white font-bold rounded-2xl shadow-lg transition-all cursor-pointer">
        Restart Game 🔁
      </button>
    </div>

    <!-- Win Toast dialog -->
    <div id="win-modal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center p-4 z-50 animate-fade-in">
      <div class="bg-slate-900 border border-white/10 p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl relative overflow-hidden transform scale-95 transition-all">
        <div class="absolute -top-10 -left-10 w-24 h-24 bg-teal-500/10 rounded-full blur-2xl"></div>
        <h2 class="text-3xl font-black text-teal-400 mb-2 uppercase tracking-wide">Excellent! 🎉</h2>
        <p class="text-slate-400 text-sm mb-6">You've recalled all pairs. Ready to beat your previous score?</p>
        
        <button id="modal-restart" class="w-full py-3.5 bg-gradient-to-r from-indigo-500 to-teal-600 hover:from-indigo-400 hover:to-teal-500 text-white font-bold text-lg rounded-2xl shadow-lg active:scale-[0.98] transition-all cursor-pointer">
          Play Again
        </button>
      </div>
    </div>

    <script>
      // 8 matching emojis pairs database
      const cardEmojis = ["🍔", "🍕", "🍩", "🍪", "🍓", "🍇", "🍌", "🥑"];

      const gridContainer = document.getElementById("cards-grid");
      const statMatches = document.getElementById("stat-matches");
      const statMoves = document.getElementById("stat-moves");
      const resetBtn = document.getElementById("reset-btn");
      
      const winModal = document.getElementById("win-modal");
      const modalRestart = document.getElementById("modal-restart");

      let matched = 0;
      let moves = 0;
      let cardOne = null;
      let cardTwo = null;
      let disableDeck = false;

      resetBtn.addEventListener("click", resetGame);
      modalRestart.addEventListener("click", () => {
        winModal.classList.add("hidden");
        winModal.classList.remove("flex");
        resetGame();
      });

      function resetGame() {
        matched = 0;
        moves = 0;
        statMatches.textContent = "0 / 8";
        statMoves.textContent = "0";
        cardOne = null;
        cardTwo = null;
        disableDeck = false;
        shuffleCards();
      }

      function flipCard(e) {
        let clickedCard = e.currentTarget;
        // Don't react on already flipped or disabled deck
        if (clickedCard.classList.contains("flip") || disableDeck) return;
        
        clickedCard.classList.add("flip");

        if (!cardOne) {
          cardOne = clickedCard;
          return;
        }

        cardTwo = clickedCard;
        disableDeck = true;
        moves++;
        statMoves.textContent = moves;

        let cardOneEmoji = cardOne.dataset.emoji;
        let cardTwoEmoji = cardTwo.dataset.emoji;
        matchCards(cardOneEmoji, cardTwoEmoji);
      }

      function matchCards(emoji1, emoji2) {
        if (emoji1 === emoji2) {
          matched++;
          statMatches.textContent = `${matched} / 8`;
          
          if (matched === 8) {
            setTimeout(() => {
              winModal.classList.remove("hidden");
              winModal.classList.add("flex");
            }, 500);
          }
          
          cardOne = null;
          cardTwo = null;
          disableDeck = false;
          return;
        }

        // Incorrect pair: shake cards and flip back
        setTimeout(() => {
          cardOne.classList.add("shake");
          cardTwo.classList.add("shake");
        }, 400);

        setTimeout(() => {
          cardOne.classList.remove("shake", "flip");
          cardTwo.classList.remove("shake", "flip");
          cardOne = null;
          cardTwo = null;
          disableDeck = false;
        }, 1200);
      }

      function shuffleCards() {
        // Double the card emojis array to 16
        let doubleList = [...cardEmojis, ...cardEmojis];
        
        // Shuffle using random sort index
        doubleList.sort(() => Math.random() > 0.5 ? 1 : -1);
        
        gridContainer.innerHTML = "";
        
        doubleList.forEach((emoji) => {
          const card = document.createElement("div");
          card.className = "card h-[76px] sm:h-[84px] aspect-square cursor-pointer select-none rounded-2xl";
          card.dataset.emoji = emoji;
          
          card.innerHTML = `
            <div class="card-inner relative w-full h-full text-center">
              <!-- Front Side (Mystery face) -->
              <div class="card-front absolute inset-0 bg-slate-950/60 border border-slate-800 rounded-2xl flex items-center justify-center text-xl font-bold text-indigo-400 hover:bg-slate-800/40 transition-colors shadow-inner">
                ❓
              </div>
              <!-- Back Side (Revealed Emoji) -->
              <div class="card-back absolute inset-0 bg-slate-800 border border-indigo-500/20 rounded-2xl flex items-center justify-center text-3xl sm:text-4xl shadow-lg">
                ${emoji}
              </div>
            </div>
          `;
          
          card.addEventListener("click", flipCard);
          gridContainer.appendChild(card);
        });
      }

      // Initial startup trigger
      resetGame();
    </script>
  </body>
</html>
