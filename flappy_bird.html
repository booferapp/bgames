<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Boofer SDK Integration -->
    <meta name="boofer-api-key" content="bfr_dev_d7e0327101141c96acaf822a95b4a29b">
    <script src="boofer-sdk.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        if (window.Boofer) {
          Boofer.ready().then(() => Boofer.initGame())
            .then((info) => console.log("Boofer Init:", info))
            .catch((err) => console.warn("Boofer SDK offline:", err));
        }
      });

      // Universal Boofer Monitor for scores and game-over events
      (function() {
        let lastReportedScore = -1;
        let gameOverReported = false;
        
        setInterval(() => {
          if (!window.Boofer || !Boofer.isAvailable()) return;
          
          // 1. Resolve current score
          let currentScore = 0;
          if (typeof score === 'number') currentScore = score;
          else if (typeof points === 'number') currentScore = points;
          else if (typeof level === 'number') currentScore = level;
          else if (typeof state === 'object' && state !== null && typeof state.moves === 'number') currentScore = state.moves;
          else if (typeof moves === 'number') currentScore = moves;
          else {
            const scoreEl = document.getElementById("score") || document.getElementById("scoreValue") || document.getElementById("scoreEl") || document.getElementById("score-val");
            if (scoreEl) {
              const val = parseInt(scoreEl.textContent || scoreEl.innerText);
              if (!isNaN(val)) currentScore = val;
            }
          }
          
          // Report score if increased
          if (currentScore > lastReportedScore) {
            lastReportedScore = currentScore;
            Boofer.saveScore(currentScore).catch(() => {});
          }
          
          // 2. Resolve game-over state
          let isOver = false;
          if (typeof gameOver === 'boolean' && gameOver === true) isOver = true;
          if (typeof timeUp === 'boolean' && timeUp === true) isOver = true;
          if (typeof playing === 'boolean' && playing === false && lastReportedScore > 0) isOver = true;
          
          // Check common game-over UI overlays
          const goOverlay = document.getElementById("gameOverOverlay") || 
                            document.getElementById("game-over") || 
                            document.getElementById("winModal") || 
                            document.getElementById("win-modal") || 
                            document.getElementById("gameover-overlay") ||
                            document.getElementById("winOverlay");
                            
          if (goOverlay && !goOverlay.classList.contains("hidden") && goOverlay.style.display !== "none" && lastReportedScore >= 0) {
            isOver = true;
          }
          
          if (isOver) {
            if (!gameOverReported) {
              gameOverReported = true;
              Boofer.gameOver(lastReportedScore >= 0 ? lastReportedScore : 0).catch(() => {});
            }
          } else {
            gameOverReported = false;
          }
        }, 500);
      })();
    </script>
    <!-- End Boofer SDK Integration -->

    

    <title>Flappy Bird - Flying Challenge</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <link rel="icon" href="https://i.ibb.co/M6KTWnf/pic.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
            },
          },
        },
      }
    </script>
  </head>
  <body class="min-h-screen flex items-center justify-center bg-[radial-gradient(ellipse_at_top,#0ea5e9_0%,#0369a1_60%,#0f172a_100%)] font-sans text-slate-100 p-4 select-none">
    
    <div class="relative w-full max-w-[620px] aspect-[620/480] bg-slate-900 rounded-3xl overflow-hidden shadow-2xl border-4 border-slate-800/40">
      <!-- Game Canvas -->
      <canvas
        id="myCanvas"
        width="620"
        height="480"
        class="block w-full h-full cursor-pointer bg-[url('http://s2js.com/img/etc/flappyback.png')] bg-[length:100%_100%] bg-no-repeat"
      ></canvas>
    </div>

    <script>
      const myCanvas = document.getElementById("myCanvas");
      const ctx = myCanvas.getContext("2d");
      const FPS = 40;
      const jump_amount = -10;
      const max_fall_speed = +10;
      const acceleration = 1;
      const pipe_speed = -2;
      let game_mode = "prestart";
      let time_game_last_running;
      let bottom_bar_offset = 0;
      let pipes = [];

      function MySprite(img_url) {
        this.x = 0;
        this.y = 0;
        this.visible = true;
        this.velocity_x = 0;
        this.velocity_y = 0;
        this.MyImg = new Image();
        this.MyImg.src = img_url || "";
        this.angle = 0;
        this.flipV = false;
        this.flipH = false;
      }

      MySprite.prototype.Do_Frame_Things = function () {
        ctx.save();
        ctx.translate(this.x + this.MyImg.width / 2, this.y + this.MyImg.height / 2);
        ctx.rotate((this.angle * Math.PI) / 180);
        if (this.flipV) ctx.scale(1, -1);
        if (this.flipH) ctx.scale(-1, 1);
        if (this.visible)
          ctx.drawImage(this.MyImg, -this.MyImg.width / 2, -this.MyImg.height / 2);
        this.x = this.x + this.velocity_x;
        this.y = this.y + this.velocity_y;
        ctx.restore();
      };

      function ImagesTouching(thing1, thing2) {
        if (!thing1.visible || !thing2.visible) return false;
        if (
          thing1.x >= thing2.x + thing2.MyImg.width ||
          thing1.x + thing1.MyImg.width <= thing2.x
        )
          return false;
        if (
          thing1.y >= thing2.y + thing2.MyImg.height ||
          thing1.y + thing1.MyImg.height <= thing2.y
        )
          return false;
        return true;
      }

      function Got_Player_Input(MyEvent) {
        switch (game_mode) {
          case "prestart": {
            game_mode = "running";
            window.gameOver = false;
            break;
          }
          case "running": {
            bird.velocity_y = jump_amount;
            break;
          }
          case "over":
            if (new Date() - time_game_last_running > 1000) {
              reset_game();
              game_mode = "running";
              window.gameOver = false;
              break;
            }
        }
        if (MyEvent) MyEvent.preventDefault();
      }

      addEventListener("touchstart", Got_Player_Input, { passive: false });
      addEventListener("mousedown", Got_Player_Input);
      addEventListener("keydown", Got_Player_Input);

      function make_bird_slow_and_fall() {
        if (bird.velocity_y < max_fall_speed) {
          bird.velocity_y = bird.velocity_y + acceleration;
        }
        if (bird.y > myCanvas.height - bird.MyImg.height) {
          bird.velocity_y = 0;
          game_mode = "over";
        }
        if (bird.y < 0 - bird.MyImg.height) {
          bird.velocity_y = 0;
          game_mode = "over";
        }
      }

      function add_pipe(x_pos, top_of_gap, gap_width) {
        var top_pipe = new MySprite();
        top_pipe.MyImg = pipe_piece;
        top_pipe.x = x_pos;
        top_pipe.y = top_of_gap - pipe_piece.height;
        top_pipe.velocity_x = pipe_speed;
        pipes.push(top_pipe);
        var bottom_pipe = new MySprite();
        bottom_pipe.MyImg = pipe_piece;
        bottom_pipe.flipV = true;
        bottom_pipe.x = x_pos;
        bottom_pipe.y = top_of_gap + gap_width;
        bottom_pipe.velocity_x = pipe_speed;
        pipes.push(bottom_pipe);
      }

      function make_bird_tilt_appropriately() {
        if (bird.velocity_y < 0) {
          bird.angle = -15;
        } else if (bird.angle < 70) {
          bird.angle = bird.angle + 4;
        }
      }

      function show_the_pipes() {
        for (var i = 0; i < pipes.length; i++) {
          pipes[i].Do_Frame_Things();
        }
      }

      function check_for_end_game() {
        for (var i = 0; i < pipes.length; i++)
          if (ImagesTouching(bird, pipes[i])) game_mode = "over";
      }

      function display_intro_instructions() {
        ctx.font = "bold 26px Outfit, sans-serif";
        ctx.fillStyle = "#ef4444";
        ctx.textAlign = "center";
        ctx.fillText(
          "Press Space, Touch or Click to Start",
          myCanvas.width / 2,
          myCanvas.height / 3
        );
      }

      function display_game_over() {
        var score = 0;
        for (var i = 0; i < pipes.length; i++)
          if (pipes[i].x < bird.x) score = score + 0.5;
        ctx.font = "bold 36px Outfit, sans-serif";
        ctx.fillStyle = "#ef4444";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", myCanvas.width / 2, 140);
        ctx.font = "bold 24px Outfit, sans-serif";
        ctx.fillStyle = "#1e293b";
        ctx.fillText("Score: " + score, myCanvas.width / 2, 190);
        ctx.font = "18px Outfit, sans-serif";
        ctx.fillText("Click, Touch, or Press any key to play again", myCanvas.width / 2, 300);
      }

      function display_bar_running_along_bottom() {
        if (bottom_bar_offset < -23) bottom_bar_offset = 0;
        ctx.drawImage(
          bottom_bar,
          bottom_bar_offset,
          myCanvas.height - bottom_bar.height
        );
      }

      function reset_game() {
        bird.y = myCanvas.height / 2;
        bird.angle = 0;
        pipes = []; 
        add_all_my_pipes(); 
      }

      function add_all_my_pipes() {
        add_pipe(500, 100, 140);
        add_pipe(800, 50, 140);
        add_pipe(1000, 250, 140);
        add_pipe(1200, 150, 120);
        add_pipe(1600, 100, 120);
        add_pipe(1800, 150, 120);
        add_pipe(2000, 200, 120);
        add_pipe(2200, 250, 120);
        add_pipe(2400, 30, 100);
        add_pipe(2700, 300, 100);
        add_pipe(3000, 100, 80);
        add_pipe(3300, 250, 80);
        add_pipe(3600, 50, 60);
        var finish_line = new MySprite("http://s2js.com/img/etc/flappyend.png");
        finish_line.x = 3900;
        finish_line.velocity_x = pipe_speed;
        pipes.push(finish_line);
      }

      var pipe_piece = new Image();
      pipe_piece.onload = add_all_my_pipes;
      pipe_piece.src = "http://s2js.com/img/etc/flappypipe.png";

      function Do_a_Frame() {
        ctx.clearRect(0, 0, myCanvas.width, myCanvas.height);
        bird.Do_Frame_Things();
        display_bar_running_along_bottom();
        switch (game_mode) {
          case "prestart": {
            display_intro_instructions();
            window.score = 0;
            window.gameOver = false;
            break;
          }
          case "running": {
            time_game_last_running = new Date();
            bottom_bar_offset = bottom_bar_offset + pipe_speed;
            show_the_pipes();
            make_bird_tilt_appropriately();
            make_bird_slow_and_fall();
            check_for_end_game();
            
            // Calculate and expose score
            var currentScore = 0;
            for (var i = 0; i < pipes.length; i++) {
              if (pipes[i].x < bird.x) currentScore += 0.5;
            }
            window.score = Math.floor(currentScore);
            window.gameOver = false;
            break;
          }
          case "over": {
            make_bird_slow_and_fall();
            display_game_over();
            window.gameOver = true;
            break;
          }
        }
      }

      var bottom_bar = new Image();
      bottom_bar.src = "http://s2js.com/img/etc/flappybottom.png";

      var bird = new MySprite("http://s2js.com/img/etc/flappybird.png");
      bird.x = myCanvas.width / 3;
      bird.y = myCanvas.height / 2;

      setInterval(Do_a_Frame, 1000 / FPS);
    </script>
  </body>
</html>
